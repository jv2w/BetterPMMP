#! pocketmine.yml.header

settings:
  #! pocketmine.yml.settings.force-language
  force-language: false
  shutdown-message: "Server closed"
  #! pocketmine.yml.settings.query-plugins
  query-plugins: true
  #! pocketmine.yml.settings.enable-profiling
  enable-profiling: false
  #! pocketmine.yml.settings.profile-report-trigger
  profile-report-trigger: 20
  #! pocketmine.yml.settings.async-workers
  async-workers: auto
  #! pocketmine.yml.settings.enable-dev-builds
  enable-dev-builds: false

memory:
  #! pocketmine.yml.memory.global-limit
  global-limit: 0
  #! pocketmine.yml.memory.main-limit
  main-limit: 0
  #! pocketmine.yml.memory.main-hard-limit
  main-hard-limit: 1024
  #! pocketmine.yml.memory.async-worker-hard-limit
  async-worker-hard-limit: 256
  #! pocketmine.yml.memory.check-rate
  check-rate: 20
  #! pocketmine.yml.memory.continuous-trigger
  continuous-trigger: true
  #! pocketmine.yml.memory.continuous-trigger-rate
  continuous-trigger-rate: 30
  garbage-collection:
    #! pocketmine.yml.memory.garbage-collection.period
    period: 36000
  #! pocketmine.yml.memory.memory-dump
  memory-dump:
    #! pocketmine.yml.memory.memory-dump.dump-async-worker
    dump-async-worker: true
  max-chunks:
    #! pocketmine.yml.memory.max-chunks.chunk-radius
    chunk-radius: 4

network:
  #! pocketmine.yml.network.batch-threshold
  batch-threshold: 256
  #! pocketmine.yml.network.compression-level
  compression-level: 1
  #! pocketmine.yml.network.async-compression
  async-compression: true
  #! pocketmine.yml.network.async-compression-threshold
  async-compression-threshold: 10000
  #! pocketmine.yml.network.upnp-forwarding
  upnp-forwarding: false
  #! pocketmine.yml.network.max-mtu-size
  max-mtu-size: 1492
  #! pocketmine.yml.network.enable-encryption
  enable-encryption: true

debug:
  #! pocketmine.yml.debug.level
  level: 1

player:
  #! pocketmine.yml.player.save-player-data
  save-player-data: true
  #! pocketmine.yml.player.verify-xuid
  verify-xuid: true

level-settings:
  #! pocketmine.yml.level-settings.default-format
  default-format: leveldb

chunk-sending:
  #! pocketmine.yml.chunk-sending.per-tick
  per-tick: 4
  #! pocketmine.yml.chunk-sending.spawn-radius
  spawn-radius: 4

chunk-ticking:
  #! pocketmine.yml.chunk-ticking.tick-radius
  tick-radius: 3
  #! pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick
  blocks-per-subchunk-per-tick: 3
  #! pocketmine.yml.chunk-ticking.disable-block-ticking
  disable-block-ticking:
    #- grass
    #- ice
    #- fire

chunk-generation:
  #! pocketmine.yml.chunk-generation.population-queue-size
  population-queue-size: 32

ticks-per:
  autosave: 6000

auto-report:
  #! pocketmine.yml.auto-report.enabled
  enabled: false
  send-code: true
  send-settings: true
  send-phpinfo: false
  use-https: true
  host: crash.pmmp.io

anonymous-statistics:
  #! pocketmine.yml.anonymous-statistics.enabled
  enabled: false
  host: stats.pocketmine.net

auto-updater:
  #! pocketmine.yml.auto-updater.enabled
  enabled: false
  on-update:
    warn-console: true
  #! pocketmine.yml.auto-updater.preferred-channel
  preferred-channel: stable
  #! pocketmine.yml.auto-updater.suggest-channels
  suggest-channels: true
  host: update.pmmp.io

timings:
  #! pocketmine.yml.timings.host
  host: timings.pmmp.io

console:
  #! pocketmine.yml.console.enable-input
  enable-input: true
  #! pocketmine.yml.console.title-tick
  title-tick: true

aliases:
  #! pocketmine.yml.aliases.1

  #! pocketmine.yml.aliases.2
  #stop: []

  #! pocketmine.yml.aliases.3
  #abort: [pocketmine:stop]

  #! pocketmine.yml.aliases.4
  #showtheversion: [version]
  #savestop: [save-all, stop]

  #! pocketmine.yml.aliases.5
  #giveadmin: [op $1] ## `giveadmin alex` -> `op alex`
  #kill: [suicide, say "I tried to kill $1"] ## `kill alex` -> `suicide` + `say "I tried to kill alex"`
  #giverandom: [give $1 $2, say "Someone has just received a $2!"] ## `giverandom alex diamond` -> `give alex diamond` + `say "Someone has just received a diamond!"`

  #! pocketmine.yml.aliases.6
  #makeadmin: [op $$1] ## `makeadmin alex` -> `op alex`, `makeadmin` with no arguments = error

  #! pocketmine.yml.aliases.7
  #tpalias: [tp $1-] ## `tpalias 256 70 256` -> `tp 256 70 256` - this passes arguments 1 and everything after it to the `tp` command

  #! pocketmine.yml.aliases.8
  #tp: [suicide]

worlds:
  #! pocketmine.yml.worlds
  #world:
  # seed: 404
  # generator: FLAT
  # preset: 2;bedrock,59xstone,3xdirt,grass;1

plugins:
  #! pocketmine.yml.plugins.legacy-data-dir
  legacy-data-dir: false

better-pmmp:
  #! pocketmine.betterpmmp.yml.config
  config:
    #! pocketmine.betterpmmp.yml.config.enforce-format
    enforce-format: false

  #! pocketmine.betterpmmp.yml.world
  world:
    #! pocketmine.betterpmmp.yml.world.block-cache-size
    block-cache-size: 2048
    #! pocketmine.betterpmmp.yml.world.neighbour-update-limit
    neighbour-update-limit: 0
    #! pocketmine.betterpmmp.yml.world.freeze-empty-worlds
    freeze-empty-worlds: false
    #! pocketmine.betterpmmp.yml.world.view-distance-per-world
    view-distance-per-world: {}
    #! pocketmine.betterpmmp.yml.world.chunk-ticking
    chunk-ticking:
      #! pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit
      batch-recheck-limit: 64
      #! pocketmine.betterpmmp.yml.world.chunk-ticking.per-world
      per-world: {}

  #! pocketmine.betterpmmp.yml.lighting
  lighting:
    #! pocketmine.betterpmmp.yml.lighting.fixed-light
    fixed-light: false
    #! pocketmine.betterpmmp.yml.lighting.fixed-light-level
    fixed-light-level: 15
    #! pocketmine.betterpmmp.yml.lighting.skip-runtime-updates
    skip-runtime-updates: false

  #! pocketmine.betterpmmp.yml.entities
  entities:
    #! pocketmine.betterpmmp.yml.entities.item-merging
    item-merging: true
    #! pocketmine.betterpmmp.yml.entities.item-despawn-ticks
    item-despawn-ticks: 6000
    #! pocketmine.betterpmmp.yml.entities.xp-orbs
    xp-orbs: true
    #! pocketmine.betterpmmp.yml.entities.pickup-scan-period
    pickup-scan-period: 1

  #! pocketmine.betterpmmp.yml.combat
  combat:
    #! pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint
    critical-hit-ignore-sprint: false
    #! pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance
    critical-hit-min-fall-distance: 0.0
    #! pocketmine.betterpmmp.yml.combat.explosion-block-destruction
    explosion-block-destruction: true
    #! pocketmine.betterpmmp.yml.combat.instant-hit-feedback
    instant-hit-feedback: true

  #! pocketmine.betterpmmp.yml.network
  network:
    #! pocketmine.betterpmmp.yml.network.snappy-compression
    snappy-compression: false
    #! pocketmine.betterpmmp.yml.network.movement-broadcast-period
    movement-broadcast-period: 1
    #! pocketmine.betterpmmp.yml.network.rotation-broadcast-period
    rotation-broadcast-period: 1
    #! pocketmine.betterpmmp.yml.network.skip-movement-send-event
    skip-movement-send-event: false
    #! pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event
    skip-auth-input-receive-event: false
    #! pocketmine.betterpmmp.yml.network.interaction-spam-window
    interaction-spam-window: 20
    #! pocketmine.betterpmmp.yml.network.block-sync-snapshot
    block-sync-snapshot: true
    #! pocketmine.betterpmmp.yml.network.chunk-history-limit
    chunk-history-limit: 8192

  #! pocketmine.betterpmmp.yml.events
  events:
    #! pocketmine.betterpmmp.yml.events.move-event-period
    move-event-period: 1

  #! pocketmine.betterpmmp.yml.recipes
  recipes:
    #! pocketmine.betterpmmp.yml.recipes.load-vanilla
    load-vanilla: true

  #! pocketmine.betterpmmp.yml.plugins
  plugins:
    #! pocketmine.betterpmmp.yml.plugins.lifecycle-log
    lifecycle-log: true

  #! pocketmine.betterpmmp.yml.gameplay
  gameplay:
    #! pocketmine.betterpmmp.yml.gameplay.hunger-exhaustion
    hunger-exhaustion: true
    #! pocketmine.betterpmmp.yml.gameplay.fall-damage
    fall-damage: true
    #! pocketmine.betterpmmp.yml.gameplay.iron-door-hand-interaction
    iron-door-hand-interaction: false
    #! pocketmine.betterpmmp.yml.gameplay.farmland-persistent
    farmland-persistent: false
    #! pocketmine.betterpmmp.yml.gameplay.farmland-instant-hydration
    farmland-instant-hydration: false
