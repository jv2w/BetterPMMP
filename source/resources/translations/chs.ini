pocketmine.betterpmmp.yml.config=此配置文件自身的格式。
pocketmine.betterpmmp.yml.config.enforce-format=为 true 时，每次启动都会将此文件重写为 BetterPMMP 布局：注释和键顺序会按服务器语言的此模板重置，所有值均会保留。\n模板中不存在的键会保留其值，但会失去注释并被移动到所在部分的末尾。\n您自己添加的注释不会被保留。
pocketmine.betterpmmp.yml.world=世界、区块与视距调节。
pocketmine.betterpmmp.yml.world.block-cache-size=每个世界的方块/碰撞缓存大小。越大方块查询开销越低。
pocketmine.betterpmmp.yml.world.neighbour-update-limit=每刻最大相邻方块更新数。0 表示无限制。
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=无玩家的世界每100刻只运行1刻，直到有人加入。
pocketmine.betterpmmp.yml.world.view-distance-per-world=按世界文件夹名设置的每世界视距。
pocketmine.betterpmmp.yml.world.chunk-ticking=区块刻更新限制与每世界覆盖。
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=每刻重新检查可刻更新的最大区块数。0 表示无限制。
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=按世界文件夹名设置的每世界区块刻更新。
pocketmine.betterpmmp.yml.lighting=服务端光照生成与更新。
pocketmine.betterpmmp.yml.lighting.fixed-light=跳过异步光照生成，用固定值填充光照。
pocketmine.betterpmmp.yml.lighting.fixed-light-level=启用 fixed-light 时使用的光照等级（0 到 15）。
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=方块变化时跳过运行时光照重新计算。
pocketmine.betterpmmp.yml.entities=掉落物与经验球行为。
pocketmine.betterpmmp.yml.entities.item-merging=将附近掉落物合并成堆。
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=掉落物消失时间（刻）（原版为6000）。-1：永不消失。
pocketmine.betterpmmp.yml.entities.xp-orbs=生成经验球。禁用可跳过其每刻扫描。
pocketmine.betterpmmp.yml.entities.pickup-scan-period=每 N 刻扫描一次拾取（1 为原版）。
pocketmine.betterpmmp.yml.combat=暴击与爆炸伤害。
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=允许冲刺时触发暴击。
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=触发暴击所需的最小下落距离（原版为0.0）。
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=允许爆炸破坏方块。
pocketmine.betterpmmp.yml.network=数据包压缩与移动广播节流。
pocketmine.betterpmmp.yml.network.snappy-compression=使用 Snappy 压缩代替 zlib。官方二进制已内置；仅自定义 PHP 构建需要 snappy 扩展。
pocketmine.betterpmmp.yml.network.movement-broadcast-period=每 N 刻广播一次移动数据包（1 为原版）。
pocketmine.betterpmmp.yml.network.skip-movement-send-event=对移动数据包跳过 DataPacketSendEvent。
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=对玩家输入数据包跳过 DataPacketReceiveEvent。
pocketmine.betterpmmp.yml.events=游戏事件节流。
pocketmine.betterpmmp.yml.events.move-event-period=每 N 刻触发一次 PlayerMoveEvent（1 为原版）。
pocketmine.betterpmmp.yml.recipes=原版配方注册。
pocketmine.betterpmmp.yml.recipes.load-vanilla=启动时加载原版合成、熔炉与酿造配方。
pocketmine.betterpmmp.yml.plugins=插件日志。
pocketmine.betterpmmp.yml.gameplay=游戏机制开关。
pocketmine.betterpmmp.yml.gameplay.hunger-exhaustion=移动、跳跃、攻击、挖掘、受伤、生命恢复和药水等所有原因产生的饥饿消耗。禁用后将完全跳过该机制。
pocketmine.betterpmmp.yml.gameplay.fall-damage=生物的摔落伤害。禁用后将完全跳过摔落伤害流程。
pocketmine.betterpmmp.yml.gameplay.iron-door-hand-interaction=用手交互即可开关铁门和铁活板门。默认关闭，因为原版只能用红石打开它们；开启可恢复 PocketMine-MP 的行为。
pocketmine.betterpmmp.yml.gameplay.farmland-persistent=耕地永不干涸、被踩踏或变回泥土。完全湿润的耕地会跳过水源扫描。
pocketmine.betterpmmp.yml.gameplay.farmland-instant-hydration=通过耕作或放置产生的耕地一开始就完全湿润。
pocketmine.betterpmmp.yml.combat.instant-hit-feedback=立即发送近战与弹射物的命中反馈，而非在刻末发送，为受击方与攻击方减少最多 50ms 的体感命中延迟。
pocketmine.betterpmmp.yml.network.interaction-spam-window=丢弃客户端重复交互数据包的时间窗口（毫秒，上游为 100）。默认值 20 会移除每秒 10 次点击的上限；若仍有重复交互通过则调高该值。
pocketmine.betterpmmp.yml.network.block-sync-snapshot=当交互未改变被点击的方块时跳过重发该方块，每次交互可省下一个数据包。周围方块始终发送，用于覆盖客户端的预测。
pocketmine.betterpmmp.yml.network.chunk-history-limit=每个会话记住的最大区块坐标数，用于在切换世界时清除残留区块。0 表示无限制（整个会话期间持续增长）。
pocketmine.betterpmmp.yml.plugins.lifecycle-log=记录每个插件的加载、启用与禁用。
pocketmine.yml.header=PocketMine-MP 的主配置文件\n这些是无法放入 server.properties 的设置\n有些设置是安全的，有些如果修改不当会破坏你的服务器\n升级时新设置/默认值不会自动出现在此文件中。
pocketmine.yml.settings.force-language=是否将所有字符串翻译为服务器语言后发送，或交由设备处理
pocketmine.yml.settings.query-plugins=允许通过 Query 列出插件
pocketmine.yml.settings.enable-profiling=默认启用插件和核心性能分析
pocketmine.yml.settings.profile-report-trigger=仅当刻测量值小于或等于给定值时才添加结果（默认 20）
pocketmine.yml.settings.async-workers=AsyncTask 工作线程数。\n用于插件异步任务、世界生成、压缩和网络通信。\n大致按你的核心数设置。\n设为 auto 时会尝试检测核心数（或使用 2）
pocketmine.yml.settings.enable-dev-builds=是否允许运行开发版本。开发版本可能崩溃、破坏插件、损坏世界等。\n建议尽量避免使用开发版本。
pocketmine.yml.memory.global-limit=全局软内存限制（MB）。设为 0 禁用\n当使用量超过此值时会触发 low-memory-triggers 并触发释放内存的事件
pocketmine.yml.memory.main-limit=主线程软内存限制（MB）。设为 0 禁用\n当使用量超过此值时会触发 low-memory-triggers 并触发释放内存的事件
pocketmine.yml.memory.main-hard-limit=主线程硬内存限制（MB）。设为 0 禁用\n超过限制时将停止服务器
pocketmine.yml.memory.async-worker-hard-limit=AsyncWorker 线程的硬内存限制（MB）。设为 0 禁用\n如果任务超过限制，将使工作线程上当前执行的任务崩溃\n注意：此限制按每个工作线程应用，而非整个进程。
pocketmine.yml.memory.check-rate=检查内存的周期（刻）（默认 1 秒）
pocketmine.yml.memory.continuous-trigger=在低内存时持续触发 low-memory-triggers 和事件
pocketmine.yml.memory.continuous-trigger-rate=仅当启用 memory.continuous-trigger 时。以 memory.check-rate 为单位指定频率（默认 30 秒）
pocketmine.yml.memory.garbage-collection.period=手动触发垃圾回收器的周期（刻）（默认 30 分钟），设为 0 禁用\n这只影响主线程。其他线程应各自触发回收
pocketmine.yml.memory.memory-dump=控制内存转储处理的设置。
pocketmine.yml.memory.memory-dump.dump-async-worker=同时转储异步工作线程和主线程的内存。如果转储内存时出现段错误问题，请禁用此设置。
pocketmine.yml.memory.max-chunks.chunk-radius=当触发低内存时限制每位玩家的最大渲染距离。设为 0 取消限制。
pocketmine.yml.network.batch-threshold=打包数据包的阈值（字节）。只有这些数据包会被压缩\n设为 0 压缩全部，-1 禁用。
pocketmine.yml.network.compression-level=发送批量数据包时使用的压缩等级。越高 CPU 越多，带宽占用越少。仅限 zlib - Snappy 没有压缩等级设置，因此 better-pmmp.network.snappy-compression 开启时此项会被忽略
pocketmine.yml.network.async-compression=在主游戏会话期间使用 AsyncTask 进行压缩。会增加延迟，但可能减轻主线程负载
pocketmine.yml.network.async-compression-threshold=异步压缩的阈值（字节）。只有大于此值的数据包才会异步压缩\n由于 AsyncTask 开销较大，除大数据包外异步压缩并不划算
pocketmine.yml.network.upnp-forwarding=实验性。使用 UPnP 自动端口转发
pocketmine.yml.network.max-mtu-size=通过网络发送的数据包最大大小（字节）（默认 1492）。大于此值的数据包将\n被分片或拆分为更小的部分。客户端可请求不超过此值的 MTU 大小。
pocketmine.yml.network.enable-encryption=启用 Minecraft 网络流量加密。这会影响性能，但可防止黑客窃取会话并假冒其他玩家。\n除非你了解其中的风险，否则请勿禁用。
pocketmine.yml.debug.level=如果大于 1，将在控制台显示调试消息
pocketmine.yml.player.save-player-data=选择是否启用玩家数据保存。
pocketmine.yml.player.verify-xuid=如果为 true，检查加入玩家的 Xbox 用户 ID（XUID）是否与之前记录的一致。\n这也能防止在 xbox-auth=off 的服务器上，非 XBL 玩家使用 XBL 玩家的用户名窃取其数据。
pocketmine.yml.level-settings.default-format=创建世界时使用的默认格式
pocketmine.yml.chunk-sending.per-tick=要更改服务器的普通渲染距离，请更改 server.properties 中的 view-distance。\n每刻发送给玩家的区块数量
pocketmine.yml.chunk-sending.spawn-radius=生成玩家前需要发送的区块半径
pocketmine.yml.chunk-ticking.tick-radius=在玩家周围进行刻更新的区块半径
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=刻更新区域子区块内每刻被刻更新的方块数。较高的值会加速树木和植物生长等\n事件，但性能开销更高。
pocketmine.yml.chunk-ticking.disable-block-ticking=不进行随机刻更新的方块 ID。
pocketmine.yml.chunk-generation.population-queue-size=等待填充队列中的最大区块数
pocketmine.yml.auto-report.enabled=将崩溃报告发送到下方的主机进行处理。默认关闭：默认主机属于已归档的 PocketMine-MP 项目，而非 BetterPMMP。
pocketmine.yml.anonymous-statistics.enabled=发送匿名统计信息用于数据汇总、插件使用情况追踪
pocketmine.yml.auto-updater.enabled=启动时检查新版本。默认关闭：默认主机提供的是 PocketMine-MP 的版本，与 BetterPMMP 的版本无关。
pocketmine.yml.auto-updater.preferred-channel=可以是 development、alpha、beta 或 stable。
pocketmine.yml.auto-updater.suggest-channels=如果使用开发版本，将建议更改频道
pocketmine.yml.timings.host=选择用于查看 timings 结果的主机。
pocketmine.yml.console.enable-input=是否通过控制台接受命令。如果禁用，在控制台输入的任何内容都会被忽略。\n对于从不使用控制台的无头服务器（托管服务器、Docker 等）可节省资源。
pocketmine.yml.console.title-tick=选择是否在控制台标题上启用服务器统计报告。\n注意：如果控制台颜色未启用，标题滚动将一并禁用。
pocketmine.yml.aliases.1=此部分允许你添加、删除或重新映射命令别名。\n单个别名可以调用一个或多个其他命令（或别名）。\n此处定义的别名将覆盖插件或 PocketMine-MP 自身声明的任何命令别名。
pocketmine.yml.aliases.2=要删除别名，将其设为 []，如下所示（注意像 "pocketmine:stop" 这样的前缀别名会保留且\n无法删除）:
pocketmine.yml.aliases.3=只删除别名，不删除命令本身。即使所有别名都被覆盖，你仍可使用命令的完整（带前缀）\n名称引用它。完整名称通常类似 "pocketmine:commandname" 或\n"pluginname:commandname"。
pocketmine.yml.aliases.4=要添加别名，列出它调用的命令:
pocketmine.yml.aliases.5=要带参数调用另一个命令，用 $1 传递第一个参数、$2 传递第二个，依此类推:
pocketmine.yml.aliases.6=要使参数必填（未提供时命令失败），使用 $$，例如 $$1、$$2:
pocketmine.yml.aliases.7=要透传一段范围的参数，在索引后加 -（连字符）:
pocketmine.yml.aliases.8=要更改现有命令别名并让它做别的事:
pocketmine.yml.worlds=这些设置将覆盖 server.properties 中设置的生成器，并允许加载多个世界\n示例:
pocketmine.yml.plugins.legacy-data-dir=将其设为 true 会使用旧结构，将插件数据放在 --plugins 目录内。\nfalse 则将插件数据放在 --data 下的 plugin_data 中。\n此选项是为了与现有安装保持向后兼容而存在。

pocketmine.resource-packs.yml.header=此配置文件控制 PocketMine-MP 服务器使用的全局资源。
pocketmine.resource-packs.yml.force-resources=选择玩家是否必须使用你选定的资源包才能加入服务器。\n注意: 如果下面的堆栈中没有资源包，此项将不起作用。
pocketmine.resource-packs.yml.stack=此处的资源包按从下到上的顺序应用。这意味着较上层资源包中的资源会覆盖较下层的资源。\n每个条目必须填写资源包的文件名。\n示例:
pocketmine.resource-packs.yml.stack.force-vanilla=如果你想强制客户端使用原版资源，必须在 resources 文件夹中放入一个原版资源包并将其添加到此堆栈中。
pocketmine.resource-packs.yml.stack.encryption-key=要指定资源加密密钥，请将密钥放入资源包旁边的 <resource>.key 文件中。示例: vanilla.zip.key

