; Strings without a "pocketmine." prefix are assumed to be vanilla translations.
; Those are sent as raw translation keys for the client to translate into its own language.
;
; Any NON-VANILLA string MUST have a key prefixed with "pocketmine." to ensure it is translated by the server.
; (Yes, this file currently doesn't follow these rules in many places. It's a work in progress to clean up.)

pocketmine.command.restart.description=Server neu starten
pocketmine.command.restart.start=Server wird neu gestartet...
pocketmine.betterpmmp.yml.config=Formatierung dieser Konfigurationsdatei.
pocketmine.betterpmmp.yml.config.enforce-format=Wenn true, wird diese Datei bei jedem Start in das BetterPMMP-Layout umgeschrieben: Kommentare und Schlüsselreihenfolge werden auf diese Vorlage in der Serversprache zurückgesetzt, alle Werte bleiben erhalten.\nSchlüssel, die nicht in dieser Vorlage stehen, behalten ihre Werte, verlieren aber ihre Kommentare und werden an das Ende ihres Abschnitts verschoben.
pocketmine.betterpmmp.yml.world=Welt-, Chunk- und Sichtweiten-Einstellungen.
pocketmine.betterpmmp.yml.world.block-cache-size=Block- und Kollisions-Cachegröße pro Welt. Höher senkt die Blockabfragekosten.
pocketmine.betterpmmp.yml.world.neighbour-update-limit=Maximale Nachbarblock-Updates pro Tick. 0 für unbegrenzt.
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=Welten ohne Spieler laufen 1 Tick pro 100, bis jemand beitritt.
pocketmine.betterpmmp.yml.world.view-distance-per-world=Sichtweite pro Welt, nach Weltordnernamen.
pocketmine.betterpmmp.yml.world.chunk-ticking=Chunk-Ticking-Grenzen und weltbezogene Überschreibungen.
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=Maximale Chunks pro Tick auf Tick-Eignung geprüft. 0 für unbegrenzt.
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=Chunk-Ticking pro Welt, nach Weltordnernamen.
pocketmine.betterpmmp.yml.lighting=Serverseitige Lichtberechnung und -aktualisierung.
pocketmine.betterpmmp.yml.lighting.fixed-light=Asynchrone Lichtberechnung überspringen und Licht mit festem Wert füllen.
pocketmine.betterpmmp.yml.lighting.fixed-light-level=Lichtstärke bei aktiviertem fixed-light (0 bis 15).
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=Laufzeit-Lichtneuberechnung bei Blockänderungen überspringen.
pocketmine.betterpmmp.yml.entities=Verhalten von fallengelassenen Items und XP-Kugeln.
pocketmine.betterpmmp.yml.entities.item-merging=Nahe fallengelassene Items zu Stapeln zusammenführen.
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=Verschwindezeit für fallengelassene Items in Ticks (Vanilla 6000). -1: Items verschwinden nie.
pocketmine.betterpmmp.yml.entities.xp-orbs=XP-Kugeln erzeugen. Deaktivieren überspringt ihre Prüfungen pro Tick.
pocketmine.betterpmmp.yml.entities.pickup-scan-period=Alle N Ticks nach Aufsammelbarem suchen (1 für Vanilla).
pocketmine.betterpmmp.yml.combat=Kritische Treffer und Explosionsschaden.
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=Kritische Treffer auch beim Sprinten erlauben.
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=Mindestfallhöhe für einen kritischen Treffer (Vanilla 0.0).
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=Explosionen Blöcke zerstören lassen.
pocketmine.betterpmmp.yml.network=Paketkompression und Bewegungs-Broadcast-Drosselung.
pocketmine.betterpmmp.yml.network.snappy-compression=Snappy-Kompression statt zlib verwenden. In der offiziellen Binärdatei enthalten; die snappy-Erweiterung wird nur bei benutzerdefinierten PHP-Builds benötigt.
pocketmine.betterpmmp.yml.network.movement-broadcast-period=Bewegungspakete alle N Ticks senden (1 für Vanilla).
pocketmine.betterpmmp.yml.network.skip-movement-send-event=DataPacketSendEvent für Bewegungspakete überspringen.
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=DataPacketReceiveEvent für Spieler-Eingabepakete überspringen.
pocketmine.betterpmmp.yml.events=Gameplay-Event-Drosselung.
pocketmine.betterpmmp.yml.events.move-event-period=PlayerMoveEvent alle N Ticks auslösen (1 für Vanilla).
pocketmine.betterpmmp.yml.recipes=Vanilla-Rezeptregistrierung.
pocketmine.betterpmmp.yml.recipes.load-vanilla=Vanilla-Rezepte für Werkbank, Ofen und Brauen beim Start laden.
pocketmine.betterpmmp.yml.plugins=Plugin-Protokollierung.
pocketmine.betterpmmp.yml.plugins.load-log=Für jedes Plugin beim Laden "Loading <Plugin>" protokollieren.
pocketmine.betterpmmp.yml.plugins.enable-log=Für jedes Plugin beim Aktivieren "Enabling <Plugin>" protokollieren.
pocketmine.betterpmmp.yml.plugins.disable-log=Für jedes Plugin beim Deaktivieren "Disabling <Plugin>" protokollieren.
pocketmine.betterpmmp.yml.gameplay=Umschalter für Spielmechaniken.
pocketmine.betterpmmp.yml.gameplay.movement-exhaustion=Hungerverbrauch durch Gehen, Sprinten und Springen. Deaktivieren überspringt die gesamte Mechanik.
pocketmine.betterpmmp.yml.gameplay.fall-damage=Fallschaden für Lebewesen. Deaktivieren überspringt den gesamten Fallschaden-Pfad.
pocketmine.betterpmmp.yml.gameplay.farmland-persistent=Ackerland trocknet nie aus, wird nie zertrampelt und verwandelt sich nie in Erde zurück. Vollständig nasses Ackerland überspringt seine Wassersuche.
pocketmine.betterpmmp.yml.gameplay.farmland-instant-hydration=Durch Pflügen oder Platzieren erzeugtes Ackerland ist von Anfang an vollständig bewässert.
pocketmine.yml.header=Hauptkonfigurationsdatei für PocketMine-MP\nDies sind die Einstellungen, die nicht in server.properties aufgenommen werden können\nEinige davon sind sicher, andere können deinen Server beschädigen, wenn sie falsch geändert werden\nNeue Einstellungen/Standardwerte erscheinen beim Upgrade nicht automatisch in dieser Datei.
pocketmine.yml.settings.force-language=Ob alle Zeichenketten in die Server-Locale übersetzt gesendet werden oder das Gerät sie verarbeitet
pocketmine.yml.settings.query-plugins=Auflisten von Plugins über Query erlauben
pocketmine.yml.settings.enable-profiling=Plugin- und Core-Profiling standardmäßig aktivieren
pocketmine.yml.settings.profile-report-trigger=Fügt nur Ergebnisse hinzu, wenn die Tick-Messung kleiner oder gleich dem angegebenen Wert ist (Standard 20)
pocketmine.yml.settings.async-workers=Anzahl der AsyncTask-Worker.\nWird für asynchrone Plugin-Aufgaben, Weltgenerierung, Komprimierung und Web-Kommunikation verwendet.\nSetze dies ungefähr auf deine Anzahl an Kernen.\nAuf auto gesetzt, wird versucht, die Kernanzahl zu erkennen (oder 2 verwendet)
pocketmine.yml.settings.enable-dev-builds=Ob Entwicklungs-Builds ausgeführt werden dürfen. Dev-Builds können abstürzen, Plugins beschädigen, deine Welt zerstören und mehr.\nEs wird empfohlen, Entwicklungs-Builds nach Möglichkeit zu vermeiden.
pocketmine.yml.memory.global-limit=Globales weiches Speicherlimit in Megabyte. Auf 0 setzen zum Deaktivieren\nDies löst low-memory-triggers aus und feuert ein Event zum Freigeben von Speicher, wenn die Nutzung darüber steigt
pocketmine.yml.memory.main-limit=Weiches Speicherlimit des Hauptthreads in Megabyte. Auf 0 setzen zum Deaktivieren\nDies löst low-memory-triggers aus und feuert ein Event zum Freigeben von Speicher, wenn die Nutzung darüber steigt
pocketmine.yml.memory.main-hard-limit=Hartes Speicherlimit des Hauptthreads in Megabyte. Auf 0 setzen zum Deaktivieren\nDies stoppt den Server, wenn das Limit überschritten wird
pocketmine.yml.memory.async-worker-hard-limit=Hartes Speicherlimit der AsyncWorker-Threads in Megabyte. Auf 0 setzen zum Deaktivieren\nDies bricht die aktuell auf dem Worker laufende Aufgabe ab, wenn sie das Limit überschreitet\nHINWEIS: DIESES LIMIT GILT PRO WORKER, NICHT FÜR DEN GESAMTEN PROZESS.
pocketmine.yml.memory.check-rate=Zeitraum in Ticks zum Prüfen des Speichers (Standard 1 Sekunde)
pocketmine.yml.memory.continuous-trigger=low-memory-triggers und Event bei wenig Speicher weiterhin auslösen
pocketmine.yml.memory.continuous-trigger-rate=Nur wenn memory.continuous-trigger aktiviert ist. Gibt die Rate in memory.check-rate-Schritten an (Standard 30 Sekunden)
pocketmine.yml.memory.garbage-collection.period=Zeitraum in Ticks, um den Garbage Collector manuell auszulösen (Standard 30 Minuten), auf 0 setzen zum Deaktivieren\nDies betrifft nur den Hauptthread. Andere Threads sollten ihre eigenen Sammlungen auslösen
pocketmine.yml.memory.memory-dump=Einstellungen zur Steuerung der Speicherabbild-Behandlung.
pocketmine.yml.memory.memory-dump.dump-async-worker=Speicher sowohl von Async-Workern als auch vom Hauptthread abbilden. Bei Segfaults beim Abbilden diese Einstellung deaktivieren.
pocketmine.yml.memory.max-chunks.chunk-radius=Maximale Renderdistanz pro Spieler begrenzen, wenn wenig Speicher ausgelöst wird. Auf 0 setzen, um die Begrenzung zu deaktivieren.
pocketmine.yml.network.batch-threshold=Schwellenwert für das Bündeln von Paketen, in Bytes. Nur diese Pakete werden komprimiert\nAuf 0 setzen, um alles zu komprimieren, -1 zum Deaktivieren.
pocketmine.yml.network.compression-level=Beim Senden gebündelter Pakete verwendete Komprimierungsstufe. Höher = mehr CPU, weniger Bandbreitennutzung. Nur zlib - Snappy hat keine Stufeneinstellung, daher wird dies ignoriert, solange better-pmmp.network.snappy-compression aktiv ist
pocketmine.yml.network.async-compression=AsyncTasks für die Komprimierung während der Hauptspielsitzung verwenden. Erhöht die Latenz, kann aber die Last des Hauptthreads reduzieren
pocketmine.yml.network.async-compression-threshold=Schwellenwert für asynchrone Komprimierung, in Bytes. Nur Pakete größer als dies werden asynchron komprimiert\nWegen des großen Overheads von AsyncTask lohnt sich asynchrone Komprimierung nur bei großen Paketen
pocketmine.yml.network.upnp-forwarding=Experimentell. UPnP verwenden, um automatisch Ports weiterzuleiten
pocketmine.yml.network.max-mtu-size=Maximale Größe der über das Netzwerk gesendeten Pakete in Bytes (Standard 1492). Größere Pakete werden\nfragmentiert oder in kleinere Teile aufgeteilt. Clients können MTU-Größen bis zu, aber nicht mehr als diesen Wert anfordern.
pocketmine.yml.network.enable-encryption=Verschlüsselung des Minecraft-Netzwerkverkehrs aktivieren. Dies wirkt sich auf die Leistung aus, verhindert aber, dass Hacker Sitzungen stehlen und sich als andere Spieler ausgeben.\nDEAKTIVIERE DIES NICHT, es sei denn, du verstehst die damit verbundenen Risiken.
pocketmine.yml.debug.level=Wenn > 1, werden Debug-Nachrichten in der Konsole angezeigt
pocketmine.yml.player.save-player-data=Wähle, ob das Speichern von Spielerdaten aktiviert werden soll.
pocketmine.yml.player.verify-xuid=Wenn true, wird geprüft, ob die Xbox-Benutzer-ID (XUID) beitretender Spieler mit der zuvor aufgezeichneten übereinstimmt.\nDies verhindert auch, dass Nicht-XBL-Spieler die Benutzernamen von XBL-Spielern verwenden, um deren Daten auf Servern mit xbox-auth=off zu stehlen.
pocketmine.yml.level-settings.default-format=Das Standardformat, das Welten bei der Erstellung verwenden
pocketmine.yml.chunk-sending.per-tick=Um die normale Renderdistanz des Servers zu ändern, ändere view-distance in server.properties.\nAnzahl der pro Tick an Spieler gesendeten Chunks
pocketmine.yml.chunk-sending.spawn-radius=Radius der Chunks, die gesendet werden müssen, bevor der Spieler gespawnt wird
pocketmine.yml.chunk-ticking.tick-radius=Radius der Chunks um einen Spieler, die getickt werden
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=Anzahl der Blöcke in den Subchunks der Tick-Bereiche, die jeden Tick getickt werden. Höhere Werte beschleunigen Ereignisse\nwie Baum- und Pflanzenwachstum, aber zu höheren Leistungskosten.
pocketmine.yml.chunk-ticking.disable-block-ticking=IDs von Blöcken, für die kein zufälliges Ticken durchgeführt wird.
pocketmine.yml.chunk-generation.population-queue-size=Max. Anzahl von Chunks in der Warteschlange, die bevölkert werden sollen
pocketmine.yml.auto-report.enabled=Absturzberichte zur Verarbeitung senden
pocketmine.yml.anonymous-statistics.enabled=Sendet anonyme Statistiken zur Datenaggregation und Verfolgung der Plugin-Nutzung
pocketmine.yml.auto-updater.preferred-channel=Kann development, alpha, beta oder stable sein.
pocketmine.yml.auto-updater.suggest-channels=Bei Verwendung einer Entwicklungsversion wird vorgeschlagen, den Channel zu wechseln
pocketmine.yml.timings.host=Wähle den Host zum Anzeigen deiner Timings-Ergebnisse.
pocketmine.yml.console.enable-input=Ob Befehle über die Konsole akzeptiert werden. Wenn deaktiviert, wird alles, was in die Konsole eingegeben wird, ignoriert.\nNützlich, um Ressourcen auf Headless-Servern zu sparen, auf denen die Konsole nie genutzt wird (z. B. gehosteter Server, Docker usw.).
pocketmine.yml.console.title-tick=Wähle, ob die Server-Statistikanzeige im Konsolentitel aktiviert werden soll.\nHINWEIS: Der Titel-Ticker wird unabhängig davon deaktiviert, wenn die Konsolenfarben nicht aktiviert sind.
pocketmine.yml.aliases.1=In diesem Abschnitt kannst du Befehls-Aliase hinzufügen, entfernen oder neu zuordnen.\nEin einzelner Alias kann einen oder mehrere andere Befehle (oder Aliase) aufrufen.\nHier definierte Aliase überschreiben alle von Plugins oder PocketMine-MP selbst deklarierten Befehls-Aliase.
pocketmine.yml.aliases.2=Um einen Alias zu entfernen, setze ihn auf [], wie hier (beachte, dass präfixierte Aliase wie "pocketmine:stop" bestehen bleiben und\nnicht entfernt werden können):
pocketmine.yml.aliases.3=Befehle werden nicht entfernt, nur ihre Aliase. Du kannst einen Befehl weiterhin über seinen vollständigen (präfixierten)\nNamen aufrufen, selbst wenn alle seine Aliase überschrieben sind. Der vollständige Name ist meist etwas wie "pocketmine:commandname" oder\n"pluginname:commandname".
pocketmine.yml.aliases.4=Um einen Alias hinzuzufügen, liste die Befehle auf, die er aufruft:
pocketmine.yml.aliases.5=Um einen anderen Befehl mit Argumenten aufzurufen, verwende $1 für das erste Argument, $2 für das zweite usw.:
pocketmine.yml.aliases.6=Um Argumente verpflichtend zu machen (sodass der Befehl fehlschlägt, wenn sie nicht angegeben werden), verwende $$, z. B. $$1, $$2:
pocketmine.yml.aliases.7=Um einen Bereich von Argumenten durchzureichen, setze ein - (Bindestrich) nach dem Index:
pocketmine.yml.aliases.8=Um einen bestehenden Befehls-Alias zu ändern und etwas anderes tun zu lassen:
pocketmine.yml.worlds=Diese Einstellungen überschreiben den in server.properties gesetzten Generator und erlauben das Laden mehrerer Welten\nBeispiel:
pocketmine.yml.plugins.legacy-data-dir=Wenn dies auf true gesetzt wird, wird die alte Struktur verwendet, bei der Plugin-Daten im --plugins-Verzeichnis abgelegt werden.\nFalse legt Plugin-Daten unter plugin_data unter --data ab.\nDiese Option existiert aus Gründen der Abwärtskompatibilität mit bestehenden Installationen.

pocketmine.resource-packs.yml.header=Diese Konfigurationsdatei steuert die globalen Ressourcen deines PocketMine-MP-Servers.
pocketmine.resource-packs.yml.force-resources=Wähle, ob Spieler deine ausgewählten Ressourcenpakete verwenden müssen, um dem Server beizutreten.\nHINWEIS: Dies bewirkt nichts, wenn im Stapel unten keine Ressourcenpakete vorhanden sind.
pocketmine.resource-packs.yml.stack=Ressourcenpakete werden hier von unten nach oben angewendet. Das bedeutet, dass Ressourcen in höheren Paketen die in niedrigeren überschreiben.\nEinträge hier müssen den Dateinamen des Ressourcenpakets angeben.\nBeispiel:
pocketmine.resource-packs.yml.stack.force-vanilla=Wenn du Clients zwingen möchtest, Vanilla-Ressourcen zu verwenden, musst du ein Vanilla-Ressourcenpaket in deinen resources-Ordner legen und es hier zum Stapel hinzufügen.
pocketmine.resource-packs.yml.stack.encryption-key=Um einen Ressourcen-Verschlüsselungsschlüssel anzugeben, lege den Schlüssel in die Datei <resource>.key neben dem Ressourcenpaket. Beispiel: vanilla.zip.key

