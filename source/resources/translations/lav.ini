; Strings without a "pocketmine." prefix are assumed to be vanilla translations.
; Those are sent as raw translation keys for the client to translate into its own language.
;
; Any NON-VANILLA string MUST have a key prefixed with "pocketmine." to ensure it is translated by the server.
; (Yes, this file currently doesn't follow these rules in many places. It's a work in progress to clean up.)

pocketmine.command.restart.description=Restartēt serveri
pocketmine.command.restart.start=Serveris tiek restartēts...
pocketmine.command.restart.failed=Restartēšana neizdevās: nevar ierakstīt karoga failu {%0}
pocketmine.betterpmmp.yml.config=Šī konfigurācijas faila formatējums.
pocketmine.betterpmmp.yml.config.enforce-format=Ja true, šis fails katrā palaišanas reizē tiek pārrakstīts BetterPMMP izkārtojumā: komentāri un atslēgu secība tiek atiestatīti pēc šīs veidnes servera valodā, visas vērtības tiek saglabātas.\nAtslēgas, kuru nav šajā veidnē, saglabā vērtības, bet zaudē komentārus un tiek pārvietotas uz savas sadaļas beigām.
pocketmine.betterpmmp.yml.world=Pasaules, gabalu un redzamības attāluma iestatījumi.
pocketmine.betterpmmp.yml.world.block-cache-size=Bloku/sadursmju keša izmērs katrai pasaulei. Lielāks samazina bloku meklēšanas izmaksas.
pocketmine.betterpmmp.yml.world.neighbour-update-limit=Maksimālais kaimiņu bloku atjauninājumu skaits vienā tikā. 0 nozīmē neierobežoti.
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=Pasaules bez spēlētājiem darbojas 1 tiku no 100, līdz kāds pievienojas.
pocketmine.betterpmmp.yml.world.view-distance-per-world=Redzamības attālums katrai pasaulei pēc pasaules mapes nosaukuma.
pocketmine.betterpmmp.yml.world.chunk-ticking=Gabalu tikšanas ierobežojumi un pārrakstīšana katrai pasaulei.
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=Maksimālais gabalu skaits, kas pārbaudīts tikšanas atbilstībai vienā tikā. 0 nozīmē neierobežoti.
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=Gabalu tikšana katrai pasaulei pēc pasaules mapes nosaukuma.
pocketmine.betterpmmp.yml.lighting=Servera puses gaismas ģenerēšana un atjaunināšana.
pocketmine.betterpmmp.yml.lighting.fixed-light=Izlaist asinhrono gaismas ģenerēšanu un aizpildīt gaismu ar fiksētu vērtību.
pocketmine.betterpmmp.yml.lighting.fixed-light-level=Gaismas līmenis, kad fixed-light ir ieslēgts (no 0 līdz 15).
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=Izlaist gaismas pārrēķinu izpildlaikā, kad bloki mainās.
pocketmine.betterpmmp.yml.entities=Nomesto priekšmetu un pieredzes lodīšu uzvedība.
pocketmine.betterpmmp.yml.entities.item-merging=Apvienot tuvumā nomestos priekšmetus kaudzēs.
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=Nomesto priekšmetu izzušanas laiks tikos (vaniļa 6000). -1: priekšmeti nekad neizzūd.
pocketmine.betterpmmp.yml.entities.xp-orbs=Radīt pieredzes lodītes. Atspējošana izlaiž to skenēšanu katrā tikā.
pocketmine.betterpmmp.yml.entities.pickup-scan-period=Skenēt paņemamos ik pēc N tikiem (1 nozīmē vaniļa).
pocketmine.betterpmmp.yml.combat=Kritiskie sitieni un sprādziena bojājumi.
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=Atļaut kritiskos sitienus skrienot.
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=Minimālais krišanas attālums kritiskajam sitienam (vaniļa 0.0).
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=Ļaut sprādzieniem iznīcināt blokus.
pocketmine.betterpmmp.yml.network=Pakešu saspiešana un kustības apraides ierobežošana.
pocketmine.betterpmmp.yml.network.snappy-compression=Izmantot Snappy saspiešanu zlib vietā. Iekļauts oficiālajā binārfailā; snappy paplašinājums nepieciešams tikai pielāgotos PHP būvējumos.
pocketmine.betterpmmp.yml.network.movement-broadcast-period=Raidīt kustības paketes ik pēc N tikiem (1 nozīmē vaniļa).
pocketmine.betterpmmp.yml.network.skip-movement-send-event=Izlaist DataPacketSendEvent kustības paketēm.
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=Izlaist DataPacketReceiveEvent spēlētāja ievades paketēm.
pocketmine.betterpmmp.yml.events=Spēles notikumu ierobežošana.
pocketmine.betterpmmp.yml.events.move-event-period=Izsaukt PlayerMoveEvent ik pēc N tikiem (1 nozīmē vaniļa).
pocketmine.betterpmmp.yml.recipes=Vaniļas recepšu reģistrācija.
pocketmine.betterpmmp.yml.recipes.load-vanilla=Ielādēt vaniļas darbgalda, krāsns un brūvēšanas receptes startējot.
pocketmine.betterpmmp.yml.plugins=Spraudņu žurnalēšana.
pocketmine.betterpmmp.yml.gameplay=Spēles mehāniku slēdži.
pocketmine.betterpmmp.yml.gameplay.hunger-exhaustion=Izsalkuma patēriņš no visiem cēloņiem: kustības, lekšanas, uzbrukuma, raktuvju darba, bojājumiem, atveseļošanās un dziras. Atspējojiet, lai pilnībā izlaistu šo mehāniku.
pocketmine.betterpmmp.yml.gameplay.fall-damage=Kritiena bojājumi dzīvām būtnēm. Atspējojiet, lai pilnībā izlaistu kritiena bojājumu apstrādi.
pocketmine.betterpmmp.yml.gameplay.iron-door-hand-interaction=Ļauj ar roku atvērt un aizvērt dzelzs durvis un dzelzs lūkas. Pēc noklusējuma izslēgts, jo oriģinālajā spēlē tās atveras tikai ar sarkano akmeni; ieslēdziet, lai atjaunotu PocketMine-MP uzvedību.
pocketmine.betterpmmp.yml.gameplay.farmland-persistent=Aramzeme nekad neizžūst, netiek samīdīta un nepārvēršas atpakaļ par zemi. Pilnībā slapja aramzeme izlaiž ūdens meklēšanu.
pocketmine.betterpmmp.yml.gameplay.farmland-instant-hydration=Aramzeme, kas izveidota arot vai novietojot, uzreiz ir pilnībā mitra.
pocketmine.betterpmmp.yml.combat.instant-hit-feedback=Nekavējoties nosūtīt tuvcīņas un šāviņu trāpījumu atgriezenisko saiti, nevis tika beigās, samazinot upurim un uzbrucējam jūtamo trieciena aizkavi par līdz pat 50 ms.
pocketmine.betterpmmp.yml.network.interaction-spam-window=Logs milisekundēs klienta dublēto mijiedarbības pakešu atmešanai (upstream 100). Noklusējuma vērtība 20 noņem 10 klikšķu sekundē ierobežojumu; palieliniet to, ja dublētas mijiedarbības tiek cauri.
pocketmine.betterpmmp.yml.network.block-sync-snapshot=Izlaist noklikšķinātā bloka atkārtotu sūtīšanu, ja mijiedarbība to nemainīja, ietaupot vienu paketi uz mijiedarbību. Apkārtējie bloki vienmēr tiek sūtīti, lai pārrakstītu klienta prognozi.
pocketmine.betterpmmp.yml.network.chunk-history-limit=Maksimālais katrā sesijā atcerēto gabalu pozīciju skaits, ko izmanto novecojušu gabalu dzēšanai pasaules maiņas laikā. 0 nozīmē neierobežoti (aug visas sesijas garumā).
pocketmine.betterpmmp.yml.plugins.lifecycle-log=Žurnalēt katra spraudņa ielādi, iespējošanu un atspējošanu.
pocketmine.yml.header=PocketMine-MP galvenais konfigurācijas fails\nŠie ir iestatījumi, kurus nevar iekļaut server.properties\nDaži ir droši, citi var sabojāt jūsu serveri, ja tie tiek nepareizi mainīti\nJaunināšanas laikā jauni iestatījumi/noklusējumi šajā failā automātiski neparādīsies.
pocketmine.yml.settings.force-language=Vai visas virknes sūtīt tulkotas servera lokalizācijā, vai ļaut ierīcei tās apstrādāt
pocketmine.yml.settings.query-plugins=Atļaut spraudņu uzskaitīšanu, izmantojot Query
pocketmine.yml.settings.enable-profiling=Pēc noklusējuma iespējot spraudņu un kodola profilēšanu
pocketmine.yml.settings.profile-report-trigger=Pievieno rezultātus tikai tad, kad tika mērījums ir mazāks vai vienāds ar doto vērtību (noklusējums 20)
pocketmine.yml.settings.async-workers=AsyncTask strādnieku skaits.\nTiek izmantoti spraudņu asinhronajiem uzdevumiem, pasaules ģenerēšanai, saspiešanai un tīmekļa saziņai.\nIestatiet to aptuveni jūsu kodolu skaitam.\nJa iestatīts uz auto, tas mēģinās noteikt kodolu skaitu (vai izmantos 2)
pocketmine.yml.settings.enable-dev-builds=Vai atļaut izstrādes būvējumu palaišanu. Izstrādes būvējumi var avarēt, sabojāt spraudņus, sabojāt pasauli un citu.\nIeteicams pēc iespējas izvairīties no izstrādes būvējumiem.
pocketmine.yml.memory.global-limit=Globālais mīkstais atmiņas limits megabaitos. Iestatiet 0, lai atspējotu\nTas iedarbina low-memory-triggers un izsauc notikumu atmiņas atbrīvošanai, kad lietojums pārsniedz šo
pocketmine.yml.memory.main-limit=Galvenā pavediena mīkstais atmiņas limits megabaitos. Iestatiet 0, lai atspējotu\nTas iedarbina low-memory-triggers un izsauc notikumu atmiņas atbrīvošanai, kad lietojums pārsniedz šo
pocketmine.yml.memory.main-hard-limit=Galvenā pavediena cietais atmiņas limits megabaitos. Iestatiet 0, lai atspējotu\nTas aptur serveri, kad limits tiek pārsniegts
pocketmine.yml.memory.async-worker-hard-limit=AsyncWorker pavedienu cietais atmiņas limits megabaitos. Iestatiet 0, lai atspējotu\nTas avarē uzdevumu, kas pašlaik tiek izpildīts uz strādnieka, ja uzdevums pārsniedz limitu\nPIEZĪME: ŠIS LIMITS ATTIECAS UZ KATRU STRĀDNIEKU, NEVIS UZ VISU PROCESU.
pocketmine.yml.memory.check-rate=Atmiņas pārbaudes periods tikos (noklusējums 1 sekunde)
pocketmine.yml.memory.continuous-trigger=Turpināt iedarbināt low-memory-triggers un notikumu, kamēr ir maz atmiņas
pocketmine.yml.memory.continuous-trigger-rate=Tikai ja memory.continuous-trigger ir iespējots. Norāda biežumu memory.check-rate soļos (noklusējums 30 sekundes)
pocketmine.yml.memory.garbage-collection.period=Periods tikos atkritumu savācēja manuālai iedarbināšanai (noklusējums 30 minūtes), iestatiet 0, lai atspējotu\nTas ietekmē tikai galveno pavedienu. Citiem pavedieniem jāiedarbina pašiem sava savākšana
pocketmine.yml.memory.memory-dump=Iestatījumi, kas kontrolē atmiņas izgāztuves apstrādi.
pocketmine.yml.memory.memory-dump.dump-async-worker=Izgāzt atmiņu gan no asinhronajiem strādniekiem, gan galvenā pavediena. Ja atmiņas izgāšanas laikā rodas segfault problēmas, atspējojiet šo iestatījumu.
pocketmine.yml.memory.max-chunks.chunk-radius=Ierobežot maksimālo renderēšanas attālumu katram spēlētājam, kad tiek iedarbināta zema atmiņa. Iestatiet 0, lai atspējotu ierobežojumu.
pocketmine.yml.network.batch-threshold=Slieksnis pakešu grupēšanai baitos. Tiks saspiestas tikai šīs paketes\nIestatiet 0, lai saspiestu visu, -1, lai atspējotu.
pocketmine.yml.network.compression-level=Saspiešanas līmenis, ko izmanto, sūtot grupētas paketes. Augstāks = vairāk CPU, mazāks joslas platuma patēriņš. Tikai zlib - Snappy nav līmeņa iestatījuma, tāpēc tas tiek ignorēts, kamēr ir ieslēgts better-pmmp.network.snappy-compression
pocketmine.yml.network.async-compression=Izmantot AsyncTask saspiešanai galvenās spēles sesijas laikā. Palielina aizkavi, bet var samazināt galvenā pavediena slodzi
pocketmine.yml.network.async-compression-threshold=Slieksnis asinhronai saspiešanai baitos. Tikai paketes, kas lielākas par šo, tiks saspiestas asinhroni\nAsyncTask lielo pieskaitāmo izmaksu dēļ asinhronā saspiešana atmaksājas tikai lielām paketēm
pocketmine.yml.network.upnp-forwarding=Eksperimentāls. Izmantot UPnP portu automātiskai pārsūtīšanai
pocketmine.yml.network.max-mtu-size=Maksimālais tīklā sūtīto pakešu izmērs baitos (noklusējums 1492 baiti). Lielākas paketes tiks\nfragmentētas vai sadalītas mazākās daļās. Klienti var pieprasīt MTU izmērus līdz, bet ne vairāk par šo skaitli.
pocketmine.yml.network.enable-encryption=Iespējot Minecraft tīkla trafika šifrēšanu. Tas ietekmē veiktspēju, bet neļauj hakeriem nozagt sesijas un uzdoties par citiem spēlētājiem.\nNEATSPĒJOJIET ŠO, ja vien nesaprotat saistītos riskus.
pocketmine.yml.debug.level=Ja > 1, konsolē rādīs atkļūdošanas ziņojumus
pocketmine.yml.player.save-player-data=Izvēlieties, vai iespējot spēlētāju datu saglabāšanu.
pocketmine.yml.player.verify-xuid=Ja true, pārbauda, vai pievienojošos spēlētāju Xbox lietotāja ID (XUID) atbilst iepriekš ierakstītajam.\nTas arī neļauj ne-XBL spēlētājiem izmantot XBL spēlētāju lietotājvārdus, lai nozagtu viņu datus serveros ar xbox-auth=off.
pocketmine.yml.level-settings.default-format=Noklusējuma formāts, ko pasaules izmantos, kad tās tiek izveidotas
pocketmine.yml.chunk-sending.per-tick=Lai mainītu servera normālo renderēšanas attālumu, mainiet view-distance failā server.properties.\nGabalu skaits, kas tiek nosūtīts spēlētājiem vienā tikā
pocketmine.yml.chunk-sending.spawn-radius=Gabalu rādiuss, kas jānosūta pirms spēlētāja radīšanas
pocketmine.yml.chunk-ticking.tick-radius=Gabalu rādiuss ap spēlētāju, ko tikot
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=Bloku skaits tikšanas apgabalu subgabalos, kas tiek tikoti katrā tikā. Augstākas vērtības paātrinās notikumus\nkā koku un augu augšanu, bet ar augstākām veiktspējas izmaksām.
pocketmine.yml.chunk-ticking.disable-block-ticking=Bloku ID, kuriem neveikt nejaušu tikšanu.
pocketmine.yml.chunk-generation.population-queue-size=Maks. gabalu skaits gaidīšanas rindā, kas jāapdzīvo
pocketmine.yml.auto-report.enabled=Sūtīt avārijas ziņojumus apstrādei uz zemāk norādīto resursdatoru. Pēc noklusējuma izslēgts: noklusējuma resursdators pieder arhivētajam PocketMine-MP projektam, nevis BetterPMMP.
pocketmine.yml.anonymous-statistics.enabled=Sūta anonīmu statistiku datu apkopošanai un spraudņu lietojuma izsekošanai
pocketmine.yml.auto-updater.enabled=Pārbaudīt jaunas versijas startēšanas laikā. Pēc noklusējuma izslēgts: noklusējuma resursdators piedāvā PocketMine-MP versijas, kurām nav nekāda sakara ar BetterPMMP versiju.
pocketmine.yml.auto-updater.preferred-channel=Var būt development, alpha, beta vai stable.
pocketmine.yml.auto-updater.suggest-channels=Ja izmantojat izstrādes versiju, tas ieteiks mainīt kanālu
pocketmine.yml.timings.host=Izvēlieties hostu, ko izmantot savu timings rezultātu skatīšanai.
pocketmine.yml.console.enable-input=Vai pieņemt komandas caur konsoli. Ja atspējots, viss, kas ierakstīts konsolē, tiks ignorēts.\nNoderīgi, lai taupītu resursus bezgalvas serveros, kur konsole nekad netiek izmantota (piem., mitināts serveris, Docker utt.)
pocketmine.yml.console.title-tick=Izvēlieties, vai iespējot servera statistikas ziņošanu konsoles nosaukumā.\nPIEZĪME: Nosaukuma tikeris tiks atspējots jebkurā gadījumā, ja konsoles krāsas nav iespējotas.
pocketmine.yml.aliases.1=Šī sadaļa ļauj pievienot, noņemt vai pārkartēt komandu aliasus.\nViens aliass var izsaukt vienu vai vairākas citas komandas (vai aliasus).\nŠeit definētie aliasi aizstās jebkuru komandu aliasu, ko deklarējuši spraudņi vai pats PocketMine-MP.
pocketmine.yml.aliases.2=Lai noņemtu aliasu, iestatiet to uz [], šādi (ņemiet vērā, ka priedēkļa aliasi kā "pocketmine:stop" paliks un tos nevar\nnoņemt):
pocketmine.yml.aliases.3=Komandas netiek noņemtas, tikai to aliasi. Jūs joprojām varat atsaukties uz komandu, izmantojot tās pilno (priedēkļa)\nnosaukumu, pat ja visi tās aliasi ir pārrakstīti. Pilnais nosaukums parasti ir kaut kas līdzīgs "pocketmine:commandname" vai\n"pluginname:commandname".
pocketmine.yml.aliases.4=Lai pievienotu aliasu, uzskaitiet komandu(as), ko tas izsauc:
pocketmine.yml.aliases.5=Lai izsauktu citu komandu ar argumentiem, izmantojiet $1, lai nodotu pirmo argumentu, $2 otrajam utt.:
pocketmine.yml.aliases.6=Lai padarītu argumentus obligātus (lai komanda neizdodas, ja tie nav norādīti), izmantojiet $$, piem., $$1, $$2:
pocketmine.yml.aliases.7=Lai izlaistu cauri argumentu diapazonu, aiz indeksa lieciet - (defisi):
pocketmine.yml.aliases.8=Lai mainītu esošu komandas aliasu un liktu tam darīt ko citu:
pocketmine.yml.worlds=Šie iestatījumi aizstās server.properties norādīto ģeneratoru un ļauj ielādēt vairākas pasaules\nPiemērs:
pocketmine.yml.plugins.legacy-data-dir=Iestatot to uz true, tiks izmantota vecā struktūra, kur spraudņu dati tiek novietoti --plugins direktorijā.\nFalse novieto spraudņu datus zem plugin_data zem --data.\nŠī opcija pastāv atpakaļsaderībai ar esošajām instalācijām.

pocketmine.resource-packs.yml.header=Šis konfigurācijas fails kontrolē globālos resursus, ko izmanto jūsu PocketMine-MP serverī.
pocketmine.resource-packs.yml.force-resources=Izvēlieties, vai spēlētājiem ir jāizmanto jūsu izvēlētās resursu pakotnes, lai pievienotos serverim.\nPIEZĪME: Tas neko nedarīs, ja zemāk esošajā kaudzē nav resursu pakotņu.
pocketmine.resource-packs.yml.stack=Resursu pakotnes šeit tiek lietotas no apakšas uz augšu. Tas nozīmē, ka resursi augstākajās pakotnēs pārraksta tos zemākajās.\nIerakstiem šeit jānorāda resursu pakotnes faila nosaukums.\nPiemērs:
pocketmine.resource-packs.yml.stack.force-vanilla=Ja vēlaties piespiest klientus izmantot vaniļas resursus, jums resources mapē jāievieto vaniļas resursu pakotne un jāpievieno tā kaudzei šeit.
pocketmine.resource-packs.yml.stack.encryption-key=Lai norādītu resursa šifrēšanas atslēgu, ievietojiet atslēgu failā <resource>.key blakus resursu pakotnei. Piemērs: vanilla.zip.key

