; Strings without a "pocketmine." prefix are assumed to be vanilla translations.
; Those are sent as raw translation keys for the client to translate into its own language.
;
; Any NON-VANILLA string MUST have a key prefixed with "pocketmine." to ensure it is translated by the server.
; (Yes, this file currently doesn't follow these rules in many places. It's a work in progress to clean up.)

pocketmine.command.restart.description=Khởi động lại máy chủ
pocketmine.command.restart.start=Máy chủ đang khởi động lại...
pocketmine.betterpmmp.yml.config=Định dạng của chính tệp cấu hình này.
pocketmine.betterpmmp.yml.config.enforce-format=Nếu là true, tệp này sẽ được viết lại theo bố cục BetterPMMP mỗi lần khởi động: chú thích và thứ tự khóa được đặt lại theo mẫu này bằng ngôn ngữ máy chủ, mọi giá trị đều được giữ nguyên.\nCác khóa không có trong mẫu này vẫn giữ giá trị nhưng mất chú thích và được chuyển xuống cuối phần của chúng.
pocketmine.betterpmmp.yml.world=Tinh chỉnh thế giới, chunk và tầm nhìn.
pocketmine.betterpmmp.yml.world.block-cache-size=Kích thước bộ nhớ đệm khối/va chạm mỗi thế giới. Lớn hơn giảm chi phí tra cứu khối.
pocketmine.betterpmmp.yml.world.neighbour-update-limit=Số cập nhật khối lân cận tối đa mỗi tick. 0 là không giới hạn.
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=Thế giới không có người chơi chạy 1 tick trong 100 cho đến khi có người vào.
pocketmine.betterpmmp.yml.world.view-distance-per-world=Tầm nhìn theo từng thế giới, theo tên thư mục thế giới.
pocketmine.betterpmmp.yml.world.chunk-ticking=Giới hạn tick chunk và ghi đè theo từng thế giới.
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=Số chunk tối đa được kiểm tra lại điều kiện tick mỗi tick. 0 là không giới hạn.
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=Tick chunk theo từng thế giới, theo tên thư mục thế giới.
pocketmine.betterpmmp.yml.lighting=Tạo và cập nhật ánh sáng phía máy chủ.
pocketmine.betterpmmp.yml.lighting.fixed-light=Bỏ qua việc tạo ánh sáng bất đồng bộ và điền ánh sáng bằng giá trị cố định.
pocketmine.betterpmmp.yml.lighting.fixed-light-level=Mức ánh sáng dùng khi bật fixed-light (0 đến 15).
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=Bỏ qua việc tính lại ánh sáng lúc chạy khi khối thay đổi.
pocketmine.betterpmmp.yml.entities=Hành vi của vật phẩm rơi và cầu kinh nghiệm.
pocketmine.betterpmmp.yml.entities.item-merging=Gộp các vật phẩm rơi gần nhau thành chồng.
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=Thời gian biến mất của vật phẩm rơi tính bằng tick (vanilla 6000). -1: vật phẩm không bao giờ biến mất.
pocketmine.betterpmmp.yml.entities.xp-orbs=Tạo cầu kinh nghiệm. Tắt để bỏ qua việc quét mỗi tick của chúng.
pocketmine.betterpmmp.yml.entities.pickup-scan-period=Quét nhặt đồ mỗi N tick (1 là vanilla).
pocketmine.betterpmmp.yml.combat=Đòn chí mạng và sát thương nổ.
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=Cho phép đòn chí mạng khi đang chạy nước rút.
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=Khoảng cách rơi tối thiểu cho đòn chí mạng (vanilla 0.0).
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=Cho phép vụ nổ phá hủy khối.
pocketmine.betterpmmp.yml.network=Nén gói tin và điều tiết phát sóng chuyển động.
pocketmine.betterpmmp.yml.network.snappy-compression=Dùng nén Snappy thay cho zlib. Đã tích hợp trong bản nhị phân chính thức; tiện ích mở rộng snappy chỉ cần cho các bản dựng PHP tùy chỉnh.
pocketmine.betterpmmp.yml.network.movement-broadcast-period=Phát gói chuyển động mỗi N tick (1 là vanilla).
pocketmine.betterpmmp.yml.network.skip-movement-send-event=Bỏ qua DataPacketSendEvent cho các gói chuyển động.
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=Bỏ qua DataPacketReceiveEvent cho các gói nhập liệu của người chơi.
pocketmine.betterpmmp.yml.events=Điều tiết sự kiện lối chơi.
pocketmine.betterpmmp.yml.events.move-event-period=Kích hoạt PlayerMoveEvent mỗi N tick (1 là vanilla).
pocketmine.betterpmmp.yml.recipes=Đăng ký công thức vanilla.
pocketmine.betterpmmp.yml.recipes.load-vanilla=Tải công thức vanilla cho bàn chế tạo, lò nung và ủ khi khởi động.
pocketmine.betterpmmp.yml.plugins=Ghi nhật ký plugin.
pocketmine.betterpmmp.yml.gameplay=Công tắc cơ chế trò chơi.
pocketmine.betterpmmp.yml.gameplay.hunger-exhaustion=Tiêu hao độ đói từ mọi nguyên nhân: di chuyển, nhảy, tấn công, đào, sát thương, hồi máu và thuốc. Tắt để bỏ qua toàn bộ cơ chế này.
pocketmine.betterpmmp.yml.gameplay.fall-damage=Sát thương rơi cho các thực thể sống. Tắt để bỏ qua hoàn toàn quy trình sát thương rơi.
pocketmine.betterpmmp.yml.gameplay.farmland-persistent=Đất canh tác không bao giờ bị khô, bị giẫm đạp hay biến trở lại thành đất thường. Đất canh tác ướt hoàn toàn sẽ bỏ qua việc quét nước.
pocketmine.betterpmmp.yml.gameplay.farmland-instant-hydration=Đất canh tác được tạo bằng cách cày hoặc đặt sẽ ướt hoàn toàn ngay từ đầu.
pocketmine.yml.header=Tệp cấu hình chính của PocketMine-MP\nĐây là những thiết lập không thể đưa vào server.properties\nMột số an toàn, một số có thể làm hỏng máy chủ nếu chỉnh sai\nCác thiết lập/giá trị mặc định mới sẽ không tự động xuất hiện trong tệp này khi nâng cấp.
pocketmine.yml.settings.force-language=Gửi tất cả chuỗi đã dịch sang ngôn ngữ máy chủ, hay để thiết bị tự xử lý
pocketmine.yml.settings.query-plugins=Cho phép liệt kê plugin qua Query
pocketmine.yml.settings.enable-profiling=Bật phân tích hiệu năng plugin và lõi theo mặc định
pocketmine.yml.settings.profile-report-trigger=Chỉ thêm kết quả khi phép đo tick nhỏ hơn hoặc bằng giá trị đã cho (mặc định 20)
pocketmine.yml.settings.async-workers=Số lượng worker AsyncTask.\nDùng cho tác vụ bất đồng bộ của plugin, tạo thế giới, nén và giao tiếp web.\nĐặt giá trị này xấp xỉ số lõi của bạn.\nNếu đặt auto, nó sẽ cố phát hiện số lõi (hoặc dùng 2)
pocketmine.yml.settings.enable-dev-builds=Có cho phép chạy bản dựng phát triển hay không. Bản dev có thể sập, làm hỏng plugin, hỏng thế giới của bạn và hơn thế.\nKhuyến nghị tránh dùng bản dựng phát triển khi có thể.
pocketmine.yml.memory.global-limit=Giới hạn bộ nhớ mềm toàn cục theo megabyte. Đặt 0 để tắt\nĐiều này kích hoạt low-memory-triggers và phát một sự kiện để giải phóng bộ nhớ khi mức dùng vượt giá trị này
pocketmine.yml.memory.main-limit=Giới hạn bộ nhớ mềm của luồng chính theo megabyte. Đặt 0 để tắt\nĐiều này kích hoạt low-memory-triggers và phát một sự kiện để giải phóng bộ nhớ khi mức dùng vượt giá trị này
pocketmine.yml.memory.main-hard-limit=Giới hạn bộ nhớ cứng của luồng chính theo megabyte. Đặt 0 để tắt\nĐiều này dừng máy chủ khi vượt quá giới hạn
pocketmine.yml.memory.async-worker-hard-limit=Giới hạn bộ nhớ cứng của các luồng AsyncWorker theo megabyte. Đặt 0 để tắt\nĐiều này làm sập tác vụ đang chạy trên worker nếu tác vụ vượt quá giới hạn\nLƯU Ý: GIỚI HẠN NÀY ÁP DỤNG CHO MỖI WORKER, KHÔNG PHẢI TOÀN BỘ TIẾN TRÌNH.
pocketmine.yml.memory.check-rate=Chu kỳ kiểm tra bộ nhớ theo tick (mặc định 1 giây)
pocketmine.yml.memory.continuous-trigger=Tiếp tục kích hoạt low-memory-triggers và sự kiện khi bộ nhớ thấp
pocketmine.yml.memory.continuous-trigger-rate=Chỉ khi memory.continuous-trigger được bật. Chỉ định tần suất theo bước memory.check-rate (mặc định 30 giây)
pocketmine.yml.memory.garbage-collection.period=Chu kỳ kích hoạt bộ dọn rác thủ công theo tick (mặc định 30 phút), đặt 0 để tắt\nĐiều này chỉ ảnh hưởng luồng chính. Các luồng khác nên tự kích hoạt việc dọn rác của mình
pocketmine.yml.memory.memory-dump=Thiết lập kiểm soát việc xử lý dump bộ nhớ.
pocketmine.yml.memory.memory-dump.dump-async-worker=Dump bộ nhớ của cả worker bất đồng bộ lẫn luồng chính. Nếu bạn gặp lỗi segfault khi dump bộ nhớ, hãy tắt thiết lập này.
pocketmine.yml.memory.max-chunks.chunk-radius=Giới hạn tầm nhìn tối đa mỗi người chơi khi bộ nhớ thấp được kích hoạt. Đặt 0 để tắt giới hạn.
pocketmine.yml.network.batch-threshold=Ngưỡng gộp gói tin, theo byte. Chỉ những gói này mới được nén\nĐặt 0 để nén tất cả, -1 để tắt.
pocketmine.yml.network.compression-level=Mức nén dùng khi gửi các gói tin đã gộp. Cao hơn = nhiều CPU hơn, ít băng thông hơn. Chỉ dành cho zlib - Snappy không có thiết lập mức nén, nên mục này bị bỏ qua khi better-pmmp.network.snappy-compression được bật
pocketmine.yml.network.async-compression=Dùng AsyncTask để nén trong phiên chơi chính. Tăng độ trễ, nhưng có thể giảm tải cho luồng chính
pocketmine.yml.network.async-compression-threshold=Ngưỡng nén bất đồng bộ, theo byte. Chỉ những gói lớn hơn giá trị này mới được nén bất đồng bộ\nDo AsyncTask tốn nhiều chi phí, nén bất đồng bộ chỉ đáng cho các gói lớn
pocketmine.yml.network.upnp-forwarding=Thử nghiệm. Dùng UPnP để tự động chuyển tiếp cổng
pocketmine.yml.network.max-mtu-size=Kích thước tối đa theo byte của gói tin gửi qua mạng (mặc định 1492 byte). Các gói lớn hơn sẽ bị\nphân mảnh hoặc chia thành các phần nhỏ hơn. Máy khách có thể yêu cầu kích thước MTU đến, nhưng không quá số này.
pocketmine.yml.network.enable-encryption=Bật mã hóa lưu lượng mạng Minecraft. Điều này ảnh hưởng hiệu năng, nhưng ngăn hacker đánh cắp phiên và giả danh người chơi khác.\nĐỪNG TẮT tính năng này trừ khi bạn hiểu các rủi ro liên quan.
pocketmine.yml.debug.level=Nếu > 1, sẽ hiển thị thông báo gỡ lỗi trong console
pocketmine.yml.player.save-player-data=Chọn có bật lưu dữ liệu người chơi hay không.
pocketmine.yml.player.verify-xuid=Nếu true, kiểm tra xem Xbox User ID (XUID) của người chơi tham gia có khớp với giá trị đã ghi trước đó không.\nĐiều này cũng ngăn người chơi không phải XBL dùng tên người dùng của người chơi XBL để đánh cắp dữ liệu trên máy chủ có xbox-auth=off.
pocketmine.yml.level-settings.default-format=Định dạng mặc định mà các thế giới sẽ dùng khi được tạo
pocketmine.yml.chunk-sending.per-tick=Để thay đổi tầm nhìn thông thường của máy chủ, hãy đổi view-distance trong server.properties.\nSố chunk gửi cho người chơi mỗi tick
pocketmine.yml.chunk-sending.spawn-radius=Bán kính chunk cần gửi trước khi người chơi xuất hiện
pocketmine.yml.chunk-ticking.tick-radius=Bán kính chunk quanh người chơi để tick
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=Số khối trong các subchunk của vùng tick được tick mỗi tick. Giá trị cao hơn sẽ tăng tốc các sự kiện\nnhư cây và thực vật phát triển, nhưng với chi phí hiệu năng cao hơn.
pocketmine.yml.chunk-ticking.disable-block-ticking=ID của các khối không thực hiện tick ngẫu nhiên.
pocketmine.yml.chunk-generation.population-queue-size=Số chunk tối đa trong hàng đợi chờ được tạo
pocketmine.yml.auto-report.enabled=Gửi báo cáo sự cố để xử lý
pocketmine.yml.anonymous-statistics.enabled=Gửi số liệu thống kê ẩn danh để tổng hợp dữ liệu và theo dõi việc sử dụng plugin
pocketmine.yml.auto-updater.preferred-channel=Có thể là development, alpha, beta hoặc stable.
pocketmine.yml.auto-updater.suggest-channels=Nếu dùng phiên bản phát triển, nó sẽ gợi ý đổi kênh
pocketmine.yml.timings.host=Chọn host để xem kết quả timings của bạn.
pocketmine.yml.console.enable-input=Có chấp nhận lệnh qua console hay không. Nếu tắt, mọi thứ gõ vào console sẽ bị bỏ qua.\nHữu ích để tiết kiệm tài nguyên trên máy chủ không đầu nơi console không bao giờ được dùng (vd. máy chủ thuê, Docker, v.v.)
pocketmine.yml.console.title-tick=Chọn có bật báo cáo thống kê máy chủ trên tiêu đề console hay không.\nLƯU Ý: Bộ chạy tiêu đề sẽ bị tắt bất kể thế nào nếu màu console không được bật.
pocketmine.yml.aliases.1=Phần này cho phép bạn thêm, xóa hoặc ánh xạ lại các bí danh lệnh.\nMột bí danh có thể gọi một hoặc nhiều lệnh khác (hoặc bí danh).\nCác bí danh định nghĩa ở đây sẽ ghi đè mọi bí danh lệnh do plugin hoặc chính PocketMine-MP khai báo.
pocketmine.yml.aliases.2=Để xóa một bí danh, đặt nó thành [], như sau (lưu ý các bí danh có tiền tố như "pocketmine:stop" sẽ vẫn còn và không thể\nbị xóa):
pocketmine.yml.aliases.3=Lệnh không bị xóa, chỉ có bí danh của chúng. Bạn vẫn có thể tham chiếu một lệnh bằng tên đầy đủ (có tiền tố) của nó,\nngay cả khi tất cả bí danh của nó bị ghi đè. Tên đầy đủ thường giống như "pocketmine:commandname" hoặc\n"pluginname:commandname".
pocketmine.yml.aliases.4=Để thêm một bí danh, liệt kê (các) lệnh mà nó gọi:
pocketmine.yml.aliases.5=Để gọi một lệnh khác kèm đối số, dùng $1 để truyền đối số thứ nhất, $2 cho thứ hai, v.v.:
pocketmine.yml.aliases.6=Để bắt buộc đối số (để lệnh thất bại nếu không được cung cấp), dùng $$, vd. $$1, $$2:
pocketmine.yml.aliases.7=Để truyền qua một dải đối số, đặt dấu - (gạch nối) sau chỉ số:
pocketmine.yml.aliases.8=Để thay đổi một bí danh lệnh hiện có và khiến nó làm việc khác:
pocketmine.yml.worlds=Các thiết lập này sẽ ghi đè bộ tạo được đặt trong server.properties và cho phép tải nhiều thế giới\nVí dụ:
pocketmine.yml.plugins.legacy-data-dir=Đặt thành true sẽ khiến dùng cấu trúc cũ, nơi dữ liệu plugin được đặt trong thư mục --plugins.\nFalse đặt dữ liệu plugin dưới plugin_data dưới --data.\nTùy chọn này tồn tại để tương thích ngược với các bản cài đặt hiện có.

pocketmine.resource-packs.yml.header=Tệp cấu hình này kiểm soát các tài nguyên toàn cục được sử dụng trên máy chủ PocketMine-MP của bạn.
pocketmine.resource-packs.yml.force-resources=Chọn xem người chơi có bắt buộc phải dùng các gói tài nguyên bạn đã chọn để tham gia máy chủ hay không.\nLƯU Ý: Điều này sẽ không có tác dụng nếu không có gói tài nguyên nào trong ngăn xếp bên dưới.
pocketmine.resource-packs.yml.stack=Các gói tài nguyên ở đây được áp dụng từ dưới lên trên. Điều này có nghĩa là tài nguyên trong các gói cao hơn sẽ ghi đè lên các gói thấp hơn.\nCác mục ở đây phải ghi rõ tên tệp của gói tài nguyên.\nVí dụ:
pocketmine.resource-packs.yml.stack.force-vanilla=Nếu bạn muốn buộc máy khách dùng tài nguyên vanilla, bạn phải đặt một gói tài nguyên vanilla vào thư mục resources và thêm nó vào ngăn xếp ở đây.
pocketmine.resource-packs.yml.stack.encryption-key=Để chỉ định khóa mã hóa tài nguyên, hãy đặt khóa vào tệp <resource>.key bên cạnh gói tài nguyên. Ví dụ: vanilla.zip.key

