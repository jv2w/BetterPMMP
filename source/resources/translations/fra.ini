; Strings without a "pocketmine." prefix are assumed to be vanilla translations.
; Those are sent as raw translation keys for the client to translate into its own language.
;
; Any NON-VANILLA string MUST have a key prefixed with "pocketmine." to ensure it is translated by the server.
; (Yes, this file currently doesn't follow these rules in many places. It's a work in progress to clean up.)

pocketmine.command.restart.description=Redémarrer le serveur
pocketmine.command.restart.start=Le serveur redémarre...
pocketmine.command.restart.failed=Échec du redémarrage : impossible d'écrire le fichier indicateur {%0}
pocketmine.betterpmmp.yml.config=Mise en forme de ce fichier de configuration.
pocketmine.betterpmmp.yml.config.enforce-format=Si true, ce fichier est réécrit au format BetterPMMP à chaque démarrage : les commentaires et l'ordre des clés sont réinitialisés selon ce modèle dans la langue du serveur, toutes les valeurs sont conservées.\nLes clés absentes de ce modèle gardent leurs valeurs mais perdent leurs commentaires et sont déplacées à la fin de leur section.\nLes commentaires que vous avez ajoutés vous-même ne sont PAS conservés.
pocketmine.betterpmmp.yml.world=Réglages de monde, de chunk et de distance d'affichage.
pocketmine.betterpmmp.yml.world.block-cache-size=Taille du cache de blocs/collisions par monde. Plus élevé réduit le coût de recherche de blocs.
pocketmine.betterpmmp.yml.world.neighbour-update-limit=Mises à jour de blocs voisins max par tick. 0 pour illimité.
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=Les mondes sans joueur tournent 1 tick sur 100 jusqu'à ce que quelqu'un arrive.
pocketmine.betterpmmp.yml.world.view-distance-per-world=Distance d'affichage par monde, par nom de dossier de monde.
pocketmine.betterpmmp.yml.world.chunk-ticking=Limites du ticking de chunks et surcharges par monde.
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=Chunks max revérifiés pour l'éligibilité au tick par tick. 0 pour illimité.
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=Ticking de chunks par monde, par nom de dossier de monde.
pocketmine.betterpmmp.yml.lighting=Génération et mise à jour de la lumière côté serveur.
pocketmine.betterpmmp.yml.lighting.fixed-light=Ignorer la génération de lumière asynchrone et remplir la lumière avec une valeur fixe.
pocketmine.betterpmmp.yml.lighting.fixed-light-level=Niveau de lumière utilisé quand fixed-light est activé (0 à 15).
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=Ignorer le recalcul de lumière en temps réel lors des changements de blocs.
pocketmine.betterpmmp.yml.entities=Comportement des objets au sol et des orbes d'XP.
pocketmine.betterpmmp.yml.entities.item-merging=Fusionner les objets au sol proches en piles.
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=Temps de disparition des objets au sol en ticks (vanilla 6000). -1 : les objets ne disparaissent jamais.
pocketmine.betterpmmp.yml.entities.xp-orbs=Générer les orbes d'XP. Désactiver pour ignorer leurs scans par tick.
pocketmine.betterpmmp.yml.entities.pickup-scan-period=Rechercher les ramassages tous les N ticks (1 pour vanilla).
pocketmine.betterpmmp.yml.combat=Coups critiques et dégâts d'explosion.
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=Autoriser les coups critiques en sprint.
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=Distance de chute minimale pour un coup critique (vanilla 0.0).
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=Laisser les explosions détruire les blocs.
pocketmine.betterpmmp.yml.network=Compression des paquets et limitation des diffusions de mouvement.
pocketmine.betterpmmp.yml.network.snappy-compression=Utiliser la compression Snappy au lieu de zlib. Incluse dans le binaire officiel ; l'extension snappy n'est requise que sur les builds PHP personnalisés.
pocketmine.betterpmmp.yml.network.movement-broadcast-period=Diffuser les paquets de mouvement tous les N ticks (1 pour vanilla).
pocketmine.betterpmmp.yml.network.rotation-broadcast-period=Diffuser les paquets de rotation de la vue tous les N ticks (1 pour vanilla). Ne s'applique que lorsque le joueur est immobile.
pocketmine.betterpmmp.yml.network.skip-movement-send-event=Ignorer DataPacketSendEvent pour les paquets de mouvement.
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=Ignorer DataPacketReceiveEvent pour les paquets d'entrée du joueur.
pocketmine.betterpmmp.yml.events=Limitation des événements de jeu.
pocketmine.betterpmmp.yml.events.move-event-period=Déclencher PlayerMoveEvent tous les N ticks (1 pour vanilla).
pocketmine.betterpmmp.yml.recipes=Enregistrement des recettes vanilla.
pocketmine.betterpmmp.yml.recipes.load-vanilla=Charger les recettes vanilla d'établi, de four et de brassage au démarrage.
pocketmine.betterpmmp.yml.plugins=Journalisation des plugins.
pocketmine.betterpmmp.yml.gameplay=Interrupteurs des mécaniques de jeu.
pocketmine.betterpmmp.yml.gameplay.hunger-exhaustion=Épuisement de la faim dû à toutes les causes : déplacement, saut, attaque, minage, dégâts, régénération et potions. Désactiver ignore toute la mécanique.
pocketmine.betterpmmp.yml.gameplay.fall-damage=Dégâts de chute pour les entités vivantes. Désactiver ignore entièrement le traitement des dégâts de chute.
pocketmine.betterpmmp.yml.gameplay.iron-door-hand-interaction=L'interaction à la main ouvre et ferme les portes et trappes en fer. Désactivé par défaut, car en vanilla elles ne s'ouvrent qu'à la redstone ; activez-le pour retrouver le comportement de PocketMine-MP.
pocketmine.betterpmmp.yml.gameplay.farmland-persistent=Les terres labourées ne s'assèchent jamais, ne sont jamais piétinées et ne redeviennent jamais de la terre. Une terre labourée entièrement humide ignore sa recherche d'eau.
pocketmine.betterpmmp.yml.gameplay.farmland-instant-hydration=Les terres labourées créées en labourant ou en plaçant sont entièrement hydratées dès le départ.
pocketmine.betterpmmp.yml.combat.instant-hit-feedback=Transmettre immédiatement le retour de coup au corps à corps et des projectiles au lieu de la fin du tick, réduisant jusqu'à 50 ms de latence de coup perçue pour la victime et l'attaquant.
pocketmine.betterpmmp.yml.network.interaction-spam-window=Fenêtre en millisecondes pour ignorer les paquets d'interaction dupliqués du client (upstream 100). La valeur par défaut 20 supprime la limite de 10 clics par seconde ; augmentez-la si des interactions dupliquées passent.
pocketmine.betterpmmp.yml.network.block-sync-snapshot=Ne pas renvoyer le bloc cliqué lorsque l'interaction ne l'a pas modifié, ce qui économise un paquet par interaction. Les blocs voisins sont toujours envoyés, afin d'écraser la prédiction du client.
pocketmine.betterpmmp.yml.network.chunk-history-limit=Nombre maximal de positions de chunks mémorisées par session, utilisé pour effacer les chunks obsolètes lors d'un changement de monde. 0 pour illimité (croît pendant toute la session).
pocketmine.betterpmmp.yml.plugins.lifecycle-log=Journaliser le chargement, l'activation et la désactivation de chaque plugin.
pocketmine.yml.header=Fichier de configuration principal de PocketMine-MP\nCe sont les paramètres qui ne peuvent pas être inclus dans server.properties\nCertains sont sûrs, d'autres peuvent casser votre serveur s'ils sont mal modifiés\nLes nouveaux paramètres/valeurs par défaut n'apparaîtront pas automatiquement dans ce fichier lors d'une mise à jour.
pocketmine.yml.settings.force-language=Envoyer toutes les chaînes traduites dans la locale du serveur, ou laisser l'appareil les gérer
pocketmine.yml.settings.query-plugins=Autoriser le listage des plugins via Query
pocketmine.yml.settings.enable-profiling=Activer par défaut le profilage des plugins et du cœur
pocketmine.yml.settings.profile-report-trigger=N'ajoute des résultats que lorsque la mesure de tick est inférieure ou égale à la valeur donnée (défaut 20)
pocketmine.yml.settings.async-workers=Nombre de workers AsyncTask.\nUtilisés pour les tâches asynchrones des plugins, la génération de monde, la compression et la communication web.\nDéfinissez ceci approximativement au nombre de vos cœurs.\nSur auto, il essaiera de détecter le nombre de cœurs (ou utilisera 2)
pocketmine.yml.settings.enable-dev-builds=Autoriser ou non l'exécution de builds de développement. Les builds de dev peuvent planter, casser vos plugins, corrompre votre monde et plus.\nIl est recommandé d'éviter les builds de développement autant que possible.
pocketmine.yml.memory.global-limit=Limite mémoire douce globale en mégaoctets. Mettre à 0 pour désactiver\nCeci déclenche les low-memory-triggers et émet un événement pour libérer de la mémoire quand l'utilisation dépasse cette valeur
pocketmine.yml.memory.main-limit=Limite mémoire douce du thread principal en mégaoctets. Mettre à 0 pour désactiver\nCeci déclenche les low-memory-triggers et émet un événement pour libérer de la mémoire quand l'utilisation dépasse cette valeur
pocketmine.yml.memory.main-hard-limit=Limite mémoire dure du thread principal en mégaoctets. Mettre à 0 pour désactiver\nCeci arrête le serveur quand la limite est dépassée
pocketmine.yml.memory.async-worker-hard-limit=Limite mémoire dure des threads AsyncWorker en mégaoctets. Mettre à 0 pour désactiver\nCeci fait planter la tâche en cours d'exécution sur le worker si la tâche dépasse la limite\nNOTE : CETTE LIMITE S'APPLIQUE PAR WORKER, PAS À L'ENSEMBLE DU PROCESSUS.
pocketmine.yml.memory.check-rate=Période en ticks pour vérifier la mémoire (défaut 1 seconde)
pocketmine.yml.memory.continuous-trigger=Continuer à déclencher les low-memory-triggers et l'événement en mémoire faible
pocketmine.yml.memory.continuous-trigger-rate=Uniquement si memory.continuous-trigger est activé. Spécifie le taux en pas de memory.check-rate (défaut 30 secondes)
pocketmine.yml.memory.garbage-collection.period=Période en ticks pour déclencher manuellement le ramasse-miettes (défaut 30 minutes), mettre à 0 pour désactiver\nCeci n'affecte que le thread principal. Les autres threads doivent déclencher leurs propres collectes
pocketmine.yml.memory.memory-dump=Paramètres contrôlant la gestion des vidages mémoire.
pocketmine.yml.memory.memory-dump.dump-async-worker=Vider la mémoire des workers asynchrones en plus du thread principal. Si vous avez des segfaults lors du vidage, désactivez ce paramètre.
pocketmine.yml.memory.max-chunks.chunk-radius=Limiter la distance de rendu maximale par joueur lorsque la mémoire faible est déclenchée. Mettre à 0 pour désactiver la limite.
pocketmine.yml.network.batch-threshold=Seuil pour regrouper les paquets, en octets. Seuls ces paquets seront compressés\nMettre à 0 pour tout compresser, -1 pour désactiver.
pocketmine.yml.network.compression-level=Niveau de compression utilisé lors de l'envoi des paquets groupés. Plus élevé = plus de CPU, moins de bande passante. zlib uniquement - Snappy n'a pas de réglage de niveau, ceci est donc ignoré lorsque better-pmmp.network.snappy-compression est activé
pocketmine.yml.network.async-compression=Utiliser des AsyncTasks pour la compression pendant la session de jeu principale. Augmente la latence, mais peut réduire la charge du thread principal
pocketmine.yml.network.async-compression-threshold=Seuil pour la compression asynchrone, en octets. Seuls les paquets plus grands que cela seront compressés de façon asynchrone\nEn raison du grand surcoût d'AsyncTask, la compression asynchrone n'en vaut la peine que pour les gros paquets
pocketmine.yml.network.upnp-forwarding=Expérimental. Utiliser UPnP pour rediriger automatiquement les ports
pocketmine.yml.network.max-mtu-size=Taille maximale en octets des paquets envoyés sur le réseau (défaut 1492 octets). Les paquets plus grands seront\nfragmentés ou divisés en parties plus petites. Les clients peuvent demander des tailles MTU jusqu'à, mais pas plus que ce nombre.
pocketmine.yml.network.enable-encryption=Activer le chiffrement du trafic réseau Minecraft. Ceci a un impact sur les performances, mais empêche les pirates de voler des sessions et de se faire passer pour d'autres joueurs.\nNE DÉSACTIVEZ PAS CECI à moins de comprendre les risques encourus.
pocketmine.yml.debug.level=Si > 1, affiche les messages de débogage dans la console
pocketmine.yml.player.save-player-data=Choisir d'activer ou non la sauvegarde des données des joueurs.
pocketmine.yml.player.verify-xuid=Si true, vérifie que l'ID utilisateur Xbox (XUID) des joueurs rejoignant correspond à ce qui a été enregistré précédemment.\nCeci empêche aussi les joueurs non-XBL d'utiliser les noms d'utilisateur de joueurs XBL pour voler leurs données sur les serveurs avec xbox-auth=off.
pocketmine.yml.level-settings.default-format=Le format par défaut que les mondes utiliseront à leur création
pocketmine.yml.chunk-sending.per-tick=Pour changer la distance de rendu normale du serveur, changez view-distance dans server.properties.\nNombre de chunks envoyés aux joueurs par tick
pocketmine.yml.chunk-sending.spawn-radius=Rayon de chunks devant être envoyés avant de faire apparaître le joueur
pocketmine.yml.chunk-ticking.tick-radius=Rayon de chunks autour d'un joueur à ticker
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=Nombre de blocs dans les sous-chunks des zones de tick qui sont tickés à chaque tick. Des valeurs plus élevées accéléreront des événements\ncomme la croissance des arbres et des plantes, mais à un coût de performance plus élevé.
pocketmine.yml.chunk-ticking.disable-block-ticking=ID des blocs sur lesquels ne pas effectuer de tick aléatoire.
pocketmine.yml.chunk-generation.population-queue-size=Nombre max. de chunks dans la file d'attente à peupler
pocketmine.yml.auto-report.enabled=Envoyer les rapports de plantage à l'hôte ci-dessous pour traitement. Désactivé par défaut : l'hôte par défaut appartient au projet archivé PocketMine-MP, pas à BetterPMMP.
pocketmine.yml.anonymous-statistics.enabled=Envoie des statistiques anonymes pour l'agrégation de données et le suivi de l'utilisation des plugins
pocketmine.yml.auto-updater.enabled=Vérifier les nouvelles versions au démarrage. Désactivé par défaut : l'hôte par défaut publie les versions de PocketMine-MP, sans rapport avec la version de BetterPMMP.
pocketmine.yml.auto-updater.preferred-channel=Peut être development, alpha, beta ou stable.
pocketmine.yml.auto-updater.suggest-channels=Si vous utilisez une version de développement, il suggérera de changer de canal
pocketmine.yml.timings.host=Choisissez l'hôte à utiliser pour consulter vos résultats de timings.
pocketmine.yml.console.enable-input=Accepter ou non les commandes via la console. Si désactivé, tout ce qui est tapé dans la console sera ignoré.\nUtile pour économiser des ressources sur les serveurs sans interface où la console n'est jamais utilisée (par ex. serveur hébergé, Docker, etc.)
pocketmine.yml.console.title-tick=Choisir d'activer ou non le rapport des statistiques du serveur dans le titre de la console.\nNOTE : Le ticker de titre sera désactivé quoi qu'il arrive si les couleurs de la console ne sont pas activées.
pocketmine.yml.aliases.1=Cette section vous permet d'ajouter, supprimer ou remapper des alias de commande.\nUn seul alias peut appeler une ou plusieurs autres commandes (ou alias).\nLes alias définis ici remplaceront tout alias de commande déclaré par des plugins ou par PocketMine-MP lui-même.
pocketmine.yml.aliases.2=Pour supprimer un alias, mettez-le à [], comme ceci (notez que les alias préfixés comme "pocketmine:stop" resteront et ne peuvent\npas être supprimés) :
pocketmine.yml.aliases.3=Les commandes ne sont pas supprimées, seulement leurs alias. Vous pouvez toujours faire référence à une commande par son nom complet (préfixé),\nmême si tous ses alias sont remplacés. Le nom complet ressemble généralement à "pocketmine:commandname" ou\n"pluginname:commandname".
pocketmine.yml.aliases.4=Pour ajouter un alias, listez la ou les commandes qu'il appelle :
pocketmine.yml.aliases.5=Pour invoquer une autre commande avec des arguments, utilisez $1 pour passer le premier argument, $2 pour le deuxième, etc. :
pocketmine.yml.aliases.6=Pour rendre des arguments obligatoires (afin que la commande échoue s'ils ne sont pas fournis), utilisez $$, par ex. $$1, $$2 :
pocketmine.yml.aliases.7=Pour transmettre une plage d'arguments, mettez un - (tiret) après l'index :
pocketmine.yml.aliases.8=Pour modifier un alias de commande existant et lui faire faire autre chose :
pocketmine.yml.worlds=Ces paramètres remplaceront le générateur défini dans server.properties et permettent de charger plusieurs mondes\nExemple :
pocketmine.yml.plugins.legacy-data-dir=Mettre ceci à true fera utiliser la structure héritée où les données des plugins sont placées dans le dossier --plugins.\nFalse placera les données des plugins sous plugin_data sous --data.\nCette option existe pour la compatibilité ascendante avec les installations existantes.

pocketmine.resource-packs.yml.header=Ce fichier de configuration contrôle les ressources globales utilisées sur votre serveur PocketMine-MP.
pocketmine.resource-packs.yml.force-resources=Choisissez si les joueurs doivent utiliser les packs de ressources que vous avez choisis pour rejoindre le serveur.\nREMARQUE: Ceci n'aura aucun effet s'il n'y a pas de packs de ressources dans la pile ci-dessous.
pocketmine.resource-packs.yml.stack=Les packs de ressources ici sont appliqués de bas en haut. Cela signifie que les ressources des packs supérieurs remplacent celles des packs inférieurs.\nLes entrées ici doivent indiquer le nom de fichier du pack de ressources.\nExemple:
pocketmine.resource-packs.yml.stack.force-vanilla=Si vous voulez forcer les clients à utiliser les ressources vanilla, vous devez placer un pack de ressources vanilla dans votre dossier resources et l'ajouter à la pile ici.
pocketmine.resource-packs.yml.stack.encryption-key=Pour spécifier une clé de chiffrement de ressource, placez la clé dans le fichier <resource>.key à côté du pack de ressources. Exemple: vanilla.zip.key

