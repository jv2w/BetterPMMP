pocketmine.betterpmmp.yml.world=Ajustes de mundo, chunk y distancia de visión.
pocketmine.betterpmmp.yml.world.block-cache-size=Tamaño de caché de bloques/colisiones por mundo. Mayor reduce el coste de consulta de bloques.
pocketmine.betterpmmp.yml.world.neighbour-update-limit=Máximo de actualizaciones de bloques vecinos por tick. 0 para ilimitado.
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=Los mundos sin jugadores corren 1 tick de cada 100 hasta que alguien entra.
pocketmine.betterpmmp.yml.world.view-distance-per-world=Distancia de visión por mundo, por nombre de carpeta del mundo.
pocketmine.betterpmmp.yml.world.chunk-ticking=Límites de ticking de chunks y anulaciones por mundo.
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=Máximo de chunks revisados para elegibilidad de tick por tick. 0 para ilimitado.
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=Ticking de chunks por mundo, por nombre de carpeta del mundo.
pocketmine.betterpmmp.yml.lighting=Generación y actualización de luz del lado del servidor.
pocketmine.betterpmmp.yml.lighting.fixed-light=Omitir la generación de luz asíncrona y rellenar la luz con un valor fijo.
pocketmine.betterpmmp.yml.lighting.fixed-light-level=Nivel de luz usado cuando fixed-light está activado (0 a 15).
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=Omitir el recálculo de luz en tiempo real al cambiar bloques.
pocketmine.betterpmmp.yml.entities=Comportamiento de objetos tirados y orbes de XP.
pocketmine.betterpmmp.yml.entities.item-merging=Combinar objetos tirados cercanos en pilas.
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=Tiempo de desaparición de objetos tirados en ticks (vanilla 6000).
pocketmine.betterpmmp.yml.entities.xp-orbs=Generar orbes de XP. Desactivar para omitir sus escaneos por tick.
pocketmine.betterpmmp.yml.entities.pickup-scan-period=Escanear recogidas cada N ticks (1 para vanilla).
pocketmine.betterpmmp.yml.combat=Golpes críticos y daño de explosión.
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=Permitir golpes críticos mientras se esprinta.
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=Distancia mínima de caída para un golpe crítico (vanilla 0.0).
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=Dejar que las explosiones destruyan bloques.
pocketmine.betterpmmp.yml.network=Compresión de paquetes y limitación de difusión de movimiento.
pocketmine.betterpmmp.yml.network.snappy-compression=Usar compresión Snappy en vez de zlib. Requiere la extensión snappy.
pocketmine.betterpmmp.yml.network.movement-broadcast-period=Difundir paquetes de movimiento cada N ticks (1 para vanilla).
pocketmine.betterpmmp.yml.network.skip-movement-send-event=Omitir DataPacketSendEvent para paquetes de movimiento.
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=Omitir DataPacketReceiveEvent para paquetes de entrada del jugador.
pocketmine.betterpmmp.yml.events=Limitación de eventos de juego.
pocketmine.betterpmmp.yml.events.move-event-period=Disparar PlayerMoveEvent cada N ticks (1 para vanilla).
pocketmine.betterpmmp.yml.recipes=Registro de recetas vanilla.
pocketmine.betterpmmp.yml.recipes.load-vanilla=Cargar recetas vanilla de fabricación, horno y elaboración al iniciar.
pocketmine.yml.header=Archivo de configuración principal de PocketMine-MP\nEstos son los ajustes que no se pueden incluir en server.properties\nAlgunos son seguros, otros pueden dañar tu servidor si se modifican incorrectamente\nLos nuevos ajustes/valores por defecto no aparecerán automáticamente en este archivo al actualizar.
pocketmine.yml.settings.force-language=Si enviar todas las cadenas traducidas a la configuración regional del servidor o dejar que el dispositivo las maneje
pocketmine.yml.settings.query-plugins=Permitir listar plugins a través de Query
pocketmine.yml.settings.enable-profiling=Habilitar por defecto el perfilado de plugins y del núcleo
pocketmine.yml.settings.profile-report-trigger=Solo añade resultados cuando la medición de tick es menor o igual al valor dado (por defecto 20)
pocketmine.yml.settings.async-workers=Número de workers de AsyncTask.\nSe usan para tareas asíncronas de plugins, generación de mundos, compresión y comunicación web.\nEstablece esto aproximadamente a tu número de núcleos.\nEn auto, intentará detectar el número de núcleos (o usará 2)
pocketmine.yml.settings.enable-dev-builds=Si permitir ejecutar compilaciones de desarrollo. Las compilaciones de dev pueden fallar, romper tus plugins, corromper tu mundo y más.\nSe recomienda evitar las compilaciones de desarrollo siempre que sea posible.
pocketmine.yml.memory.global-limit=Límite de memoria blando global en megabytes. Poner a 0 para desactivar\nEsto activa los low-memory-triggers y dispara un evento para liberar memoria cuando el uso supera este valor
pocketmine.yml.memory.main-limit=Límite de memoria blando del hilo principal en megabytes. Poner a 0 para desactivar\nEsto activa los low-memory-triggers y dispara un evento para liberar memoria cuando el uso supera este valor
pocketmine.yml.memory.main-hard-limit=Límite de memoria duro del hilo principal en megabytes. Poner a 0 para desactivar\nEsto detiene el servidor cuando se supera el límite
pocketmine.yml.memory.async-worker-hard-limit=Límite de memoria duro de los hilos AsyncWorker en megabytes. Poner a 0 para desactivar\nEsto hace fallar la tarea que se está ejecutando en el worker si la tarea supera el límite\nNOTA: ESTE LÍMITE SE APLICA POR WORKER, NO A TODO EL PROCESO.
pocketmine.yml.memory.check-rate=Periodo en ticks para comprobar la memoria (por defecto 1 segundo)
pocketmine.yml.memory.continuous-trigger=Seguir activando los low-memory-triggers y el evento mientras haya poca memoria
pocketmine.yml.memory.continuous-trigger-rate=Solo si memory.continuous-trigger está habilitado. Especifica la tasa en pasos de memory.check-rate (por defecto 30 segundos)
pocketmine.yml.memory.garbage-collection.period=Periodo en ticks para activar el recolector de basura manualmente (por defecto 30 minutos), poner a 0 para desactivar\nEsto solo afecta al hilo principal. Los demás hilos deben activar sus propias recolecciones
pocketmine.yml.memory.memory-dump=Ajustes que controlan el manejo de volcados de memoria.
pocketmine.yml.memory.memory-dump.dump-async-worker=Volcar la memoria de los workers asíncronos además del hilo principal. Si tienes problemas de segfault al volcar memoria, desactiva este ajuste.
pocketmine.yml.memory.max-chunks.chunk-radius=Limitar la distancia de renderizado máxima por jugador cuando se activa la memoria baja. Poner a 0 para desactivar el límite.
pocketmine.yml.network.batch-threshold=Umbral para agrupar paquetes, en bytes. Solo estos paquetes se comprimirán\nPoner a 0 para comprimir todo, -1 para desactivar.
pocketmine.yml.network.compression-level=Nivel de compresión usado al enviar paquetes agrupados. Más alto = más CPU, menos uso de ancho de banda
pocketmine.yml.network.async-compression=Usar AsyncTasks para la compresión durante la sesión de juego principal. Aumenta la latencia, pero puede reducir la carga del hilo principal
pocketmine.yml.network.async-compression-threshold=Umbral para la compresión asíncrona, en bytes. Solo los paquetes mayores que esto se comprimirán de forma asíncrona\nDebido a la gran sobrecarga de AsyncTask, la compresión asíncrona no vale la pena salvo para paquetes grandes
pocketmine.yml.network.upnp-forwarding=Experimental. Usar UPnP para reenviar puertos automáticamente
pocketmine.yml.network.max-mtu-size=Tamaño máximo en bytes de los paquetes enviados por la red (por defecto 1492 bytes). Los paquetes mayores serán\nfragmentados o divididos en partes más pequeñas. Los clientes pueden solicitar tamaños de MTU hasta, pero no más de, este número.
pocketmine.yml.network.enable-encryption=Habilitar el cifrado del tráfico de red de Minecraft. Esto afecta al rendimiento, pero evita que los hackers roben sesiones y se hagan pasar por otros jugadores.\nNO DESACTIVES ESTO a menos que entiendas los riesgos que implica.
pocketmine.yml.debug.level=Si es > 1, mostrará mensajes de depuración en la consola
pocketmine.yml.player.save-player-data=Elige si habilitar el guardado de datos de los jugadores.
pocketmine.yml.player.verify-xuid=Si es true, comprueba que el ID de usuario de Xbox (XUID) de los jugadores que se unen coincide con lo registrado previamente.\nEsto también evita que jugadores no-XBL usen los nombres de usuario de jugadores XBL para robar sus datos en servidores con xbox-auth=off.
pocketmine.yml.level-settings.default-format=El formato por defecto que usarán los mundos al crearse
pocketmine.yml.chunk-sending.per-tick=Para cambiar la distancia de renderizado normal del servidor, cambia view-distance en server.properties.\nCantidad de chunks enviados a los jugadores por tick
pocketmine.yml.chunk-sending.spawn-radius=Radio de chunks que deben enviarse antes de aparecer al jugador
pocketmine.yml.chunk-ticking.tick-radius=Radio de chunks alrededor de un jugador para tickear
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=Número de bloques dentro de los subchunks de las áreas de tick que se tickean cada tick. Valores más altos acelerarán eventos\ncomo el crecimiento de árboles y plantas, pero con un mayor coste de rendimiento.
pocketmine.yml.chunk-ticking.disable-block-ticking=ID de bloques en los que no realizar tick aleatorio.
pocketmine.yml.chunk-generation.population-queue-size=Cantidad máx. de chunks en la cola de espera para ser poblados
pocketmine.yml.auto-report.enabled=Enviar informes de fallos para su procesamiento
pocketmine.yml.anonymous-statistics.enabled=Envía estadísticas anónimas para la agregación de datos y el seguimiento del uso de plugins
pocketmine.yml.auto-updater.preferred-channel=Puede ser development, alpha, beta o stable.
pocketmine.yml.auto-updater.suggest-channels=Si usas una versión de desarrollo, sugerirá cambiar de canal
pocketmine.yml.timings.host=Elige el host a usar para ver tus resultados de timings.
pocketmine.yml.console.enable-input=Si aceptar comandos por la consola. Si se desactiva, cualquier cosa escrita en la consola será ignorada.\nÚtil para ahorrar recursos en servidores sin interfaz donde la consola nunca se usa (p. ej. servidor alojado, Docker, etc.)
pocketmine.yml.console.title-tick=Elige si habilitar el reporte de estadísticas del servidor en el título de la consola.\nNOTA: El ticker del título se desactivará igualmente si los colores de la consola no están habilitados.
pocketmine.yml.aliases.1=Esta sección te permite añadir, eliminar o reasignar alias de comandos.\nUn solo alias puede llamar a uno o más comandos (o alias).\nLos alias definidos aquí anularán cualquier alias de comando declarado por plugins o por el propio PocketMine-MP.
pocketmine.yml.aliases.2=Para eliminar un alias, ponlo a [], así (ten en cuenta que los alias con prefijo como "pocketmine:stop" permanecerán y no se pueden\neliminar):
pocketmine.yml.aliases.3=Los comandos no se eliminan, solo sus alias. Aún puedes referirte a un comando usando su nombre completo (con prefijo),\naunque todos sus alias estén sobrescritos. El nombre completo suele ser algo como "pocketmine:commandname" o\n"pluginname:commandname".
pocketmine.yml.aliases.4=Para añadir un alias, lista el o los comandos que llama:
pocketmine.yml.aliases.5=Para invocar otro comando con argumentos, usa $1 para pasar el primer argumento, $2 para el segundo, etc.:
pocketmine.yml.aliases.6=Para hacer que los argumentos sean obligatorios (de modo que el comando falle si no se proporcionan), usa $$, p. ej. $$1, $$2:
pocketmine.yml.aliases.7=Para pasar un rango de argumentos, pon un - (guion) después del índice:
pocketmine.yml.aliases.8=Para cambiar un alias de comando existente y hacer que haga otra cosa:
pocketmine.yml.worlds=Estos ajustes anularán el generador definido en server.properties y permiten cargar múltiples mundos\nEjemplo:
pocketmine.yml.plugins.legacy-data-dir=Poner esto a true hará que se use la estructura heredada donde los datos de los plugins se colocan dentro del directorio --plugins.\nFalse colocará los datos de los plugins bajo plugin_data bajo --data.\nEsta opción existe por compatibilidad con instalaciones existentes.

pocketmine.resource-packs.yml.header=Este archivo de configuración controla los recursos globales usados en tu servidor PocketMine-MP.
pocketmine.resource-packs.yml.force-resources=Elige si los jugadores deben usar los paquetes de recursos que elegiste para unirse al servidor.\nNOTA: Esto no hará nada si no hay paquetes de recursos en la pila de abajo.
pocketmine.resource-packs.yml.stack=Los paquetes de recursos aquí se aplican de abajo hacia arriba. Esto significa que los recursos de los paquetes superiores sobrescriben los de los inferiores.\nLas entradas aquí deben indicar el nombre de archivo del paquete de recursos.\nEjemplo:
pocketmine.resource-packs.yml.stack.force-vanilla=Si quieres forzar a los clientes a usar recursos vanilla, debes colocar un paquete de recursos vanilla en tu carpeta resources y añadirlo a la pila aquí.
pocketmine.resource-packs.yml.stack.encryption-key=Para especificar una clave de cifrado de recurso, pon la clave en el archivo <resource>.key junto al paquete de recursos. Ejemplo: vanilla.zip.key

