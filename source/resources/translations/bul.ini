pocketmine.command.alias.illegal=Псевдонимът '{%0}' не може да бъде регистриран, защото съдържа непозволени символи
pocketmine.command.alias.notFound=Псевдонимът '{%0}' не може да бъде регистриран, защото съдържа несъществуващи команди: {%1}
pocketmine.command.alias.recursive=Псевдонимът '{%0}' не може да бъде регистриран, защото съдържа рекурсивни команди: {%1}
pocketmine.command.ban.ip.description=Забранява на посочения IP адрес да използва този сървър
pocketmine.command.ban.player.description=Забранява на посочения играч да използва този сървър
pocketmine.command.banlist.description=Показва всички играчи, забранени на този сървър
pocketmine.command.clear.description=Изчиства предмети от инвентара на играча
pocketmine.command.clear.usage=/clear [player] [item] [maxCount]
pocketmine.command.defaultgamemode.description=Задава подразбиращия се режим на игра
pocketmine.command.deop.description=Отнема операторския статус на посочения играч
pocketmine.command.difficulty.description=Задава трудността на играта
pocketmine.command.dumpmemory.description=Записва диагностична информация за използването на паметта на диска
pocketmine.command.effect.description=Добавя/премахва ефекти върху играчите
pocketmine.command.enchant.description=Добавя омагьосвания върху предмети
pocketmine.command.error.permission=Нямате разрешение да използвате командата: {%commandName}
pocketmine.command.error.playerNotFound=Не може да бъде намерен играч, отговарящ на "{%playerName}"
pocketmine.command.error.playerUserOnly=Този синтаксис на командата може да се използва само като играч
pocketmine.command.gamemode.description=Променя играча в определен режим на игра
pocketmine.command.gamemode.failure=Смяната на режима на игра за {%playerName} се провали!
pocketmine.command.gamemode.unknown=Неизвестен режим на игра "{%gameModeName}"
pocketmine.command.gc.chunks=Чънкове: {%chunksCollected}
pocketmine.command.gc.cycles=Цикли: {%cyclesCollected}
pocketmine.command.gc.description=Стартира задачи за събиране на боклук
pocketmine.command.gc.entities=Обекти: {%entitiesCollected}
