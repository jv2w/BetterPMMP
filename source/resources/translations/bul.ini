; Strings without a "pocketmine." prefix are assumed to be vanilla translations.
; Those are sent as raw translation keys for the client to translate into its own language.
;
; Any NON-VANILLA string MUST have a key prefixed with "pocketmine." to ensure it is translated by the server.
; (Yes, this file currently doesn't follow these rules in many places. It's a work in progress to clean up.)

pocketmine.command.restart.description=Рестартиране на сървъра
pocketmine.command.restart.start=Сървърът се рестартира...
pocketmine.betterpmmp.yml.config=Форматиране на този конфигурационен файл.
pocketmine.betterpmmp.yml.config.enforce-format=Ако е true, този файл се пренаписва в оформлението на BetterPMMP при всяко стартиране: коментарите и редът на ключовете се нулират по този шаблон на езика на сървъра, всички стойности се запазват.\nКлючове, които липсват в шаблона, запазват стойностите си, но губят коментарите си и се преместват в края на своя раздел.
pocketmine.betterpmmp.yml.world=Настройки на света, чънковете и разстоянието на видимост.
pocketmine.betterpmmp.yml.world.block-cache-size=Размер на кеша за блокове/колизии на свят. По-голям намалява цената на търсене на блок.
pocketmine.betterpmmp.yml.world.neighbour-update-limit=Максимум обновявания на съседни блокове на тик. 0 за неограничено.
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=Светове без играчи изпълняват 1 тик от 100, докато някой не влезе.
pocketmine.betterpmmp.yml.world.view-distance-per-world=Разстояние на видимост на свят, по име на папката на света.
pocketmine.betterpmmp.yml.world.chunk-ticking=Лимити за тикване на чънкове и предефиниции на свят.
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=Максимум чънкове, проверявани за допустимост за тик на тик. 0 за неограничено.
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=Тикване на чънкове на свят, по име на папката на света.
pocketmine.betterpmmp.yml.lighting=Изчисляване и обновяване на светлината от страна на сървъра.
pocketmine.betterpmmp.yml.lighting.fixed-light=Пропускане на асинхронното изчисляване на светлина и запълване с фиксирана стойност.
pocketmine.betterpmmp.yml.lighting.fixed-light-level=Ниво на светлина при включен fixed-light (0 до 15).
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=Пропускане на преизчисляването на светлината при промяна на блокове.
pocketmine.betterpmmp.yml.entities=Поведение на изпуснатите предмети и сферите с опит.
pocketmine.betterpmmp.yml.entities.item-merging=Обединяване на близките изпуснати предмети на купчини.
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=Време за изчезване на изпуснатите предмети в тикове (ванила 6000). -1: предметите никога не изчезват.
pocketmine.betterpmmp.yml.entities.xp-orbs=Създаване на сфери с опит. Изключването пропуска проверките им на тик.
pocketmine.betterpmmp.yml.entities.pickup-scan-period=Проверка за вземане на всеки N тика (1 за ванила).
pocketmine.betterpmmp.yml.combat=Критични удари и щети от експлозия.
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=Разрешаване на критични удари по време на спринт.
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=Минимално разстояние на падане за критичен удар (ванила 0.0).
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=Позволяване на експлозиите да разрушават блокове.
pocketmine.betterpmmp.yml.network=Компресия на пакети и ограничаване на излъчването на движение.
pocketmine.betterpmmp.yml.network.snappy-compression=Използване на Snappy компресия вместо zlib. Включено в официалния binary; разширението snappy е необходимо само при персонализирани PHP компилации.
pocketmine.betterpmmp.yml.network.movement-broadcast-period=Излъчване на пакети за движение на всеки N тика (1 за ванила).
pocketmine.betterpmmp.yml.network.skip-movement-send-event=Пропускане на DataPacketSendEvent за пакети за движение.
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=Пропускане на DataPacketReceiveEvent за пакети с вход от играча.
pocketmine.betterpmmp.yml.events=Ограничаване на игровите събития.
pocketmine.betterpmmp.yml.events.move-event-period=Задействане на PlayerMoveEvent на всеки N тика (1 за ванила).
pocketmine.betterpmmp.yml.recipes=Регистриране на ванила рецепти.
pocketmine.betterpmmp.yml.recipes.load-vanilla=Зареждане на ванила рецепти за маса, пещ и варене при стартиране.
pocketmine.betterpmmp.yml.plugins=Логване на плъгини.
pocketmine.betterpmmp.yml.gameplay=Превключватели на игрови механики.
pocketmine.betterpmmp.yml.gameplay.hunger-exhaustion=Изразходване на глад от всякакви причини: движение, скачане, атака, копаене, щети, възстановяване и отвари. Изключете, за да пропуснете цялата механика.
pocketmine.betterpmmp.yml.gameplay.fall-damage=Щети от падане за живи същества. Изключете, за да пропуснете изцяло обработката на щетите от падане.
pocketmine.betterpmmp.yml.gameplay.farmland-persistent=Обработваемата земя никога не изсъхва, не се утъпква и не се превръща обратно в пръст. Напълно мократа земя пропуска търсенето на вода.
pocketmine.betterpmmp.yml.gameplay.farmland-instant-hydration=Обработваемата земя, създадена чрез разораване или поставяне, започва напълно хидратирана.
pocketmine.yml.header=Главен конфигурационен файл на PocketMine-MP\nТова са настройките, които не могат да бъдат включени в server.properties\nНякои са безопасни, други могат да повредят сървъра ви при неправилна промяна\nНови настройки/стойности по подразбиране няма да се появят автоматично в този файл при надграждане.
pocketmine.yml.settings.force-language=Дали всички низове да се изпращат преведени на локала на сървъра, или устройството да ги обработва
pocketmine.yml.settings.query-plugins=Разрешаване на изброяване на плъгини чрез Query
pocketmine.yml.settings.enable-profiling=Включване по подразбиране на профилиране на плъгини и ядро
pocketmine.yml.settings.profile-report-trigger=Добавя резултати само когато измерването на тик е по-малко или равно на дадената стойност (по подразбиране 20)
pocketmine.yml.settings.async-workers=Брой на AsyncTask работници.\nИзползват се за асинхронни задачи на плъгини, генериране на свят, компресия и уеб комуникация.\nЗадайте това приблизително на броя на ядрата ви.\nПри auto ще опита да открие броя на ядрата (или ще използва 2)
pocketmine.yml.settings.enable-dev-builds=Дали да се разрешава изпълнение на разработчески компилации. Dev компилациите може да блокират, да развалят плъгините ви, да повредят света ви и още.\nПрепоръчва се да избягвате разработческите компилации, когато е възможно.
pocketmine.yml.memory.global-limit=Глобален мек лимит на паметта в мегабайти. 0 за изключване\nТова задейства low-memory-triggers и генерира събитие за освобождаване на памет, когато употребата надхвърли това
pocketmine.yml.memory.main-limit=Мек лимит на паметта на главната нишка в мегабайти. 0 за изключване\nТова задейства low-memory-triggers и генерира събитие за освобождаване на памет, когато употребата надхвърли това
pocketmine.yml.memory.main-hard-limit=Твърд лимит на паметта на главната нишка в мегабайти. 0 за изключване\nТова спира сървъра при надхвърляне на лимита
pocketmine.yml.memory.async-worker-hard-limit=Твърд лимит на паметта на AsyncWorker нишките в мегабайти. 0 за изключване\nТова прекратява аварийно задачата, изпълнявана в момента на работника, ако тя надхвърли лимита\nЗАБЕЛЕЖКА: ТОЗИ ЛИМИТ СЕ ПРИЛАГА ЗА ВСЕКИ РАБОТНИК, А НЕ ЗА ЦЕЛИЯ ПРОЦЕС.
pocketmine.yml.memory.check-rate=Период за проверка на паметта в тикове (по подразбиране 1 секунда)
pocketmine.yml.memory.continuous-trigger=Продължаване на задействането на low-memory-triggers и събитието при ниска памет
pocketmine.yml.memory.continuous-trigger-rate=Само ако memory.continuous-trigger е включен. Задава честотата в стъпки на memory.check-rate (по подразбиране 30 секунди)
pocketmine.yml.memory.garbage-collection.period=Период за ръчно задействане на събирача на боклук в тикове (по подразбиране 30 минути), 0 за изключване\nТова засяга само главната нишка. Другите нишки трябва да задействат собствено събиране
pocketmine.yml.memory.memory-dump=Настройки, управляващи обработката на дъмп на паметта.
pocketmine.yml.memory.memory-dump.dump-async-worker=Дъмп на паметта на асинхронните работници, както и на главната нишка. Ако имате проблеми със segfault при дъмп на памет, изключете тази настройка.
pocketmine.yml.memory.max-chunks.chunk-radius=Ограничаване на максималната дистанция на рендиране на играч при задействане на ниска памет. 0 за изключване на ограничението.
pocketmine.yml.network.batch-threshold=Праг за групиране на пакети в байтове. Само тези пакети ще бъдат компресирани\n0 за компресиране на всичко, -1 за изключване.
pocketmine.yml.network.compression-level=Ниво на компресия при изпращане на групирани пакети. По-високо = повече CPU, по-малко трафик. Само за zlib - Snappy няма настройка за ниво, затова това се игнорира, когато better-pmmp.network.snappy-compression е включен
pocketmine.yml.network.async-compression=Използване на AsyncTask за компресия по време на основната игрова сесия. Увеличава латентността, но може да намали натоварването на главната нишка
pocketmine.yml.network.async-compression-threshold=Праг за асинхронна компресия в байтове. Само пакети по-големи от това ще се компресират асинхронно\nПоради големите разходи на AsyncTask асинхронната компресия си струва само за големи пакети
pocketmine.yml.network.upnp-forwarding=Експериментално. Използване на UPnP за автоматично пренасочване на портове
pocketmine.yml.network.max-mtu-size=Максимален размер в байтове на пакетите, изпращани по мрежата (по подразбиране 1492 байта). По-големите пакети ще бъдат\nфрагментирани или разделени на по-малки части. Клиентите могат да заявяват MTU размери до, но не повече от това число.
pocketmine.yml.network.enable-encryption=Включване на криптиране на мрежовия трафик на Minecraft. Това влияе на производителността, но пречи на хакери да крадат сесии и да се представят за други играчи.\nНЕ ИЗКЛЮЧВАЙТЕ ТОВА, освен ако не разбирате свързаните рискове.
pocketmine.yml.debug.level=Ако е > 1, ще показва съобщения за отстраняване на грешки в конзолата
pocketmine.yml.player.save-player-data=Изберете дали да се включи запазването на данните на играчите.
pocketmine.yml.player.verify-xuid=Ако е true, проверява дали Xbox потребителското ID (XUID) на присъединяващите се играчи съвпада с предишно записаното.\nТова също пречи на не-XBL играчи да използват потребителските имена на XBL играчи, за да крадат данните им на сървъри с xbox-auth=off.
pocketmine.yml.level-settings.default-format=Форматът по подразбиране, който световете ще използват при създаване
pocketmine.yml.chunk-sending.per-tick=За да промените нормалната дистанция на рендиране на сървъра, променете view-distance в server.properties.\nБрой чънкове, изпращани на играчите за тик
pocketmine.yml.chunk-sending.spawn-radius=Радиус на чънкове, които трябва да се изпратят преди спауна на играча
pocketmine.yml.chunk-ticking.tick-radius=Радиус на чънкове около играч за тикване
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=Брой блокове в субчънковете на тикащите зони, които се тикат всеки тик. По-високите стойности ускоряват събития\nкато растежа на дървета и растения, но с по-висока цена за производителността.
pocketmine.yml.chunk-ticking.disable-block-ticking=ID на блокове, върху които да не се извършва случаен тик.
pocketmine.yml.chunk-generation.population-queue-size=Макс. брой чънкове в опашката за попълване
pocketmine.yml.auto-report.enabled=Изпращане на доклади за сривове за обработка
pocketmine.yml.anonymous-statistics.enabled=Изпраща анонимна статистика за агрегиране на данни и проследяване на употребата на плъгини
pocketmine.yml.auto-updater.preferred-channel=Може да бъде development, alpha, beta или stable.
pocketmine.yml.auto-updater.suggest-channels=Ако използвате версия за разработка, ще предложи смяна на канала
pocketmine.yml.timings.host=Изберете хоста за преглед на резултатите от timings.
pocketmine.yml.console.enable-input=Дали да се приемат команди през конзолата. Ако е изключено, всичко въведено в конзолата ще се игнорира.\nПолезно за пестене на ресурси на headless сървъри, където конзолата никога не се използва (напр. хостван сървър, Docker и т.н.)
pocketmine.yml.console.title-tick=Изберете дали да се включи докладване на статистиката на сървъра в заглавието на конзолата.\nЗАБЕЛЕЖКА: Тикерът на заглавието ще бъде изключен независимо, ако цветовете на конзолата не са включени.
pocketmine.yml.aliases.1=Този раздел ви позволява да добавяте, премахвате или пренасочвате псевдоними на команди.\nЕдин псевдоним може да извиква една или повече други команди (или псевдоними).\nПсевдонимите, дефинирани тук, ще заменят всеки псевдоним на команда, деклариран от плъгини или от самия PocketMine-MP.
pocketmine.yml.aliases.2=За да премахнете псевдоним, задайте му [], ето така (забележете, че префиксираните псевдоними като "pocketmine:stop" ще останат и не могат\nда бъдат премахнати):
pocketmine.yml.aliases.3=Командите не се премахват, а само техните псевдоними. Все още можете да се обръщате към команда чрез пълното ѝ (префиксирано)\nиме, дори ако всичките ѝ псевдоними са презаписани. Пълното име обикновено е нещо като "pocketmine:commandname" или\n"pluginname:commandname".
pocketmine.yml.aliases.4=За да добавите псевдоним, избройте командата(ите), които извиква:
pocketmine.yml.aliases.5=За да извикате друга команда с аргументи, използвайте $1 за първия аргумент, $2 за втория и т.н.:
pocketmine.yml.aliases.6=За да направите аргументите задължителни (така че командата да се провали, ако не са подадени), използвайте $$, напр. $$1, $$2:
pocketmine.yml.aliases.7=За да предадете диапазон от аргументи, поставете - (тире) след индекса:
pocketmine.yml.aliases.8=За да промените съществуващ псевдоним на команда и да го накарате да прави друго:
pocketmine.yml.worlds=Тези настройки ще заменят генератора, зададен в server.properties, и позволяват зареждане на няколко свята\nПример:
pocketmine.yml.plugins.legacy-data-dir=Задаването на true ще накара да се използва старата структура, при която данните на плъгините се поставят в директорията --plugins.\nFalse поставя данните на плъгините под plugin_data под --data.\nТази опция съществува за обратна съвместимост със съществуващи инсталации.

pocketmine.resource-packs.yml.header=Този конфигурационен файл управлява глобалните ресурси, използвани на вашия PocketMine-MP сървър.
pocketmine.resource-packs.yml.force-resources=Изберете дали играчите трябва да използват избраните от вас пакети с ресурси, за да се присъединят към сървъра.\nЗАБЕЛЕЖКА: Това няма да направи нищо, ако в стека по-долу няма пакети с ресурси.
pocketmine.resource-packs.yml.stack=Пакетите с ресурси тук се прилагат отдолу нагоре. Това означава, че ресурсите в по-горните пакети заменят тези в по-долните.\nЗаписите тук трябва да посочват името на файла на пакета с ресурси.\nПример:
pocketmine.resource-packs.yml.stack.force-vanilla=Ако искате да принудите клиентите да използват ванилни ресурси, трябва да поставите ванилен пакет с ресурси в папката resources и да го добавите към стека тук.
pocketmine.resource-packs.yml.stack.encryption-key=За да зададете ключ за криптиране на ресурс, поставете ключа във файла <resource>.key до пакета с ресурси. Пример: vanilla.zip.key

commands.banlist.ips=Засега има {%0} забранени IP адреси:
commands.title.usage=/заглавие <player> <clear | reset | title | subtitle | actionbar | times> ...

