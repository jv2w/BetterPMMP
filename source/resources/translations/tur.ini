pocketmine.betterpmmp.yml.world=Dünya, chunk ve görüş mesafesi ayarları.
pocketmine.betterpmmp.yml.world.block-cache-size=Dünya başına blok/çarpışma önbelleği boyutu. Yüksek olması blok sorgulama maliyetini azaltır.
pocketmine.betterpmmp.yml.world.neighbour-update-limit=Tik başına en fazla komşu blok güncellemesi. 0 sınırsız demektir.
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=Oyuncusuz dünyalar biri girene kadar 100 tikte 1 tik çalışır.
pocketmine.betterpmmp.yml.world.view-distance-per-world=Dünya klasör adına göre dünya başına görüş mesafesi.
pocketmine.betterpmmp.yml.world.chunk-ticking=Chunk tikleme sınırları ve dünya başına geçersiz kılmalar.
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=Tik başına tik uygunluğu için yeniden kontrol edilen en fazla chunk. 0 sınırsız demektir.
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=Dünya klasör adına göre dünya başına chunk tikleme.
pocketmine.betterpmmp.yml.lighting=Sunucu tarafı ışık üretimi ve güncellemesi.
pocketmine.betterpmmp.yml.lighting.fixed-light=Eşzamansız ışık üretimini atla ve ışığı sabit bir değerle doldur.
pocketmine.betterpmmp.yml.lighting.fixed-light-level=fixed-light açıkken kullanılan ışık seviyesi (0 ile 15 arası).
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=Bloklar değiştiğinde çalışma zamanı ışık yeniden hesaplamasını atla.
pocketmine.betterpmmp.yml.entities=Düşen eşya ve XP küresi davranışı.
pocketmine.betterpmmp.yml.entities.item-merging=Yakındaki düşen eşyaları yığınlar halinde birleştir.
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=Düşen eşyaların yok olma süresi (tik) (vanilya 6000).
pocketmine.betterpmmp.yml.entities.xp-orbs=XP küreleri oluştur. Kapatmak tik başına taramalarını atlar.
pocketmine.betterpmmp.yml.entities.pickup-scan-period=Her N tikte bir alınabilir eşya taraması yap (1 vanilya).
pocketmine.betterpmmp.yml.combat=Kritik vuruşlar ve patlama hasarı.
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=Koşarken kritik vuruşlara izin ver.
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=Kritik vuruş için en az düşme mesafesi (vanilya 0.0).
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=Patlamaların blok kırmasına izin ver.
pocketmine.betterpmmp.yml.network=Paket sıkıştırma ve hareket yayını kısıtlaması.
pocketmine.betterpmmp.yml.network.snappy-compression=zlib yerine Snappy sıkıştırma kullan. Resmi ikili dosyada gömülü; snappy eklentisi yalnızca özel PHP derlemelerinde gereklidir.
pocketmine.betterpmmp.yml.network.movement-broadcast-period=Hareket paketlerini her N tikte bir yayınla (1 vanilya).
pocketmine.betterpmmp.yml.network.skip-movement-send-event=Hareket paketleri için DataPacketSendEvent'i atla.
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=Oyuncu giriş paketleri için DataPacketReceiveEvent'i atla.
pocketmine.betterpmmp.yml.events=Oyun olayı kısıtlaması.
pocketmine.betterpmmp.yml.events.move-event-period=PlayerMoveEvent'i her N tikte bir tetikle (1 vanilya).
pocketmine.betterpmmp.yml.recipes=Vanilya tarif kaydı.
pocketmine.betterpmmp.yml.recipes.load-vanilla=Başlangıçta vanilya çalışma tezgahı, fırın ve mayalama tariflerini yükle.
pocketmine.yml.header=PocketMine-MP ana yapılandırma dosyası\nBunlar server.properties içine dahil edilemeyen ayarlardır\nBazıları güvenlidir, bazıları yanlış değiştirilirse sunucunuzu bozabilir\nYükseltme sırasında yeni ayarlar/varsayılanlar bu dosyada otomatik olarak görünmez.
pocketmine.yml.settings.force-language=Tüm metinlerin sunucu diline çevrilerek mi gönderileceği, yoksa cihazın mı işleyeceği
pocketmine.yml.settings.query-plugins=Query üzerinden eklentilerin listelenmesine izin ver
pocketmine.yml.settings.enable-profiling=Eklenti ve çekirdek profillemesini varsayılan olarak etkinleştir
pocketmine.yml.settings.profile-report-trigger=Yalnızca tik ölçümü verilen değere eşit veya küçük olduğunda sonuç ekler (varsayılan 20)
pocketmine.yml.settings.async-workers=AsyncTask işçi sayısı.\nEklenti asenkron görevleri, dünya üretimi, sıkıştırma ve web iletişimi için kullanılır.\nBunu yaklaşık olarak çekirdek sayınıza ayarlayın.\nauto olarak ayarlanırsa çekirdek sayısını algılamaya çalışır (veya 2 kullanır)
pocketmine.yml.settings.enable-dev-builds=Geliştirme sürümlerinin çalıştırılmasına izin verilip verilmeyeceği. Dev sürümleri çökebilir, eklentilerinizi bozabilir, dünyanızı bozabilir ve daha fazlası.\nMümkünse geliştirme sürümlerinden kaçınmanız önerilir.
pocketmine.yml.memory.global-limit=Megabayt cinsinden genel yumuşak bellek sınırı. Devre dışı bırakmak için 0 yapın\nBu, kullanım bunun üzerine çıktığında low-memory-triggers'ı tetikler ve belleği boşaltmak için bir olay başlatır
pocketmine.yml.memory.main-limit=Megabayt cinsinden ana iş parçacığı yumuşak bellek sınırı. Devre dışı bırakmak için 0 yapın\nBu, kullanım bunun üzerine çıktığında low-memory-triggers'ı tetikler ve belleği boşaltmak için bir olay başlatır
pocketmine.yml.memory.main-hard-limit=Megabayt cinsinden ana iş parçacığı katı bellek sınırı. Devre dışı bırakmak için 0 yapın\nBu, sınır aşıldığında sunucuyu durdurur
pocketmine.yml.memory.async-worker-hard-limit=Megabayt cinsinden AsyncWorker iş parçacıklarının katı bellek sınırı. Devre dışı bırakmak için 0 yapın\nBu, görev sınırı aşarsa işçide o an çalışan görevi çökertir\nNOT: BU SINIR HER İŞÇİYE UYGULANIR, TÜM SÜRECE DEĞİL.
pocketmine.yml.memory.check-rate=Belleği kontrol etme periyodu (tik) (varsayılan 1 saniye)
pocketmine.yml.memory.continuous-trigger=Düşük bellekteyken low-memory-triggers ve olayı tetiklemeye devam et
pocketmine.yml.memory.continuous-trigger-rate=Yalnızca memory.continuous-trigger etkinse. Oranı memory.check-rate adımları cinsinden belirtir (varsayılan 30 saniye)
pocketmine.yml.memory.garbage-collection.period=Çöp toplayıcıyı elle tetikleme periyodu (tik) (varsayılan 30 dakika), devre dışı bırakmak için 0 yapın\nBu yalnızca ana iş parçacığını etkiler. Diğer iş parçacıkları kendi toplamalarını tetiklemelidir
pocketmine.yml.memory.memory-dump=Bellek dökümü işlemesini kontrol eden ayarlar.
pocketmine.yml.memory.memory-dump.dump-async-worker=Ana iş parçacığının yanı sıra asenkron işçilerin belleğini de dök. Bellek dökerken segfault sorunları yaşarsanız bu ayarı devre dışı bırakın.
pocketmine.yml.memory.max-chunks.chunk-radius=Düşük bellek tetiklendiğinde oyuncu başına maksimum render mesafesini sınırla. Sınırı devre dışı bırakmak için 0 yapın.
pocketmine.yml.network.batch-threshold=Paketleri gruplama eşiği (bayt). Yalnızca bu paketler sıkıştırılır\nHer şeyi sıkıştırmak için 0, devre dışı bırakmak için -1.
pocketmine.yml.network.compression-level=Gruplu paketler gönderilirken kullanılan sıkıştırma seviyesi. Daha yüksek = daha fazla CPU, daha az bant genişliği kullanımı
pocketmine.yml.network.async-compression=Ana oyun oturumu sırasında sıkıştırma için AsyncTask kullan. Gecikmeyi artırır ama ana iş parçacığı yükünü azaltabilir
pocketmine.yml.network.async-compression-threshold=Asenkron sıkıştırma eşiği (bayt). Yalnızca bundan büyük paketler asenkron olarak sıkıştırılır\nAsyncTask'in büyük ek yükü nedeniyle asenkron sıkıştırma yalnızca büyük paketler için değer
pocketmine.yml.network.upnp-forwarding=Deneysel. Bağlantı noktalarını otomatik yönlendirmek için UPnP kullan
pocketmine.yml.network.max-mtu-size=Ağ üzerinden gönderilen paketlerin bayt cinsinden maksimum boyutu (varsayılan 1492 bayt). Bundan büyük paketler\nparçalanır veya daha küçük parçalara bölünür. İstemciler bu sayıya kadar, ama daha fazla değil, MTU boyutları isteyebilir.
pocketmine.yml.network.enable-encryption=Minecraft ağ trafiğinin şifrelemesini etkinleştir. Bu performansı etkiler ama hackerların oturumları çalıp başka oyuncular gibi davranmasını önler.\nİçerdiği riskleri anlamadığınız sürece BUNU DEVRE DIŞI BIRAKMAYIN.
pocketmine.yml.debug.level=1'den büyükse, konsolda hata ayıklama mesajları gösterir
pocketmine.yml.player.save-player-data=Oyuncu verisi kaydetmeyi etkinleştirip etkinleştirmeyeceğinizi seçin.
pocketmine.yml.player.verify-xuid=true ise, katılan oyuncuların Xbox kullanıcı kimliğinin (XUID) daha önce kaydedilenle eşleşip eşleşmediğini kontrol eder.\nBu ayrıca xbox-auth=off olan sunucularda XBL olmayan oyuncuların, XBL oyuncularının kullanıcı adlarını kullanarak verilerini çalmasını önler.
pocketmine.yml.level-settings.default-format=Dünyaların oluşturulurken kullanacağı varsayılan format
pocketmine.yml.chunk-sending.per-tick=Sunucunun normal render mesafesini değiştirmek için server.properties içindeki view-distance değerini değiştirin.\nHer tikte oyunculara gönderilen chunk sayısı
pocketmine.yml.chunk-sending.spawn-radius=Oyuncu doğmadan önce gönderilmesi gereken chunk yarıçapı
pocketmine.yml.chunk-ticking.tick-radius=Bir oyuncunun çevresinde tiklenecek chunk yarıçapı
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=Tik alanlarının alt-chunklarında her tik tiklenen blok sayısı. Daha yüksek değerler ağaç ve bitki büyümesi gibi\nolayları hızlandırır ama daha yüksek performans maliyetiyle.
pocketmine.yml.chunk-ticking.disable-block-ticking=Rastgele tik uygulanmayacak blokların kimlikleri.
pocketmine.yml.chunk-generation.population-queue-size=Doldurulmayı bekleyen kuyruktaki maksimum chunk sayısı
pocketmine.yml.auto-report.enabled=Çökme raporlarını işlenmek üzere gönder
pocketmine.yml.anonymous-statistics.enabled=Veri toplama ve eklenti kullanımını izleme için anonim istatistikler gönderir
pocketmine.yml.auto-updater.preferred-channel=development, alpha, beta veya stable olabilir.
pocketmine.yml.auto-updater.suggest-channels=Bir geliştirme sürümü kullanıyorsanız kanal değiştirmeyi önerir
pocketmine.yml.timings.host=timings sonuçlarınızı görüntülemek için kullanılacak hostu seçin.
pocketmine.yml.console.enable-input=Komutların konsol üzerinden kabul edilip edilmeyeceği. Devre dışıysa, konsola yazılan her şey yok sayılır.\nKonsolun hiç kullanılmadığı başsız sunucularda (ör. barındırılan sunucu, Docker vb.) kaynak tasarrufu için yararlıdır.
pocketmine.yml.console.title-tick=Konsol başlığında sunucu istatistiği raporlamayı etkinleştirip etkinleştirmeyeceğinizi seçin.\nNOT: Konsol renkleri etkin değilse başlık tikeri yine de devre dışı kalır.
pocketmine.yml.aliases.1=Bu bölüm komut takma adları eklemenize, kaldırmanıza veya yeniden eşlemenize olanak tanır.\nTek bir takma ad, bir veya daha fazla başka komutu (veya takma adı) çağırabilir.\nBurada tanımlanan takma adlar, eklentilerin veya PocketMine-MP'nin kendisinin bildirdiği komut takma adlarını geçersiz kılar.
pocketmine.yml.aliases.2=Bir takma adı kaldırmak için onu [] olarak ayarlayın, şöyle ("pocketmine:stop" gibi ön ekli takma adların kalacağını ve\nkaldırılamayacağını unutmayın):
pocketmine.yml.aliases.3=Komutlar kaldırılmaz, yalnızca takma adları. Tüm takma adları geçersiz kılınsa bile, bir komuta tam (ön ekli)\nadıyla yine de başvurabilirsiniz. Tam ad genellikle "pocketmine:commandname" veya\n"pluginname:commandname" gibi bir şeydir.
pocketmine.yml.aliases.4=Takma ad eklemek için çağırdığı komutları listeleyin:
pocketmine.yml.aliases.5=Başka bir komutu argümanlarla çağırmak için ilk argümanı geçmek üzere $1, ikincisi için $2 vb. kullanın:
pocketmine.yml.aliases.6=Argümanları zorunlu kılmak için (böylece verilmezse komut başarısız olur) $$ kullanın, ör. $$1, $$2:
pocketmine.yml.aliases.7=Bir argüman aralığını aktarmak için indeksten sonra bir - (tire) koyun:
pocketmine.yml.aliases.8=Mevcut bir komut takma adını değiştirip başka bir şey yaptırmak için:
pocketmine.yml.worlds=Bu ayarlar server.properties içinde ayarlanan üreteci geçersiz kılar ve birden fazla dünya yüklemeye olanak tanır\nÖrnek:
pocketmine.yml.plugins.legacy-data-dir=Bunu true yapmak, eklenti verilerinin --plugins dizini içine yerleştirildiği eski yapının kullanılmasına neden olur.\nFalse, eklenti verilerini --data altındaki plugin_data içine yerleştirir.\nBu seçenek mevcut kurulumlarla geriye dönük uyumluluk için vardır.

pocketmine.resource-packs.yml.header=Bu yapılandırma dosyası, PocketMine-MP sunucunuzda kullanılan genel kaynakları kontrol eder.
pocketmine.resource-packs.yml.force-resources=Oyuncuların sunucuya katılmak için seçtiğiniz kaynak paketlerini kullanmak zorunda olup olmadığını seçin.\nNOT: Aşağıdaki yığında kaynak paketi yoksa bu hiçbir şey yapmaz.
pocketmine.resource-packs.yml.stack=Buradaki kaynak paketleri aşağıdan yukarıya doğru uygulanır. Bu, üst paketlerdeki kaynakların alttakileri geçersiz kılacağı anlamına gelir.\nBuradaki girişler kaynak paketinin dosya adını belirtmelidir.\nÖrnek:
pocketmine.resource-packs.yml.stack.force-vanilla=İstemcileri vanilla kaynaklarını kullanmaya zorlamak istiyorsanız, resources klasörünüze bir vanilla kaynak paketi koymalı ve buradaki yığına eklemelisiniz.
pocketmine.resource-packs.yml.stack.encryption-key=Bir kaynak şifreleme anahtarı belirtmek için, anahtarı kaynak paketinin yanındaki <resource>.key dosyasına koyun. Örnek: vanilla.zip.key

