; Strings without a "pocketmine." prefix are assumed to be vanilla translations.
; Those are sent as raw translation keys for the client to translate into its own language.
;
; Any NON-VANILLA string MUST have a key prefixed with "pocketmine." to ensure it is translated by the server.
; (Yes, this file currently doesn't follow these rules in many places. It's a work in progress to clean up.)

pocketmine.command.restart.description=Riavvia il server
pocketmine.command.restart.start=Il server si sta riavviando...
pocketmine.betterpmmp.yml.world=Impostazioni di mondo, chunk e distanza di visuale.
pocketmine.betterpmmp.yml.world.block-cache-size=Dimensione cache blocchi/collisioni per mondo. Più alta riduce il costo di lettura dei blocchi.
pocketmine.betterpmmp.yml.world.neighbour-update-limit=Massimo aggiornamenti dei blocchi vicini per tick. 0 per illimitato.
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=I mondi senza giocatori girano 1 tick su 100 finché qualcuno non entra.
pocketmine.betterpmmp.yml.world.view-distance-per-world=Distanza di visuale per mondo, per nome della cartella del mondo.
pocketmine.betterpmmp.yml.world.chunk-ticking=Limiti del ticking dei chunk e override per mondo.
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=Massimo chunk ricontrollati per idoneità al tick per tick. 0 per illimitato.
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=Ticking dei chunk per mondo, per nome della cartella del mondo.
pocketmine.betterpmmp.yml.lighting=Generazione e aggiornamento della luce lato server.
pocketmine.betterpmmp.yml.lighting.fixed-light=Salta la generazione di luce asincrona e riempi la luce con un valore fisso.
pocketmine.betterpmmp.yml.lighting.fixed-light-level=Livello di luce usato quando fixed-light è attivo (0 a 15).
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=Salta il ricalcolo della luce a runtime quando i blocchi cambiano.
pocketmine.betterpmmp.yml.entities=Comportamento di oggetti a terra e sfere di XP.
pocketmine.betterpmmp.yml.entities.item-merging=Unisci gli oggetti a terra vicini in pile.
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=Tempo di scomparsa degli oggetti a terra in tick (vanilla 6000). -1: gli oggetti non scompaiono mai.
pocketmine.betterpmmp.yml.entities.xp-orbs=Genera sfere di XP. Disattiva per saltare le loro scansioni per tick.
pocketmine.betterpmmp.yml.entities.pickup-scan-period=Cerca oggetti da raccogliere ogni N tick (1 per vanilla).
pocketmine.betterpmmp.yml.combat=Colpi critici e danno da esplosione.
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=Consenti i colpi critici mentre si scatta.
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=Distanza di caduta minima per un colpo critico (vanilla 0.0).
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=Permetti alle esplosioni di distruggere i blocchi.
pocketmine.betterpmmp.yml.network=Compressione dei pacchetti e limitazione del broadcast del movimento.
pocketmine.betterpmmp.yml.network.snappy-compression=Usa la compressione Snappy invece di zlib. Inclusa nel binario ufficiale; l'estensione snappy è richiesta solo nelle build PHP personalizzate.
pocketmine.betterpmmp.yml.network.movement-broadcast-period=Trasmetti i pacchetti di movimento ogni N tick (1 per vanilla).
pocketmine.betterpmmp.yml.network.skip-movement-send-event=Salta DataPacketSendEvent per i pacchetti di movimento.
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=Salta DataPacketReceiveEvent per i pacchetti di input del giocatore.
pocketmine.betterpmmp.yml.events=Limitazione degli eventi di gioco.
pocketmine.betterpmmp.yml.events.move-event-period=Attiva PlayerMoveEvent ogni N tick (1 per vanilla).
pocketmine.betterpmmp.yml.recipes=Registrazione delle ricette vanilla.
pocketmine.betterpmmp.yml.recipes.load-vanilla=Carica le ricette vanilla di crafting, fornace e distillazione all'avvio.
pocketmine.yml.header=File di configurazione principale di PocketMine-MP\nQueste sono le impostazioni che non possono essere incluse in server.properties\nAlcune sono sicure, altre possono danneggiare il tuo server se modificate in modo errato\nLe nuove impostazioni/valori predefiniti non appariranno automaticamente in questo file durante l'aggiornamento.
pocketmine.yml.settings.force-language=Se inviare tutte le stringhe tradotte nella locale del server o lasciare che sia il dispositivo a gestirle
pocketmine.yml.settings.query-plugins=Consenti l'elenco dei plugin tramite Query
pocketmine.yml.settings.enable-profiling=Abilita il profiling di plugin e core in modo predefinito
pocketmine.yml.settings.profile-report-trigger=Aggiunge risultati solo quando la misurazione del tick è minore o uguale al valore dato (predefinito 20)
pocketmine.yml.settings.async-workers=Numero di worker AsyncTask.\nUsati per le attività asincrone dei plugin, la generazione del mondo, la compressione e la comunicazione web.\nImposta questo valore all'incirca al numero dei tuoi core.\nSe impostato su auto, proverà a rilevare il numero di core (o userà 2)
pocketmine.yml.settings.enable-dev-builds=Se consentire l'esecuzione delle build di sviluppo. Le build di sviluppo possono crashare, rompere i tuoi plugin, corrompere il tuo mondo e altro.\nSi consiglia di evitare le build di sviluppo quando possibile.
pocketmine.yml.memory.global-limit=Limite di memoria soft globale in megabyte. Imposta a 0 per disabilitare\nQuesto attiva i low-memory-triggers e genera un evento per liberare memoria quando l'uso supera questo valore
pocketmine.yml.memory.main-limit=Limite di memoria soft del thread principale in megabyte. Imposta a 0 per disabilitare\nQuesto attiva i low-memory-triggers e genera un evento per liberare memoria quando l'uso supera questo valore
pocketmine.yml.memory.main-hard-limit=Limite di memoria hard del thread principale in megabyte. Imposta a 0 per disabilitare\nQuesto arresta il server quando il limite viene superato
pocketmine.yml.memory.async-worker-hard-limit=Limite di memoria hard dei thread AsyncWorker in megabyte. Imposta a 0 per disabilitare\nQuesto fa crashare l'attività attualmente in esecuzione sul worker se l'attività supera il limite\nNOTA: QUESTO LIMITE SI APPLICA PER WORKER, NON ALL'INTERO PROCESSO.
pocketmine.yml.memory.check-rate=Periodo in tick per controllare la memoria (predefinito 1 secondo)
pocketmine.yml.memory.continuous-trigger=Continua ad attivare i low-memory-triggers e l'evento in condizioni di memoria bassa
pocketmine.yml.memory.continuous-trigger-rate=Solo se memory.continuous-trigger è abilitato. Specifica la frequenza in passi di memory.check-rate (predefinito 30 secondi)
pocketmine.yml.memory.garbage-collection.period=Periodo in tick per attivare manualmente il garbage collector (predefinito 30 minuti), imposta a 0 per disabilitare\nQuesto interessa solo il thread principale. Gli altri thread dovrebbero attivare le proprie raccolte
pocketmine.yml.memory.memory-dump=Impostazioni che controllano la gestione dei dump di memoria.
pocketmine.yml.memory.memory-dump.dump-async-worker=Esegui il dump della memoria dei worker asincroni oltre che del thread principale. Se hai problemi di segfault durante il dump, disabilita questa impostazione.
pocketmine.yml.memory.max-chunks.chunk-radius=Limita la distanza di rendering massima per giocatore quando viene attivata la memoria bassa. Imposta a 0 per disabilitare il limite.
pocketmine.yml.network.batch-threshold=Soglia per il batching dei pacchetti, in byte. Solo questi pacchetti verranno compressi\nImposta a 0 per comprimere tutto, -1 per disabilitare.
pocketmine.yml.network.compression-level=Livello di compressione usato nell'invio dei pacchetti raggruppati. Più alto = più CPU, meno uso di banda
pocketmine.yml.network.async-compression=Usa AsyncTask per la compressione durante la sessione di gioco principale. Aumenta la latenza, ma può ridurre il carico del thread principale
pocketmine.yml.network.async-compression-threshold=Soglia per la compressione asincrona, in byte. Solo i pacchetti più grandi di questo verranno compressi in modo asincrono\nA causa del grande overhead di AsyncTask, la compressione asincrona conviene solo per i pacchetti grandi
pocketmine.yml.network.upnp-forwarding=Sperimentale. Usa UPnP per inoltrare automaticamente le porte
pocketmine.yml.network.max-mtu-size=Dimensione massima in byte dei pacchetti inviati sulla rete (predefinito 1492 byte). I pacchetti più grandi verranno\nframmentati o divisi in parti più piccole. I client possono richiedere dimensioni MTU fino a, ma non oltre, questo numero.
pocketmine.yml.network.enable-encryption=Abilita la crittografia del traffico di rete di Minecraft. Questo ha un impatto sulle prestazioni, ma impedisce agli hacker di rubare sessioni e fingersi altri giocatori.\nNON DISABILITARLO a meno che tu non comprenda i rischi coinvolti.
pocketmine.yml.debug.level=Se > 1, mostrerà messaggi di debug nella console
pocketmine.yml.player.save-player-data=Scegli se abilitare il salvataggio dei dati dei giocatori.
pocketmine.yml.player.verify-xuid=Se true, verifica che l'ID utente Xbox (XUID) dei giocatori che entrano corrisponda a quanto registrato in precedenza.\nQuesto impedisce anche ai giocatori non-XBL di usare i nomi utente dei giocatori XBL per rubare i loro dati su server con xbox-auth=off.
pocketmine.yml.level-settings.default-format=Il formato predefinito che i mondi useranno alla creazione
pocketmine.yml.chunk-sending.per-tick=Per cambiare la distanza di rendering normale del server, cambia view-distance in server.properties.\nQuantità di chunk inviati ai giocatori per tick
pocketmine.yml.chunk-sending.spawn-radius=Raggio di chunk che devono essere inviati prima di far comparire il giocatore
pocketmine.yml.chunk-ticking.tick-radius=Raggio di chunk attorno a un giocatore da tickare
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=Numero di blocchi all'interno dei subchunk delle aree di tick che vengono tickati ogni tick. Valori più alti accelereranno eventi\ncome la crescita di alberi e piante, ma a un costo di prestazioni più elevato.
pocketmine.yml.chunk-ticking.disable-block-ticking=ID dei blocchi su cui non eseguire il tick casuale.
pocketmine.yml.chunk-generation.population-queue-size=Numero max. di chunk nella coda di attesa da popolare
pocketmine.yml.auto-report.enabled=Invia i rapporti di crash per l'elaborazione
pocketmine.yml.anonymous-statistics.enabled=Invia statistiche anonime per l'aggregazione dei dati e il tracciamento dell'uso dei plugin
pocketmine.yml.auto-updater.preferred-channel=Può essere development, alpha, beta o stable.
pocketmine.yml.auto-updater.suggest-channels=Se usi una versione di sviluppo, suggerirà di cambiare canale
pocketmine.yml.timings.host=Scegli l'host da usare per visualizzare i risultati dei timings.
pocketmine.yml.console.enable-input=Se accettare comandi tramite la console. Se disabilitato, qualsiasi cosa digitata nella console verrà ignorata.\nUtile per risparmiare risorse su server headless dove la console non viene mai usata (es. server in hosting, Docker, ecc.)
pocketmine.yml.console.title-tick=Scegli se abilitare il report delle statistiche del server nel titolo della console.\nNOTA: Il ticker del titolo verrà comunque disabilitato se i colori della console non sono abilitati.
pocketmine.yml.aliases.1=Questa sezione ti consente di aggiungere, rimuovere o rimappare gli alias dei comandi.\nUn singolo alias può chiamare uno o più altri comandi (o alias).\nGli alias definiti qui sovrascriveranno qualsiasi alias di comando dichiarato dai plugin o da PocketMine-MP stesso.
pocketmine.yml.aliases.2=Per rimuovere un alias, impostalo a [], così (nota che gli alias con prefisso come "pocketmine:stop" rimarranno e non possono\nessere rimossi):
pocketmine.yml.aliases.3=I comandi non vengono rimossi, solo i loro alias. Puoi ancora riferirti a un comando usando il suo nome completo (con prefisso),\nanche se tutti i suoi alias sono sovrascritti. Il nome completo è di solito qualcosa come "pocketmine:commandname" o\n"pluginname:commandname".
pocketmine.yml.aliases.4=Per aggiungere un alias, elenca il o i comandi che chiama:
pocketmine.yml.aliases.5=Per invocare un altro comando con argomenti, usa $1 per passare il primo argomento, $2 per il secondo, ecc.:
pocketmine.yml.aliases.6=Per rendere gli argomenti obbligatori (in modo che il comando fallisca se non forniti), usa $$, es. $$1, $$2:
pocketmine.yml.aliases.7=Per passare un intervallo di argomenti, metti un - (trattino) dopo l'indice:
pocketmine.yml.aliases.8=Per cambiare un alias di comando esistente e fargli fare qualcos'altro:
pocketmine.yml.worlds=Queste impostazioni sovrascriveranno il generatore impostato in server.properties e permettono di caricare più mondi\nEsempio:
pocketmine.yml.plugins.legacy-data-dir=Impostare questo a true farà usare la struttura legacy in cui i dati dei plugin sono posti nella cartella --plugins.\nFalse posizionerà i dati dei plugin sotto plugin_data sotto --data.\nQuesta opzione esiste per la retrocompatibilità con le installazioni esistenti.

pocketmine.resource-packs.yml.header=Questo file di configurazione controlla le risorse globali usate sul tuo server PocketMine-MP.
pocketmine.resource-packs.yml.force-resources=Scegli se i giocatori devono usare i pacchetti di risorse scelti per entrare nel server.\nNOTA: Questo non avrà effetto se non ci sono pacchetti di risorse nella pila sottostante.
pocketmine.resource-packs.yml.stack=I pacchetti di risorse qui vengono applicati dal basso verso l'alto. Questo significa che le risorse nei pacchetti superiori sovrascrivono quelle inferiori.\nLe voci qui devono indicare il nome del file del pacchetto di risorse.\nEsempio:
pocketmine.resource-packs.yml.stack.force-vanilla=Se vuoi forzare i client a usare le risorse vanilla, devi mettere un pacchetto di risorse vanilla nella cartella resources e aggiungerlo alla pila qui.
pocketmine.resource-packs.yml.stack.encryption-key=Per specificare una chiave di cifratura della risorsa, metti la chiave nel file <resource>.key accanto al pacchetto di risorse. Esempio: vanilla.zip.key

