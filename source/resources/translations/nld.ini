; Strings without a "pocketmine." prefix are assumed to be vanilla translations.
; Those are sent as raw translation keys for the client to translate into its own language.
;
; Any NON-VANILLA string MUST have a key prefixed with "pocketmine." to ensure it is translated by the server.
; (Yes, this file currently doesn't follow these rules in many places. It's a work in progress to clean up.)

pocketmine.command.restart.description=Server herstarten
pocketmine.command.restart.start=Server wordt herstart...
pocketmine.command.restart.failed=Herstarten mislukt: kan het vlagbestand {%0} niet schrijven
pocketmine.betterpmmp.yml.config=Opmaak van dit configuratiebestand.
pocketmine.betterpmmp.yml.config.enforce-format=Indien true wordt dit bestand bij elke start herschreven naar de BetterPMMP-indeling: opmerkingen en sleutelvolgorde worden teruggezet naar dit sjabloon in de servertaal, alle waarden blijven behouden.\nSleutels die niet in dit sjabloon staan behouden hun waarden, maar verliezen hun opmerkingen en worden naar het einde van hun sectie verplaatst.
pocketmine.betterpmmp.yml.world=Wereld-, chunk- en kijkafstandinstellingen.
pocketmine.betterpmmp.yml.world.block-cache-size=Blok- en botsingscachegrootte per wereld. Hoger verlaagt de kosten van blok opzoeken.
pocketmine.betterpmmp.yml.world.neighbour-update-limit=Max buurblokupdates per tick. 0 voor onbeperkt.
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=Werelden zonder spelers draaien 1 tick per 100 totdat iemand binnenkomt.
pocketmine.betterpmmp.yml.world.view-distance-per-world=Kijkafstand per wereld, op mapnaam van de wereld.
pocketmine.betterpmmp.yml.world.chunk-ticking=Chunk-tickinglimieten en overschrijvingen per wereld.
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=Max chunks per tick opnieuw gecontroleerd op tickgeschiktheid. 0 voor onbeperkt.
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=Chunk-ticking per wereld, op mapnaam van de wereld.
pocketmine.betterpmmp.yml.lighting=Lichtberekening en -update aan serverzijde.
pocketmine.betterpmmp.yml.lighting.fixed-light=Sla asynchrone lichtberekening over en vul licht met een vaste waarde.
pocketmine.betterpmmp.yml.lighting.fixed-light-level=Lichtniveau bij ingeschakelde fixed-light (0 tot 15).
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=Sla herberekening van licht tijdens runtime over bij blokwijzigingen.
pocketmine.betterpmmp.yml.entities=Gedrag van gedropte items en XP-bollen.
pocketmine.betterpmmp.yml.entities.item-merging=Voeg nabije gedropte items samen tot stapels.
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=Verdwijntijd voor gedropte items in ticks (vanilla 6000). -1: items verdwijnen nooit.
pocketmine.betterpmmp.yml.entities.xp-orbs=Genereer XP-bollen. Uitschakelen slaat hun scans per tick over.
pocketmine.betterpmmp.yml.entities.pickup-scan-period=Scan elke N ticks op oppakbare items (1 voor vanilla).
pocketmine.betterpmmp.yml.combat=Kritieke treffers en explosieschade.
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=Sta kritieke treffers toe tijdens sprinten.
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=Minimale valafstand voor een kritieke treffer (vanilla 0.0).
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=Laat explosies blokken vernietigen.
pocketmine.betterpmmp.yml.network=Pakketcompressie en throttling van bewegingsbroadcasts.
pocketmine.betterpmmp.yml.network.snappy-compression=Gebruik Snappy-compressie in plaats van zlib. Inbegrepen in de officiële binary; de snappy-extensie is alleen nodig bij aangepaste PHP-builds.
pocketmine.betterpmmp.yml.network.movement-broadcast-period=Verstuur bewegingspakketten elke N ticks (1 voor vanilla).
pocketmine.betterpmmp.yml.network.skip-movement-send-event=Sla DataPacketSendEvent over voor bewegingspakketten.
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=Sla DataPacketReceiveEvent over voor invoerpakketten van de speler.
pocketmine.betterpmmp.yml.events=Throttling van gameplay-events.
pocketmine.betterpmmp.yml.events.move-event-period=Vuur PlayerMoveEvent elke N ticks af (1 voor vanilla).
pocketmine.betterpmmp.yml.recipes=Registratie van vanilla-recepten.
pocketmine.betterpmmp.yml.recipes.load-vanilla=Laad vanilla-recepten voor werkbank, oven en brouwen bij het opstarten.
pocketmine.betterpmmp.yml.plugins=Plugin-logging.
pocketmine.betterpmmp.yml.gameplay=Schakelaars voor spelmechanieken.
pocketmine.betterpmmp.yml.gameplay.hunger-exhaustion=Hongerverbruik door alle oorzaken: bewegen, springen, aanvallen, mijnen, schade, regeneratie en drankjes. Uitschakelen slaat de hele mechaniek over.
pocketmine.betterpmmp.yml.gameplay.fall-damage=Valschade voor levende entiteiten. Uitschakelen slaat het hele valschadepad over.
pocketmine.betterpmmp.yml.gameplay.farmland-persistent=Akkerland droogt nooit uit, wordt nooit vertrapt en verandert nooit terug in aarde. Volledig nat akkerland slaat zijn waterscan over.
pocketmine.betterpmmp.yml.gameplay.farmland-instant-hydration=Akkerland gemaakt door ploegen of plaatsen begint volledig gehydrateerd.
pocketmine.betterpmmp.yml.combat.instant-hit-feedback=Verstuur trefferfeedback van melee- en projectielaanvallen onmiddellijk in plaats van aan het einde van de tick, wat tot 50 ms waargenomen trefferlatentie voor het slachtoffer en de aanvaller wegneemt.
pocketmine.betterpmmp.yml.network.interaction-spam-window=Venster in milliseconden om dubbele interactiepakketten van de client te verwerpen (upstream 100). De standaardwaarde 20 verwijdert de limiet van 10 klikken per seconde; verhoog deze als dubbele interacties toch doorkomen.
pocketmine.betterpmmp.yml.network.block-sync-snapshot=Sla het opnieuw versturen van het aangeklikte blok over wanneer een interactie het ongewijzigd liet, wat het rubber-banding bij plaatsen/breken wegneemt. Omringende blokken worden altijd verstuurd.
pocketmine.betterpmmp.yml.network.chunk-history-limit=Maximaal aantal chunkposities dat per sessie wordt onthouden, gebruikt om verouderde chunks te wissen bij een wereldwissel. 0 voor onbeperkt (groeit de hele sessie lang).
pocketmine.betterpmmp.yml.plugins.lifecycle-log=Log het laden, in- en uitschakelen van elke plugin.
pocketmine.yml.header=Hoofdconfiguratiebestand voor PocketMine-MP\nDit zijn de instellingen die niet in server.properties kunnen worden opgenomen\nSommige zijn veilig, andere kunnen je server beschadigen als ze verkeerd worden gewijzigd\nNieuwe instellingen/standaardwaarden verschijnen bij een upgrade niet automatisch in dit bestand.
pocketmine.yml.settings.force-language=Of alle tekenreeksen vertaald naar de server-locale worden verzonden of dat het apparaat ze afhandelt
pocketmine.yml.settings.query-plugins=Sta het weergeven van plugins via Query toe
pocketmine.yml.settings.enable-profiling=Plugin- en core-profiling standaard inschakelen
pocketmine.yml.settings.profile-report-trigger=Voegt alleen resultaten toe wanneer de tickmeting kleiner dan of gelijk aan de opgegeven waarde is (standaard 20)
pocketmine.yml.settings.async-workers=Aantal AsyncTask-workers.\nGebruikt voor asynchrone plugintaken, wereldgeneratie, compressie en webcommunicatie.\nStel dit ongeveer in op je aantal cores.\nOp auto probeert het het aantal cores te detecteren (of gebruikt het er 2)
pocketmine.yml.settings.enable-dev-builds=Of het uitvoeren van ontwikkelbuilds is toegestaan. Dev-builds kunnen crashen, je plugins breken, je wereld beschadigen en meer.\nHet wordt aanbevolen ontwikkelbuilds waar mogelijk te vermijden.
pocketmine.yml.memory.global-limit=Globale zachte geheugenlimiet in megabytes. Zet op 0 om uit te schakelen\nDit activeert low-memory-triggers en vuurt een event af om geheugen vrij te maken wanneer het gebruik hierboven komt
pocketmine.yml.memory.main-limit=Zachte geheugenlimiet van de hoofdthread in megabytes. Zet op 0 om uit te schakelen\nDit activeert low-memory-triggers en vuurt een event af om geheugen vrij te maken wanneer het gebruik hierboven komt
pocketmine.yml.memory.main-hard-limit=Harde geheugenlimiet van de hoofdthread in megabytes. Zet op 0 om uit te schakelen\nDit stopt de server wanneer de limiet wordt overschreden
pocketmine.yml.memory.async-worker-hard-limit=Harde geheugenlimiet van de AsyncWorker-threads in megabytes. Zet op 0 om uit te schakelen\nDit laat de taak die momenteel op de worker draait crashen als de taak de limiet overschrijdt\nLET OP: DEZE LIMIET GELDT PER WORKER, NIET VOOR HET HELE PROCES.
pocketmine.yml.memory.check-rate=Periode in ticks om het geheugen te controleren (standaard 1 seconde)
pocketmine.yml.memory.continuous-trigger=low-memory-triggers en event blijven afvuren bij weinig geheugen
pocketmine.yml.memory.continuous-trigger-rate=Alleen als memory.continuous-trigger is ingeschakeld. Geeft het tempo aan in stappen van memory.check-rate (standaard 30 seconden)
pocketmine.yml.memory.garbage-collection.period=Periode in ticks om de garbage collector handmatig af te vuren (standaard 30 minuten), zet op 0 om uit te schakelen\nDit heeft alleen invloed op de hoofdthread. Andere threads moeten hun eigen collecties afvuren
pocketmine.yml.memory.memory-dump=Instellingen die de afhandeling van geheugendumps regelen.
pocketmine.yml.memory.memory-dump.dump-async-worker=Dump het geheugen van async-workers naast de hoofdthread. Als je problemen hebt met segfaults bij het dumpen van geheugen, schakel deze instelling uit.
pocketmine.yml.memory.max-chunks.chunk-radius=Beperk de maximale renderafstand per speler wanneer weinig geheugen wordt geactiveerd. Zet op 0 om de limiet uit te schakelen.
pocketmine.yml.network.batch-threshold=Drempel voor het batchen van pakketten, in bytes. Alleen deze pakketten worden gecomprimeerd\nZet op 0 om alles te comprimeren, -1 om uit te schakelen.
pocketmine.yml.network.compression-level=Compressieniveau gebruikt bij het verzenden van gebundelde pakketten. Hoger = meer CPU, minder bandbreedtegebruik. Alleen zlib - Snappy heeft geen niveau-instelling, dus dit wordt genegeerd wanneer better-pmmp.network.snappy-compression aan staat
pocketmine.yml.network.async-compression=Gebruik AsyncTasks voor compressie tijdens de hoofdspelsessie. Verhoogt de latentie, maar kan de belasting van de hoofdthread verminderen
pocketmine.yml.network.async-compression-threshold=Drempel voor asynchrone compressie, in bytes. Alleen pakketten groter dan dit worden asynchroon gecomprimeerd\nVanwege de grote overhead van AsyncTask is asynchrone compressie alleen de moeite waard voor grote pakketten
pocketmine.yml.network.upnp-forwarding=Experimenteel. Gebruik UPnP om poorten automatisch door te sturen
pocketmine.yml.network.max-mtu-size=Maximale grootte in bytes van pakketten die over het netwerk worden verzonden (standaard 1492 bytes). Grotere pakketten worden\ngefragmenteerd of in kleinere delen gesplitst. Clients kunnen MTU-groottes tot, maar niet meer dan, dit getal aanvragen.
pocketmine.yml.network.enable-encryption=Versleuteling van Minecraft-netwerkverkeer inschakelen. Dit heeft invloed op de prestaties, maar voorkomt dat hackers sessies stelen en zich voordoen als andere spelers.\nSCHAKEL DIT NIET UIT tenzij je de betrokken risico's begrijpt.
pocketmine.yml.debug.level=Als > 1, toont het debugberichten in de console
pocketmine.yml.player.save-player-data=Kies of het opslaan van spelergegevens moet worden ingeschakeld.
pocketmine.yml.player.verify-xuid=Als true, wordt gecontroleerd of de Xbox-gebruikers-ID (XUID) van toetredende spelers overeenkomt met wat eerder is vastgelegd.\nDit voorkomt ook dat niet-XBL-spelers de gebruikersnamen van XBL-spelers gebruiken om hun gegevens te stelen op servers met xbox-auth=off.
pocketmine.yml.level-settings.default-format=Het standaardformaat dat werelden bij aanmaak gebruiken
pocketmine.yml.chunk-sending.per-tick=Om de normale renderafstand van de server te wijzigen, wijzig view-distance in server.properties.\nAantal chunks dat per tick naar spelers wordt verzonden
pocketmine.yml.chunk-sending.spawn-radius=Straal van chunks die verzonden moeten worden voordat de speler wordt gespawnd
pocketmine.yml.chunk-ticking.tick-radius=Straal van chunks rond een speler om te ticken
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=Aantal blokken binnen de subchunks van tickgebieden die elke tick worden getickt. Hogere waarden versnellen gebeurtenissen\nzoals boom- en plantengroei, maar tegen hogere prestatiekosten.
pocketmine.yml.chunk-ticking.disable-block-ticking=ID's van blokken waarop geen willekeurige tick moet worden uitgevoerd.
pocketmine.yml.chunk-generation.population-queue-size=Max. aantal chunks in de wachtrij om te worden gevuld
pocketmine.yml.auto-report.enabled=Crashrapporten ter verwerking naar de host hieronder sturen. Standaard uit: de standaardhost hoort bij het gearchiveerde PocketMine-MP-project, niet bij BetterPMMP.
pocketmine.yml.anonymous-statistics.enabled=Verzendt anonieme statistieken voor gegevensaggregatie en het bijhouden van plugingebruik
pocketmine.yml.auto-updater.enabled=Bij het starten op nieuwe versies controleren. Standaard uit: de standaardhost levert PocketMine-MP-versies, die niets te maken hebben met de versie van BetterPMMP.
pocketmine.yml.auto-updater.preferred-channel=Kan development, alpha, beta of stable zijn.
pocketmine.yml.auto-updater.suggest-channels=Bij gebruik van een ontwikkelversie zal het voorstellen van kanaal te wisselen
pocketmine.yml.timings.host=Kies de host om je timings-resultaten te bekijken.
pocketmine.yml.console.enable-input=Of commando's via de console worden geaccepteerd. Indien uitgeschakeld, wordt alles wat in de console wordt getypt genegeerd.\nHandig om bronnen te besparen op headless servers waar de console nooit wordt gebruikt (bijv. gehoste server, Docker, enz.)
pocketmine.yml.console.title-tick=Kies of het rapporteren van serverstatistieken in de consoletitel moet worden ingeschakeld.\nLET OP: De titelticker wordt sowieso uitgeschakeld als consolekleuren niet zijn ingeschakeld.
pocketmine.yml.aliases.1=In dit gedeelte kun je commando-aliassen toevoegen, verwijderen of opnieuw toewijzen.\nEén alias kan een of meer andere commando's (of aliassen) aanroepen.\nHier gedefinieerde aliassen overschrijven alle commando-aliassen die door plugins of PocketMine-MP zelf zijn gedeclareerd.
pocketmine.yml.aliases.2=Om een alias te verwijderen, zet je hem op [], zoals hier (let op dat aliassen met voorvoegsel zoals "pocketmine:stop" blijven bestaan en niet\nkunnen worden verwijderd):
pocketmine.yml.aliases.3=Commando's worden niet verwijderd, alleen hun aliassen. Je kunt nog steeds naar een commando verwijzen met zijn volledige (voorvoegsel)\nnaam, zelfs als al zijn aliassen zijn overschreven. De volledige naam is meestal iets als "pocketmine:commandname" of\n"pluginname:commandname".
pocketmine.yml.aliases.4=Om een alias toe te voegen, som de commando's op die hij aanroept:
pocketmine.yml.aliases.5=Om een ander commando met argumenten aan te roepen, gebruik $1 om het eerste argument door te geven, $2 voor het tweede, enz.:
pocketmine.yml.aliases.6=Om argumenten verplicht te maken (zodat het commando faalt als ze niet worden opgegeven), gebruik $$, bijv. $$1, $$2:
pocketmine.yml.aliases.7=Om een reeks argumenten door te geven, zet een - (koppelteken) na de index:
pocketmine.yml.aliases.8=Om een bestaande commando-alias te wijzigen en iets anders te laten doen:
pocketmine.yml.worlds=Deze instellingen overschrijven de in server.properties ingestelde generator en maken het laden van meerdere werelden mogelijk\nVoorbeeld:
pocketmine.yml.plugins.legacy-data-dir=Dit op true zetten zorgt ervoor dat de verouderde structuur wordt gebruikt waarbij plugingegevens in de --plugins-map worden geplaatst.\nFalse plaatst plugingegevens onder plugin_data onder --data.\nDeze optie bestaat voor achterwaartse compatibiliteit met bestaande installaties.

pocketmine.resource-packs.yml.header=Dit configuratiebestand beheert de globale bronnen die op je PocketMine-MP-server worden gebruikt.
pocketmine.resource-packs.yml.force-resources=Kies of spelers je gekozen resourcepakketten moeten gebruiken om deel te nemen aan de server.\nLET OP: Dit doet niets als er geen resourcepakketten in de onderstaande stapel staan.
pocketmine.resource-packs.yml.stack=Resourcepakketten worden hier van onder naar boven toegepast. Dit betekent dat bronnen in hogere pakketten die in lagere pakketten overschrijven.\nVermeldingen hier moeten de bestandsnaam van het resourcepakket aangeven.\nVoorbeeld:
pocketmine.resource-packs.yml.stack.force-vanilla=Als je clients wilt dwingen vanilla-bronnen te gebruiken, moet je een vanilla-resourcepakket in je resources-map plaatsen en het hier aan de stapel toevoegen.
pocketmine.resource-packs.yml.stack.encryption-key=Om een resource-versleutelingssleutel op te geven, plaats je de sleutel in het bestand <resource>.key naast het resourcepakket. Voorbeeld: vanilla.zip.key

