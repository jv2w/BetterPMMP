; Strings without a "pocketmine." prefix are assumed to be vanilla translations.
; Those are sent as raw translation keys for the client to translate into its own language.
;
; Any NON-VANILLA string MUST have a key prefixed with "pocketmine." to ensure it is translated by the server.
; (Yes, this file currently doesn't follow these rules in many places. It's a work in progress to clean up.)

pocketmine.command.restart.description=서버 재시작
pocketmine.command.restart.start=서버를 재시작하는 중...
pocketmine.betterpmmp.yml.config=이 설정 파일 자체의 형식.
pocketmine.betterpmmp.yml.config.enforce-format=true면 서버가 시작할 때마다 이 파일을 BetterPMMP 형식으로 다시 작성합니다. 주석과 키 순서는 서버 언어의 이 템플릿으로 초기화되고 모든 값은 유지됩니다.\n이 템플릿에 없는 키는 값은 유지되지만 주석이 제거되고 해당 섹션 끝으로 이동합니다.
pocketmine.betterpmmp.yml.world=월드, 청크, 시야 거리 조정.
pocketmine.betterpmmp.yml.world.block-cache-size=월드별 블록/충돌 캐시 크기. 클수록 블록 조회 비용이 줄어듭니다.
pocketmine.betterpmmp.yml.world.neighbour-update-limit=틱당 최대 인접 블록 업데이트 수. 0은 무제한.
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=플레이어가 없는 월드는 누군가 접속할 때까지 100틱당 1틱만 실행합니다.
pocketmine.betterpmmp.yml.world.view-distance-per-world=월드 폴더 이름 기준 월드별 시야 거리.
pocketmine.betterpmmp.yml.world.chunk-ticking=청크 티킹 제한 및 월드별 재정의.
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=틱당 티킹 대상 재확인 최대 청크 수. 0은 무제한.
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=월드 폴더 이름 기준 월드별 청크 티킹.
pocketmine.betterpmmp.yml.lighting=서버 측 광원 생성 및 갱신.
pocketmine.betterpmmp.yml.lighting.fixed-light=비동기 광원 생성을 건너뛰고 고정 값으로 광원을 채웁니다.
pocketmine.betterpmmp.yml.lighting.fixed-light-level=fixed-light가 켜졌을 때 사용할 광원 레벨 (0~15).
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=블록 변경 시 실시간 광원 재계산을 건너뜁니다.
pocketmine.betterpmmp.yml.entities=드롭 아이템 및 경험치 오브 동작.
pocketmine.betterpmmp.yml.entities.item-merging=근처 드롭 아이템을 하나로 병합합니다.
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=드롭 아이템 소멸 시간(틱) (바닐라 6000). -1: 소멸하지 않음.
pocketmine.betterpmmp.yml.entities.xp-orbs=경험치 오브 생성. 끄면 매 틱 검사를 건너뜁니다.
pocketmine.betterpmmp.yml.entities.pickup-scan-period=N틱마다 획득 검사 (1은 바닐라).
pocketmine.betterpmmp.yml.combat=치명타 및 폭발 피해.
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=달리는 중에도 치명타를 허용합니다.
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=치명타에 필요한 최소 낙하 거리 (바닐라 0.0).
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=폭발이 블록을 파괴하도록 허용합니다.
pocketmine.betterpmmp.yml.network=패킷 압축 및 이동 브로드캐스트 조절.
pocketmine.betterpmmp.yml.network.snappy-compression=zlib 대신 Snappy 압축 사용. 공식 바이너리에 포함됨. snappy 확장은 커스텀 PHP 빌드에서만 필요합니다.
pocketmine.betterpmmp.yml.network.movement-broadcast-period=N틱마다 이동 패킷 브로드캐스트 (1은 바닐라).
pocketmine.betterpmmp.yml.network.skip-movement-send-event=이동 패킷에 대해 DataPacketSendEvent를 건너뜁니다.
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=플레이어 입력 패킷에 대해 DataPacketReceiveEvent를 건너뜁니다.
pocketmine.betterpmmp.yml.events=게임플레이 이벤트 조절.
pocketmine.betterpmmp.yml.events.move-event-period=N틱마다 PlayerMoveEvent 발생 (1은 바닐라).
pocketmine.betterpmmp.yml.recipes=바닐라 제작법 등록.
pocketmine.betterpmmp.yml.recipes.load-vanilla=시작 시 바닐라 제작/제련/양조 제작법을 불러옵니다.
pocketmine.betterpmmp.yml.plugins=플러그인 로그.
pocketmine.betterpmmp.yml.plugins.enable-log=플러그인이 활성화될 때 "Enabling <플러그인>" 로그를 출력합니다.
pocketmine.betterpmmp.yml.plugins.disable-log=플러그인이 비활성화될 때 "Disabling <플러그인>" 로그를 출력합니다.
pocketmine.betterpmmp.yml.gameplay=게임플레이 메커니즘 토글.
pocketmine.betterpmmp.yml.gameplay.movement-exhaustion=걷기·질주·점프로 인한 허기 소진입니다. 비활성화하면 해당 메커니즘 전체를 건너뜁니다.
pocketmine.betterpmmp.yml.gameplay.fall-damage=생명체의 낙하 데미지입니다. 비활성화하면 낙하 데미지 처리 전체를 건너뜁니다.
pocketmine.betterpmmp.yml.gameplay.farmland-persistent=농지가 마르거나 밟히거나 흙으로 되돌아가지 않습니다. 완전히 젖은 농지는 물 탐색을 건너뜁니다.
pocketmine.betterpmmp.yml.gameplay.farmland-instant-hydration=경작하거나 설치한 농지가 처음부터 완전히 젖은 상태로 생성됩니다.
pocketmine.yml.header=PocketMine-MP의 메인 설정 파일\nserver.properties에 포함할 수 없는 설정들입니다\n일부는 안전하지만, 일부는 잘못 수정하면 서버가 손상될 수 있습니다\n업그레이드 시 새 설정/기본값이 이 파일에 자동으로 추가되지 않습니다.
pocketmine.yml.settings.force-language=모든 문자열을 서버 로케일로 번역해 보낼지, 아니면 기기가 처리하게 할지
pocketmine.yml.settings.query-plugins=Query를 통한 플러그인 목록 표시 허용
pocketmine.yml.settings.enable-profiling=플러그인 및 코어 프로파일링을 기본으로 활성화
pocketmine.yml.settings.profile-report-trigger=틱 측정값이 지정 값 이하일 때만 결과를 추가합니다 (기본 20)
pocketmine.yml.settings.async-workers=AsyncTask 워커 수.\n플러그인 비동기 작업, 월드 생성, 압축, 웹 통신에 사용됩니다.\n대략 코어 수에 맞춰 설정하세요.\nauto로 설정하면 코어 수를 자동 감지합니다 (또는 2 사용)
pocketmine.yml.settings.enable-dev-builds=개발 빌드 실행 허용 여부. 개발 빌드는 충돌, 플러그인 손상, 월드 손상 등을 일으킬 수 있습니다.\n가능하면 개발 빌드 사용을 피하는 것이 좋습니다.
pocketmine.yml.memory.global-limit=전역 소프트 메모리 제한(MB). 0으로 설정하면 비활성화\n사용량이 이 값을 넘으면 low-memory-triggers를 발동하고 메모리 확보 이벤트를 발생시킵니다
pocketmine.yml.memory.main-limit=메인 스레드 소프트 메모리 제한(MB). 0으로 설정하면 비활성화\n사용량이 이 값을 넘으면 low-memory-triggers를 발동하고 메모리 확보 이벤트를 발생시킵니다
pocketmine.yml.memory.main-hard-limit=메인 스레드 하드 메모리 제한(MB). 0으로 설정하면 비활성화\n제한을 초과하면 서버를 중지합니다
pocketmine.yml.memory.async-worker-hard-limit=AsyncWorker 스레드의 하드 메모리 제한(MB). 0으로 설정하면 비활성화\n작업이 제한을 초과하면 워커에서 실행 중인 해당 작업을 중단합니다\n참고: 이 제한은 전체 프로세스가 아니라 워커별로 적용됩니다.
pocketmine.yml.memory.check-rate=메모리를 확인하는 주기(틱) (기본 1초)
pocketmine.yml.memory.continuous-trigger=저메모리 상태일 때 low-memory-triggers와 이벤트를 계속 발동
pocketmine.yml.memory.continuous-trigger-rate=memory.continuous-trigger가 활성화된 경우에만. memory.check-rate 단위의 비율을 지정합니다 (기본 30초)
pocketmine.yml.memory.garbage-collection.period=가비지 컬렉터를 수동으로 실행하는 주기(틱) (기본 30분), 0으로 설정하면 비활성화\n메인 스레드에만 영향을 줍니다. 다른 스레드는 자체 수집을 실행해야 합니다
pocketmine.yml.memory.memory-dump=메모리 덤프 처리 설정.
pocketmine.yml.memory.memory-dump.dump-async-worker=메인 스레드뿐 아니라 비동기 워커의 메모리도 덤프합니다. 덤프 시 세그폴트 문제가 있으면 이 설정을 끄세요.
pocketmine.yml.memory.max-chunks.chunk-radius=저메모리가 발동될 때 플레이어당 최대 렌더 거리를 제한합니다. 0으로 설정하면 제한 해제.
pocketmine.yml.network.batch-threshold=패킷 배칭 임계값(바이트). 이 패킷들만 압축됩니다\n0으로 설정하면 전부 압축, -1로 설정하면 비활성화.
pocketmine.yml.network.compression-level=배치 패킷 전송 시 사용하는 압축 레벨. 높을수록 CPU 사용 증가, 대역폭 사용 감소
pocketmine.yml.network.async-compression=메인 게임 세션 동안 압축에 AsyncTask 사용. 지연이 늘지만 메인 스레드 부하를 줄일 수 있습니다
pocketmine.yml.network.async-compression-threshold=비동기 압축 임계값(바이트). 이보다 큰 패킷만 비동기로 압축됩니다\nAsyncTask의 큰 오버헤드 때문에 큰 패킷이 아니면 비동기 압축은 이득이 없습니다
pocketmine.yml.network.upnp-forwarding=실험적. UPnP를 사용해 자동으로 포트 포워딩
pocketmine.yml.network.max-mtu-size=네트워크로 보내는 패킷의 최대 크기(바이트) (기본 1492). 이보다 큰 패킷은\n조각화되거나 작은 부분으로 분할됩니다. 클라이언트는 이 값 이하의 MTU 크기를 요청할 수 있습니다.
pocketmine.yml.network.enable-encryption=Minecraft 네트워크 트래픽 암호화 활성화. 성능에 영향이 있지만, 해커가 세션을 탈취해 다른 플레이어로 위장하는 것을 방지합니다.\n위험을 이해하지 못한다면 이 설정을 끄지 마세요.
pocketmine.yml.debug.level=1보다 크면 콘솔에 디버그 메시지를 표시합니다
pocketmine.yml.player.save-player-data=플레이어 데이터 저장을 활성화할지 선택합니다.
pocketmine.yml.player.verify-xuid=true이면 접속하는 플레이어의 Xbox 사용자 ID(XUID)가 이전에 기록된 값과 일치하는지 확인합니다.\n또한 xbox-auth=off인 서버에서 비 XBL 플레이어가 XBL 플레이어의 사용자명을 써서 데이터를 탈취하는 것을 방지합니다.
pocketmine.yml.level-settings.default-format=월드가 생성될 때 사용하는 기본 포맷
pocketmine.yml.chunk-sending.per-tick=서버의 일반 렌더 거리를 변경하려면 server.properties의 view-distance를 변경하세요.\n틱당 플레이어에게 전송되는 청크 수
pocketmine.yml.chunk-sending.spawn-radius=플레이어를 스폰하기 전에 전송해야 하는 청크 반경
pocketmine.yml.chunk-ticking.tick-radius=플레이어 주변에서 틱을 처리할 청크 반경
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=틱 처리 영역의 서브청크 안에서 매 틱 처리되는 블록 수. 값이 높으면 나무·식물 성장 같은\n이벤트가 빨라지지만 성능 비용이 커집니다.
pocketmine.yml.chunk-ticking.disable-block-ticking=랜덤 틱을 수행하지 않을 블록 ID 목록.
pocketmine.yml.chunk-generation.population-queue-size=생성 대기열에서 채워지기를 기다리는 최대 청크 수
pocketmine.yml.auto-report.enabled=처리를 위해 크래시 리포트 전송
pocketmine.yml.anonymous-statistics.enabled=데이터 집계 및 플러그인 사용 추적을 위한 익명 통계를 전송합니다
pocketmine.yml.auto-updater.preferred-channel=development, alpha, beta, stable 중 하나일 수 있습니다.
pocketmine.yml.auto-updater.suggest-channels=개발 버전을 사용 중이면 채널 변경을 제안합니다
pocketmine.yml.timings.host=타이밍 결과를 보는 데 사용할 호스트를 선택하세요.
pocketmine.yml.console.enable-input=콘솔을 통한 명령 입력을 허용할지 여부. 비활성화하면 콘솔에 입력한 내용은 무시됩니다.\n콘솔을 전혀 쓰지 않는 헤드리스 서버(호스팅 서버, Docker 등)에서 자원을 아끼는 데 유용합니다.
pocketmine.yml.console.title-tick=콘솔 제목에 서버 통계 보고를 활성화할지 선택합니다.\n참고: 콘솔 색상이 비활성화되면 제목 티커도 함께 비활성화됩니다.
pocketmine.yml.aliases.1=이 섹션에서 명령어 별칭을 추가, 제거, 재매핑할 수 있습니다.\n하나의 별칭이 하나 이상의 다른 명령어(또는 별칭)를 호출할 수 있습니다.\n여기 정의된 별칭은 플러그인이나 PocketMine-MP 자체가 선언한 명령어 별칭보다 우선합니다.
pocketmine.yml.aliases.2=별칭을 제거하려면 아래처럼 []로 설정하세요 (단, "pocketmine:stop" 같은 접두사 별칭은 남으며\n제거할 수 없습니다):
pocketmine.yml.aliases.3=명령어 자체가 아니라 별칭만 제거됩니다. 모든 별칭이 덮어써져도 전체(접두사 포함) 이름으로\n명령어를 계속 참조할 수 있습니다. 전체 이름은 보통 "pocketmine:commandname" 또는\n"pluginname:commandname" 형식입니다.
pocketmine.yml.aliases.4=별칭을 추가하려면 호출할 명령어를 나열하세요:
pocketmine.yml.aliases.5=다른 명령어에 인자를 넘기려면 $1로 첫 번째 인자, $2로 두 번째 인자 등을 전달하세요:
pocketmine.yml.aliases.6=인자를 필수로 만들려면(제공되지 않으면 명령 실패) $$를 사용하세요, 예: $$1, $$2:
pocketmine.yml.aliases.7=인자 범위를 통째로 전달하려면 인덱스 뒤에 -(하이픈)을 붙이세요:
pocketmine.yml.aliases.8=기존 명령어 별칭을 바꿔서 다른 동작을 하게 하려면:
pocketmine.yml.worlds=이 설정은 server.properties에 설정된 생성기를 재정의하며 여러 월드를 불러올 수 있게 합니다\n예시:
pocketmine.yml.plugins.legacy-data-dir=true로 설정하면 플러그인 데이터가 --plugins 디렉토리 안에 저장되는 레거시 구조를 사용합니다.\nfalse면 플러그인 데이터를 --data 아래 plugin_data에 저장합니다.\n이 옵션은 기존 설치와의 하위 호환성을 위해 존재합니다.

pocketmine.resource-packs.yml.header=이 설정 파일은 PocketMine-MP 서버에서 사용하는 전역 리소스를 제어합니다.
pocketmine.resource-packs.yml.force-resources=플레이어가 서버에 접속하려면 지정한 리소스 팩을 반드시 사용하도록 할지 선택합니다.\n참고: 아래 스택에 리소스 팩이 없으면 아무 효과도 없습니다.
pocketmine.resource-packs.yml.stack=여기의 리소스 팩은 아래에서 위 순서로 적용됩니다. 즉 위쪽 팩의 리소스가 아래쪽 팩의 리소스를 덮어씁니다.\n각 항목에는 리소스 팩의 파일명을 적어야 합니다.\n예:
pocketmine.resource-packs.yml.stack.force-vanilla=클라이언트가 바닐라 리소스를 강제로 사용하게 하려면, resources 폴더에 바닐라 리소스 팩을 넣고 여기 스택에 추가해야 합니다.
pocketmine.resource-packs.yml.stack.encryption-key=리소스 암호화 키를 지정하려면, 리소스 팩과 같은 위치에 <resource>.key 파일을 두고 그 안에 키를 넣으세요. 예: vanilla.zip.key

