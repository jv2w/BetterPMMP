; Strings without a "pocketmine." prefix are assumed to be vanilla translations.
; Those are sent as raw translation keys for the client to translate into its own language.
;
; Any NON-VANILLA string MUST have a key prefixed with "pocketmine." to ensure it is translated by the server.
; (Yes, this file currently doesn't follow these rules in many places. It's a work in progress to clean up.)

pocketmine.command.restart.description=サーバーを再起動
pocketmine.command.restart.start=サーバーを再起動しています...
pocketmine.betterpmmp.yml.config=この設定ファイル自体の書式。
pocketmine.betterpmmp.yml.config.enforce-format=true の場合、起動のたびにこのファイルを BetterPMMP のレイアウトに書き直します。コメントとキーの順序はサーバー言語のこのテンプレートにリセットされ、すべての値は保持されます。\nテンプレートにないキーは値を保持しますが、コメントは失われ、そのセクションの末尾へ移動されます。
pocketmine.betterpmmp.yml.world=ワールド、チャンク、描画距離の調整。
pocketmine.betterpmmp.yml.world.block-cache-size=ワールドごとのブロック/衝突キャッシュサイズ。大きいほどブロック参照コストが下がります。
pocketmine.betterpmmp.yml.world.neighbour-update-limit=1ティックあたりの隣接ブロック更新の上限。0で無制限。
pocketmine.betterpmmp.yml.world.freeze-empty-worlds=プレイヤーがいないワールドは、誰か入るまで100ティックに1ティックだけ動作します。
pocketmine.betterpmmp.yml.world.view-distance-per-world=ワールドフォルダ名ごとの描画距離。
pocketmine.betterpmmp.yml.world.chunk-ticking=チャンクティックの制限とワールドごとの上書き。
pocketmine.betterpmmp.yml.world.chunk-ticking.batch-recheck-limit=1ティックあたりにティック対象を再確認するチャンクの上限。0で無制限。
pocketmine.betterpmmp.yml.world.chunk-ticking.per-world=ワールドフォルダ名ごとのチャンクティック。
pocketmine.betterpmmp.yml.lighting=サーバー側の光源の生成と更新。
pocketmine.betterpmmp.yml.lighting.fixed-light=非同期の光源生成をスキップし、固定値で光源を埋めます。
pocketmine.betterpmmp.yml.lighting.fixed-light-level=fixed-light有効時に使う光レベル（0～15）。
pocketmine.betterpmmp.yml.lighting.skip-runtime-updates=ブロック変更時の実行時の光源再計算をスキップします。
pocketmine.betterpmmp.yml.entities=ドロップアイテムと経験値オーブの挙動。
pocketmine.betterpmmp.yml.entities.item-merging=近くのドロップアイテムをまとめて統合します。
pocketmine.betterpmmp.yml.entities.item-despawn-ticks=ドロップアイテムの消滅時間（ティック）（バニラは6000）。-1：消滅しません。
pocketmine.betterpmmp.yml.entities.xp-orbs=経験値オーブを生成します。無効にすると毎ティックの走査を省略します。
pocketmine.betterpmmp.yml.entities.pickup-scan-period=Nティックごとに取得判定を行います（1でバニラ）。
pocketmine.betterpmmp.yml.combat=クリティカルヒットと爆発ダメージ。
pocketmine.betterpmmp.yml.combat.critical-hit-ignore-sprint=スプリント中でもクリティカルを許可します。
pocketmine.betterpmmp.yml.combat.critical-hit-min-fall-distance=クリティカルに必要な最小落下距離（バニラは0.0）。
pocketmine.betterpmmp.yml.combat.explosion-block-destruction=爆発がブロックを破壊できるようにします。
pocketmine.betterpmmp.yml.network=パケット圧縮と移動ブロードキャストの制御。
pocketmine.betterpmmp.yml.network.snappy-compression=zlibの代わりにSnappy圧縮を使用します。公式バイナリに同梱済み。snappy拡張はカスタムPHPビルドでのみ必要です。
pocketmine.betterpmmp.yml.network.movement-broadcast-period=Nティックごとに移動パケットを送信します（1でバニラ）。
pocketmine.betterpmmp.yml.network.skip-movement-send-event=移動パケットのDataPacketSendEventをスキップします。
pocketmine.betterpmmp.yml.network.skip-auth-input-receive-event=プレイヤー入力パケットのDataPacketReceiveEventをスキップします。
pocketmine.betterpmmp.yml.events=ゲームプレイイベントの制御。
pocketmine.betterpmmp.yml.events.move-event-period=NティックごとにPlayerMoveEventを発火します（1でバニラ）。
pocketmine.betterpmmp.yml.recipes=バニラのレシピ登録。
pocketmine.betterpmmp.yml.recipes.load-vanilla=起動時にバニラの作業台・かまど・醸造のレシピを読み込みます。
pocketmine.betterpmmp.yml.plugins=プラグインのログ出力。
pocketmine.betterpmmp.yml.gameplay=ゲームプレイ機構の切り替え。
pocketmine.betterpmmp.yml.gameplay.hunger-exhaustion=移動・ジャンプ・攻撃・採掘・ダメージ・体力回復・ポーションなど、あらゆる原因による空腹の消耗です。無効にすると機構全体をスキップします。
pocketmine.betterpmmp.yml.gameplay.fall-damage=生物の落下ダメージです。無効にすると落下ダメージ処理全体をスキップします。
pocketmine.betterpmmp.yml.gameplay.farmland-persistent=耕地が乾いたり踏み荒らされたり土に戻ったりしません。完全に湿った耕地は水探索をスキップします。
pocketmine.betterpmmp.yml.gameplay.farmland-instant-hydration=耕したり設置した耕地が最初から完全に湿った状態になります。
pocketmine.betterpmmp.yml.combat.instant-hit-feedback=近接と発射物の被弾フィードバックをティック終了時ではなく即座に送信し、被弾側と攻撃側の体感被弾遅延を最大50ms削減します。
pocketmine.betterpmmp.yml.network.interaction-spam-window=クライアントの重複したインタラクションパケットを破棄する時間（ミリ秒、本家は100）。既定値20は秒間10クリックの上限を撤廃します。重複したインタラクションがすり抜ける場合は値を上げてください。
pocketmine.betterpmmp.yml.network.block-sync-snapshot=インタラクションでクリックしたブロックが変化しなかった場合、その再送をスキップし、設置/破壊時のラバーバンド（巻き戻り）を解消します。周囲のブロックは常に送信されます。
pocketmine.betterpmmp.yml.network.chunk-history-limit=セッションごとに記憶するチャンク座標の最大数。ワールド切り替え時に古いチャンクを消去するために使用します。0で無制限（セッション中ずっと増加します）。
pocketmine.betterpmmp.yml.plugins.lifecycle-log=各プラグインの読み込み・有効化・無効化をログに出力します。
pocketmine.yml.header=PocketMine-MP のメイン設定ファイル\nserver.properties に含められない設定です\n一部は安全ですが、一部は誤って変更するとサーバーが壊れることがあります\nアップグレード時に新しい設定/デフォルト値がこのファイルに自動追加されることはありません。
pocketmine.yml.settings.force-language=すべての文字列をサーバーロケールに翻訳して送るか、デバイスに任せるか
pocketmine.yml.settings.query-plugins=Query 経由でのプラグイン一覧表示を許可
pocketmine.yml.settings.enable-profiling=プラグインとコアのプロファイリングをデフォルトで有効化
pocketmine.yml.settings.profile-report-trigger=ティック測定値が指定値以下のときのみ結果を追加します（デフォルト 20）
pocketmine.yml.settings.async-workers=AsyncTask ワーカー数。\nプラグインの非同期タスク、ワールド生成、圧縮、Web通信に使われます。\nおおよそコア数に合わせて設定してください。\nauto に設定するとコア数を自動検出します（または 2 を使用）
pocketmine.yml.settings.enable-dev-builds=開発ビルドの実行を許可するか。開発ビルドはクラッシュ、プラグイン破損、ワールド破損などを引き起こす可能性があります。\n可能な限り開発ビルドの使用は避けることを推奨します。
pocketmine.yml.memory.global-limit=グローバルソフトメモリ上限（MB）。0 で無効\n使用量がこれを超えると low-memory-triggers を発動し、メモリ解放イベントを発火します
pocketmine.yml.memory.main-limit=メインスレッドのソフトメモリ上限（MB）。0 で無効\n使用量がこれを超えると low-memory-triggers を発動し、メモリ解放イベントを発火します
pocketmine.yml.memory.main-hard-limit=メインスレッドのハードメモリ上限（MB）。0 で無効\n上限を超えるとサーバーを停止します
pocketmine.yml.memory.async-worker-hard-limit=AsyncWorker スレッドのハードメモリ上限（MB）。0 で無効\nタスクが上限を超えると、ワーカーで実行中のそのタスクをクラッシュさせます\n注意: この上限はプロセス全体ではなくワーカーごとに適用されます。
pocketmine.yml.memory.check-rate=メモリを確認する周期（ティック）（デフォルト 1 秒）
pocketmine.yml.memory.continuous-trigger=低メモリ時に low-memory-triggers とイベントを発動し続ける
pocketmine.yml.memory.continuous-trigger-rate=memory.continuous-trigger が有効な場合のみ。memory.check-rate 単位での割合を指定します（デフォルト 30 秒）
pocketmine.yml.memory.garbage-collection.period=ガベージコレクタを手動で実行する周期（ティック）（デフォルト 30 分）、0 で無効\nメインスレッドにのみ影響します。他のスレッドは各自で収集を実行するべきです
pocketmine.yml.memory.memory-dump=メモリダンプ処理の設定。
pocketmine.yml.memory.memory-dump.dump-async-worker=メインスレッドだけでなく非同期ワーカーのメモリもダンプします。ダンプ時に segfault の問題がある場合はこの設定を無効にしてください。
pocketmine.yml.memory.max-chunks.chunk-radius=低メモリが発動したときにプレイヤーごとの最大描画距離を制限します。0 で上限なし。
pocketmine.yml.network.batch-threshold=パケットをまとめる閾値（バイト）。これらのパケットのみ圧縮されます\n0 ですべて圧縮、-1 で無効。
pocketmine.yml.network.compression-level=バッチパケット送信時に使う圧縮レベル。高いほど CPU 使用が増え、帯域使用が減ります。zlib 専用 - Snappy にはレベル設定がないため、better-pmmp.network.snappy-compression が有効な間は無視されます
pocketmine.yml.network.async-compression=メインゲームセッション中の圧縮に AsyncTask を使用。遅延は増えますがメインスレッド負荷を減らせます
pocketmine.yml.network.async-compression-threshold=非同期圧縮の閾値（バイト）。これより大きいパケットのみ非同期で圧縮されます\nAsyncTask のオーバーヘッドが大きいため、大きなパケット以外では非同期圧縮は割に合いません
pocketmine.yml.network.upnp-forwarding=実験的。UPnP を使って自動的にポート転送
pocketmine.yml.network.max-mtu-size=ネットワークで送るパケットの最大サイズ（バイト）（デフォルト 1492）。これより大きいパケットは\n断片化または小さく分割されます。クライアントはこの値以下の MTU サイズを要求できます。
pocketmine.yml.network.enable-encryption=Minecraft ネットワーク通信の暗号化を有効化。性能に影響しますが、ハッカーがセッションを盗み他プレイヤーになりすますのを防ぎます。\nリスクを理解していない限り、これを無効にしないでください。
pocketmine.yml.debug.level=1 より大きいと、コンソールにデバッグメッセージを表示します
pocketmine.yml.player.save-player-data=プレイヤーデータの保存を有効にするか選択します。
pocketmine.yml.player.verify-xuid=true の場合、参加するプレイヤーの Xbox ユーザー ID（XUID）が以前記録されたものと一致するか確認します。\nまた xbox-auth=off のサーバーで、XBL 以外のプレイヤーが XBL プレイヤーのユーザー名を使ってデータを盗むのを防ぎます。
pocketmine.yml.level-settings.default-format=ワールド作成時に使用するデフォルトフォーマット
pocketmine.yml.chunk-sending.per-tick=サーバーの通常描画距離を変えるには、server.properties の view-distance を変更してください。\n1 ティックあたりにプレイヤーへ送るチャンク数
pocketmine.yml.chunk-sending.spawn-radius=プレイヤーをスポーンする前に送る必要があるチャンク半径
pocketmine.yml.chunk-ticking.tick-radius=プレイヤー周辺でティックするチャンク半径
pocketmine.yml.chunk-ticking.blocks-per-subchunk-per-tick=ティックエリアのサブチャンク内で毎ティック処理されるブロック数。値が高いと木や植物の成長などの\nイベントが速くなりますが、性能コストが高くなります。
pocketmine.yml.chunk-ticking.disable-block-ticking=ランダムティックを行わないブロック ID の一覧。
pocketmine.yml.chunk-generation.population-queue-size=生成待ちキューにある、生成待ちの最大チャンク数
pocketmine.yml.auto-report.enabled=処理のためにクラッシュレポートを送信
pocketmine.yml.anonymous-statistics.enabled=データ集計、プラグイン使用状況追跡のための匿名統計を送信します
pocketmine.yml.auto-updater.preferred-channel=development、alpha、beta、stable のいずれかです。
pocketmine.yml.auto-updater.suggest-channels=開発版を使用している場合、チャンネルの変更を提案します
pocketmine.yml.timings.host=タイミング結果の表示に使うホストを選択してください。
pocketmine.yml.console.enable-input=コンソール経由のコマンドを受け付けるか。無効にすると、コンソールに入力した内容は無視されます。\nコンソールを使わないヘッドレスサーバー（ホスティングサーバー、Docker など）で資源を節約するのに便利です。
pocketmine.yml.console.title-tick=コンソールタイトルでのサーバー統計表示を有効にするか選択します。\n注意: コンソールの色が無効の場合、タイトルティッカーも無効になります。
pocketmine.yml.aliases.1=このセクションでコマンドのエイリアスを追加、削除、再マッピングできます。\n1 つのエイリアスが 1 つ以上の他のコマンド（またはエイリアス）を呼び出せます。\nここで定義したエイリアスは、プラグインや PocketMine-MP 自体が宣言したコマンドエイリアスより優先されます。
pocketmine.yml.aliases.2=エイリアスを削除するには、次のように [] に設定します（ただし "pocketmine:stop" のような接頭辞付きエイリアスは残り\n削除できません）:
pocketmine.yml.aliases.3=コマンド自体ではなく、そのエイリアスのみ削除されます。すべてのエイリアスが上書きされても、完全な（接頭辞付き）\n名前でコマンドを参照できます。完全な名前は通常 "pocketmine:commandname" または\n"pluginname:commandname" の形式です。
pocketmine.yml.aliases.4=エイリアスを追加するには、それが呼び出すコマンドを列挙します:
pocketmine.yml.aliases.5=引数付きで別のコマンドを呼び出すには、$1 で第 1 引数、$2 で第 2 引数などを渡します:
pocketmine.yml.aliases.6=引数を必須にする（指定がないとコマンドが失敗する）には $$ を使います。例: $$1, $$2:
pocketmine.yml.aliases.7=引数の範囲をまとめて渡すには、インデックスの後に -（ハイフン）を付けます:
pocketmine.yml.aliases.8=既存のコマンドエイリアスを変えて別の動作をさせるには:
pocketmine.yml.worlds=これらの設定は server.properties で設定された生成器を上書きし、複数ワールドの読み込みを可能にします\n例:
pocketmine.yml.plugins.legacy-data-dir=これを true にすると、プラグインデータが --plugins ディレクトリ内に置かれるレガシー構造を使用します。\nfalse の場合、プラグインデータを --data 下の plugin_data に置きます。\nこのオプションは既存インストールとの後方互換性のために存在します。

pocketmine.resource-packs.yml.header=この設定ファイルは PocketMine-MP サーバーで使用するグローバルリソースを制御します。
pocketmine.resource-packs.yml.force-resources=プレイヤーがサーバーに参加するために、選択したリソースパックの使用を必須にするかどうかを選びます。\n注意: 下のスタックにリソースパックがない場合は何も起こりません。
pocketmine.resource-packs.yml.stack=ここのリソースパックは下から上へ適用されます。つまり上位のパックのリソースが下位のパックのリソースを上書きします。\n各項目にはリソースパックのファイル名を指定してください。\n例:
pocketmine.resource-packs.yml.stack.force-vanilla=クライアントにバニラリソースの使用を強制したい場合は、resources フォルダにバニラリソースパックを置き、ここのスタックに追加してください。
pocketmine.resource-packs.yml.stack.encryption-key=リソースの暗号化キーを指定するには、リソースパックと同じ場所に <resource>.key ファイルを置き、その中にキーを入れてください。例: vanilla.zip.key

